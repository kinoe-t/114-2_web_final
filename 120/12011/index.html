<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霍格華茲學院分配測驗</title>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #0f172a
    );

    color:white;

    font-family:
    "Microsoft JhengHei",
    sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.container{

    width:100%;
    max-width:850px;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    border:
    1px solid
    rgba(255,255,255,.15);

    border-radius:20px;

    padding:30px;
}

h1{

    text-align:center;

    color:#fbbf24;

    margin-top:0;
}

.question{

    margin-bottom:30px;
}

.question h3{

    margin-bottom:15px;
}

.option{

    display:block;

    margin:10px 0;

    padding:14px;

    border-radius:12px;

    background:
    rgba(255,255,255,.05);

    border:
    2px solid transparent;

    cursor:pointer;

    transition:.25s;
}

.option:hover{

    background:
    rgba(255,255,255,.12);
}

.option input{

    display:none;
}

.option:has(input:checked){

    background:
    rgba(251,191,36,.25);

    border:
    2px solid #fbbf24;

    color:#fbbf24;

    transform:
    translateY(-2px);

    box-shadow:
    0 0 15px
    rgba(251,191,36,.35);
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    font-size:18px;

    cursor:pointer;

    background:#fbbf24;

    color:#111827;

    font-weight:bold;
}

button:hover{

    opacity:.9;
}

/* 結果頁 */

.result{

    display:none;
}

.letter{

    background:
    linear-gradient(
        180deg,
        #f8f1dd,
        #efe2bc
    );

    color:#3a2812;

    max-width:700px;

    margin:auto;

    padding:40px;

    border-radius:12px;

    border:
    8px solid #c6a76d;

    box-shadow:
    0 0 40px
    rgba(0,0,0,.4);

    text-align:center;
}

.seal{

    font-size:55px;

    margin-bottom:10px;
}

.letter h2{

    margin:0;

    color:#6b3d12;

    font-family:
    Georgia,
    serif;

    letter-spacing:2px;
}

.subtitle{

    opacity:.8;

    font-style:italic;
}

.letter hr{

    margin:25px 0;

    border:none;

    border-top:
    2px solid #b28a4d;
}

.opening{

    text-align:left;

    font-size:20px;
}

.letter-text{

    font-size:18px;

    line-height:1.8;
}

.house-result{

    font-size:48px;

    margin:30px 0;

    font-weight:bold;
}

.house-desc{

    font-size:20px;

    line-height:1.8;
}

.closing{

    margin-top:30px;

    font-style:italic;
}

.signature{

    margin-top:40px;

    font-size:28px;

    font-family:cursive;

    color:#5c2d0c;
}

.restart{

    margin-top:35px;
}

</style>
</head>

<body>

<div class="container">

<div id="quiz">

<h1>🎩 霍格華茲學院分配測驗</h1>

<div class="question">
<h3>1. 遇到危險時，你通常會？</h3>

<label class="option">
<input type="radio" name="q1" value="G">
立刻挺身而出
</label>

<label class="option">
<input type="radio" name="q1" value="R">
先分析情況
</label>

<label class="option">
<input type="radio" name="q1" value="H">
保護身邊的人
</label>

<label class="option">
<input type="radio" name="q1" value="S">
尋找最有利的做法
</label>
</div>

<div class="question">
<h3>2. 你最重視什麼？</h3>

<label class="option">
<input type="radio" name="q2" value="G">
勇氣
</label>

<label class="option">
<input type="radio" name="q2" value="R">
智慧
</label>

<label class="option">
<input type="radio" name="q2" value="H">
忠誠
</label>

<label class="option">
<input type="radio" name="q2" value="S">
野心
</label>
</div>

<div class="question">
<h3>3. 理想的朋友是？</h3>

<label class="option">
<input type="radio" name="q3" value="G">
勇敢可靠
</label>

<label class="option">
<input type="radio" name="q3" value="R">
博學有趣
</label>

<label class="option">
<input type="radio" name="q3" value="H">
真誠善良
</label>

<label class="option">
<input type="radio" name="q3" value="S">
能力出眾
</label>
</div>

<div class="question">
<h3>4. 你最想學習哪門魔法課？</h3>

<label class="option">
<input type="radio" name="q4" value="G">
黑魔法防禦術
</label>

<label class="option">
<input type="radio" name="q4" value="R">
古代神秘文字研究
</label>

<label class="option">
<input type="radio" name="q4" value="H">
奇獸飼育學
</label>

<label class="option">
<input type="radio" name="q4" value="S">
魔藥學
</label>
</div>

<div class="question">
<h3>5. 得到一件稀有魔法物品後，你會？</h3>

<label class="option">
<input type="radio" name="q5" value="G">
帶著它展開冒險
</label>

<label class="option">
<input type="radio" name="q5" value="R">
研究它的秘密
</label>

<label class="option">
<input type="radio" name="q5" value="H">
與朋友分享
</label>

<label class="option">
<input type="radio" name="q5" value="S">
善用它達成目標
</label>
</div>

<button onclick="calculateHouse()">
🎩 戴上分類帽
</button>

</div>

<div class="result" id="result">

<div class="letter">

<div class="seal">
🦉
</div>

<h2>
HOGWARTS SCHOOL OF
<br>
WITCHCRAFT AND WIZARDRY
</h2>

<p class="subtitle">
Headmaster: Albus Dumbledore
</p>

<hr>

<p class="opening">
親愛的學生：
</p>

<p class="letter-text">
我們非常高興通知您，
您已被霍格華茲魔法與巫術學院錄取。

經過分類帽的慎重考量，
您將被分配至：
</p>

<div
id="houseName"
class="house-result">
</div>

<p
id="houseDescription"
class="house-desc">
</p>

<p class="closing">
願你的魔法旅程充滿勇氣、
智慧、忠誠與榮耀。
</p>

<p class="signature">
Professor McGonagall
</p>

<button
class="restart"
onclick="location.reload()">

重新接受測驗

</button>

</div>

</div>

</div>

<script>

function calculateHouse(){

const questions = [
"q1",
"q2",
"q3",
"q4",
"q5"
];

const score = {
G:0,
R:0,
H:0,
S:0
};

for(const q of questions){

const selected =
document.querySelector(
`input[name="${q}"]:checked`
);

if(!selected){

alert("請完成所有題目！");
return;
}

score[selected.value]++;
}

const winner =
Object.keys(score).reduce(
(a,b)=>
score[a] > score[b]
? a
: b
);

const houses = {

G:{
name:"🦁 葛來分多",
color:"#ae0001",
desc:"你的勇氣與決心令人欽佩，你總願意為信念挺身而出。"
},

R:{
name:"🦅 雷文克勞",
color:"#0e4b8f",
desc:"你擁有求知慾與創造力，智慧是你最強大的魔法。"
},

H:{
name:"🦡 赫夫帕夫",
color:"#ecb939",
desc:"你重視忠誠與善良，總能成為他人最可靠的夥伴。"
},

S:{
name:"🐍 史萊哲林",
color:"#1a472a",
desc:"你擁有遠見與野心，善於把握機會創造未來。"
}

};

document.getElementById(
"quiz"
).style.display="none";

document.getElementById(
"result"
).style.display="block";

const houseName =
document.getElementById(
"houseName"
);

houseName.textContent =
houses[winner].name;

houseName.style.color =
houses[winner].color;

document.getElementById(
"houseDescription"
).textContent =
houses[winner].desc;
}

</script>

</body>
</html>
