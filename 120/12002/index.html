<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天我想來點</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Microsoft JhengHei",sans-serif;
    }

    body{
        min-height:100vh;
        background:linear-gradient(135deg,#FFD180,#FFA726);
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:90%;
        max-width:700px;
        background:white;
        border-radius:25px;
        padding:30px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
        color:#ff6f00;
        margin-bottom:10px;
        font-size:2.5rem;
    }

    .food-icons{
        font-size:2rem;
        margin-bottom:20px;
    }

    .question{
        margin:20px 0;
    }

    .question h3{
        margin-bottom:10px;
        color:#444;
    }

    .options{
        display:flex;
        justify-content:center;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        border:none;
        padding:12px 24px;
        border-radius:15px;
        background:#1976D2;
        color:white;
        cursor:pointer;
        font-size:1rem;
        transition:0.3s;
    }

    button:hover{
        background:#0D47A1;
        transform:scale(1.05);
    }

    button.selected{
        background:#00ACC1;
    }

    .result-btn{
        margin-top:25px;
        background:#1565C0;
        font-size:1.1rem;
    }

    .result{
        margin-top:25px;
        padding:20px;
        background:#FFF3E0;
        border-radius:15px;
        font-size:1.5rem;
        color:#E65100;
        font-weight:bold;
        min-height:80px;
        display:flex;
        justify-content:center;
        align-items:center;
    }
</style>
</head>
<body>

<div class="container">

    <h1>今天我想來點</h1>

    <div class="food-icons">
        🍜 🍛 🍲 🌮 🍚
    </div>

    <div class="question">
        <h3>辣度</h3>
        <div class="options">
            <button onclick="selectOption('spicy','辣',this)">辣</button>
            <button onclick="selectOption('spicy','不辣',this)">不辣</button>
        </div>
    </div>

    <div class="question">
        <h3>形式</h3>
        <div class="options">
            <button onclick="selectOption('soup','湯',this)">湯</button>
            <button onclick="selectOption('soup','乾',this)">乾</button>
        </div>
    </div>

    <div class="question">
        <h3>主食</h3>
        <div class="options">
            <button onclick="selectOption('main','飯',this)">飯</button>
            <button onclick="selectOption('main','麵',this)">麵</button>
        </div>
    </div>

    <div class="question">
        <h3>種類</h3>
        <div class="options">
            <button onclick="selectOption('type','素',this)">素</button>
            <button onclick="selectOption('type','葷',this)">葷</button>
        </div>
    </div>

    <button class="result-btn" onclick="recommendFood()">
        🎲 幫我決定午餐
    </button>

    <div class="result" id="result">
        選好條件後按下按鈕！
    </div>

</div>

<script>

const selections = {
    spicy:"",
    soup:"",
    main:"",
    type:""
};

function selectOption(category,value,button){

    selections[category] = value;

    let buttons = button.parentElement.querySelectorAll("button");
    buttons.forEach(btn=>btn.classList.remove("selected"));

    button.classList.add("selected");
}

const foods = [

{spicy:"辣",soup:"湯",main:"麵",type:"葷",name:"🍜 麻辣牛肉麵"},
{spicy:"辣",soup:"乾",main:"麵",type:"葷",name:"🌶️ 麻辣乾拌麵"},
{spicy:"不辣",soup:"湯",main:"麵",type:"葷",name:"🍜 陽春麵"},
{spicy:"不辣",soup:"乾",main:"麵",type:"葷",name:"🥢 炸醬麵"},

{spicy:"辣",soup:"湯",main:"飯",type:"葷",name:"🍛 辣咖哩飯"},
{spicy:"辣",soup:"乾",main:"飯",type:"葷",name:"🍱 韓式辣雞飯"},
{spicy:"不辣",soup:"乾",main:"飯",type:"葷",name:"🍗 雞腿便當"},
{spicy:"不辣",soup:"湯",main:"飯",type:"葷",name:"🍲 排骨湯飯"},

{spicy:"辣",soup:"湯",main:"麵",type:"素",name:"🥬 麻辣素麵"},
{spicy:"辣",soup:"乾",main:"麵",type:"素",name:"🌶️ 香辣素拌麵"},
{spicy:"不辣",soup:"湯",main:"麵",type:"素",name:"🍜 蔬菜湯麵"},
{spicy:"不辣",soup:"乾",main:"麵",type:"素",name:"🥗 素食涼麵"},

{spicy:"辣",soup:"乾",main:"飯",type:"素",name:"🍛 辣豆腐咖哩飯"},
{spicy:"辣",soup:"湯",main:"飯",type:"素",name:"🍲 辣味蔬菜湯飯"},
{spicy:"不辣",soup:"乾",main:"飯",type:"素",name:"🥬 素便當"},
{spicy:"不辣",soup:"湯",main:"飯",type:"素",name:"🍚 菇菇湯泡飯"}

];

function recommendFood(){

    if(
        !selections.spicy ||
        !selections.soup ||
        !selections.main ||
        !selections.type
    ){
        document.getElementById("result").innerHTML =
        "⚠️ 請先完成所有選擇！";
        return;
    }

    const matches = foods.filter(food =>
        food.spicy === selections.spicy &&
        food.soup === selections.soup &&
        food.main === selections.main &&
        food.type === selections.type
    );

    const randomFood =
        matches[Math.floor(Math.random()*matches.length)];

    document.getElementById("result").innerHTML =
        `今天午餐推薦：<br>${randomFood.name}`;
}

</script>

</body>
</html>
