<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡樂打地鼠遊戲</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f3f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .score-board {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .control-panel {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: bold;
        }

        button:hover {
            background-color: #27ae60;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        /* 4x4 遊戲地圖 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 110px);
            grid-template-rows: repeat(4, 110px);
            gap: 25px;
            background-color: #9169d2;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* 地鼠洞 */
        .hole {
            background-color: #34495e;
            border-radius: 50%;
            position: relative;
            border: 4px solid #2c3e50;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }

        /* 地鼠圖片加大樣式 */
        .mole {
            width: 130%;  
            height: 130%; 
            position: absolute;
            left: -15%;   
            bottom: 0;
            
            /* 動態現形效果 */
            transform: scale(0); 
            opacity: 0;
            
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
            cursor: pointer;
            object-fit: contain;
            z-index: 10;

            /* 防錯機制：如果圖片因路徑或名稱沒對上而加載失敗，地鼠會以黃色圓圈替代，確保能玩 */
            background-color: #22a3f9; 
            border-radius: 50%;
        }

        /* 地鼠完全冒出來 */
        .mole.up {
            transform: scale(1);
            opacity: 1;
        }

        /* === 結束畫面 樣式 === */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            display: flex;
            opacity: 1;
        }

        .game-over-box {
            background-color: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        .overlay.show .game-over-box {
            transform: scale(1);
        }

        .game-over-box h2 {
            color: #e74c3c;
            font-size: 36px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .final-score {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .evaluation {
            font-size: 20px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .restart-btn {
            background-color: #3498db;
            padding: 12px 30px;
            font-size: 20px;
        }

        .restart-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>打地鼠大作戰 🔨</h1>
    
    <div class="score-board">
        分數: <span id="score">0</span> | 剩餘時間: <span id="time-left">30</span> 秒
    </div>

    <div class="control-panel">
        <button id="start-btn" onclick="startGame()">開始遊戲</button>
    </div>

    <div class="game-grid">
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
        <div class="hole"><img src="images-removebg-preview (1).png" alt=" " class="mole" onclick="whack(this)"></div>
    </div>

    <div class="overlay" id="game-over-overlay">
        <div class="game-over-box">
            <h2>GAME OVER</h2>
            <div class="final-score">您的總分：<span id="final-score-val">0</span> 分</div>
            <div class="evaluation" id="evaluation-text">繼續加油！</div>
            <button class="restart-btn" onclick="closeGameOverAndStart()">再玩一次</button>
        </div>
    </div>

    <script>
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const timeLeftDisplay = document.getElementById('time-left');
        const startBtn = document.getElementById('start-btn');
        
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreVal = document.getElementById('final-score-val');
        const evaluationText = document.getElementById('evaluation-text');

        let score = 0;
        let timeLeft = 30;
        let gameOver = true;
        let lastHoleIndex = -1;
        let moleTimeout;
        let countdownInterval;

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole() {
            const index = Math.floor(Math.random() * moles.length);
            if (index === lastHoleIndex) {
                return randomHole();
            }
            lastHoleIndex = index;
            return moles[index];
        }

        function peep() {
            if (gameOver) return;

            const mole = randomHole();
            mole.classList.add('up');

            const time = randomTime(500, 1100);
            
            moleTimeout = setTimeout(() => {
                mole.classList.remove('up');
                if (!gameOver) {
                    setTimeout(peep, randomTime(200, 400));
                }
            }, time);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameOver = false;
            scoreDisplay.textContent = score;
            timeLeftDisplay.textContent = timeLeft;
            startBtn.disabled = true;

            moles.forEach(mole => mole.classList.remove('up'));

            countdownInterval = setInterval(() => {
                timeLeft--;
                timeLeftDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            peep();
        }

        function whack(mole) {
            if (!mole.classList.contains('up') || gameOver) return;

            score++;
            scoreDisplay.textContent = score;
            mole.classList.remove('up'); 
        }

        function getEvaluation(score) {
            if (score >= 35) return "太神啦！你是打地鼠大師！🏆";
            if (score >= 20) return "身手矯健！表現得非常好！👍";
            if (score >= 8) return "再接再厲，地鼠們在挑釁你呢！😆";
            return "呃...你剛剛是在發呆嗎？龜速反應！🐢";
        }

        function endGame() {
            gameOver = true;
            clearInterval(countdownInterval);
            clearTimeout(moleTimeout);
            moles.forEach(mole => mole.classList.remove('up'));
            startBtn.disabled = false;

            finalScoreVal.textContent = score;
            evaluationText.textContent = getEvaluation(score);
            gameOverOverlay.classList.add('show');
        }

        function closeGameOverAndStart() {
            gameOverOverlay.classList.remove('show');
            setTimeout(startGame, 300);
        }
    </script>
</body>
</html>
