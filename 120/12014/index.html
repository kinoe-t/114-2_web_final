<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>○✕ 圈圈叉叉</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables / Themes ── */
:root {
  --bg:       #e8e0d4;
  --surface:  #f0ead8;
  --card:     #faf6ee;
  --border:   #c4b8a0;
  --shadow:   #a89880;
  --text:     #3a3028;
  --text2:    #7a6a58;
  --accent:   #d4704a;
  --o-color:  #c0522e;
  --x-color:  #3a6e9e;
  --o-bg:     #fde8e0;
  --x-bg:     #ddeeff;
  --o-border: #e89070;
  --x-border: #7ab0d8;
  --btn-face: #f5efe3;
  --btn-side: #b8a888;
  --radius:   16px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 20%, rgba(212,112,74,0.07) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(58,110,158,0.07) 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  transition: background .4s, color .4s;
  padding: 20px;
}

/* ── Game Shell (the "device") ── */
.device {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 32px;
  box-shadow:
    0 6px 0 var(--shadow),
    0 10px 32px rgba(0,0,0,0.12);
  padding: 32px 28px 28px;
  width: min(420px, 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  position: relative;
  transition: background .4s, border-color .4s, box-shadow .4s;
}

/* little decorative dots top */
.device::before {
  content: '';
  position: absolute;
  top: 18px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 6px;
  border-radius: 3px;
  background: var(--border);
  opacity: .5;
}

/* ── Title ── */
.game-title {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 2rem;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  margin-top: 8px;
  line-height: 1;
}
.game-title span { color: var(--x-color); }

/* ── Screens ── */
.screen { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
.screen.active { display: flex; }

/* ── Puffy Button ── */
.pbtn {
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: 1px;
  padding: 12px 28px;
  border-radius: 999px;
  border: 2.5px solid transparent;
  cursor: pointer;
  position: relative;
  transition: transform .1s, box-shadow .1s;
  background: var(--btn-face);
  color: var(--text);
  box-shadow: 0 4px 0 var(--btn-side), 0 6px 12px rgba(0,0,0,0.10);
  width: 100%;
  max-width: 280px;
}
.pbtn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--btn-side), 0 8px 16px rgba(0,0,0,0.12); }
.pbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--btn-side), 0 2px 6px rgba(0,0,0,0.10); }

.pbtn.accent  { background: var(--accent);  color: #fff; border-color: rgba(0,0,0,0.08); box-shadow: 0 4px 0 #a0472a, 0 6px 14px rgba(212,112,74,0.25); }
.pbtn.accent:hover  { box-shadow: 0 6px 0 #a0472a, 0 8px 18px rgba(212,112,74,0.3); }
.pbtn.accent:active { box-shadow: 0 1px 0 #a0472a, 0 2px 6px rgba(212,112,74,0.2); }

.pbtn.blue   { background: var(--x-color); color: #fff; border-color: rgba(0,0,0,0.08); box-shadow: 0 4px 0 #2a4e7a, 0 6px 14px rgba(58,110,158,0.25); }
.pbtn.blue:hover  { box-shadow: 0 6px 0 #2a4e7a, 0 8px 18px rgba(58,110,158,0.3); }
.pbtn.blue:active { box-shadow: 0 1px 0 #2a4e7a, 0 2px 6px rgba(58,110,158,0.2); }

.pbtn.ghost { background: transparent; border-color: var(--border); color: var(--text2); box-shadow: none; font-size: .95rem; }
.pbtn.ghost:hover { background: var(--surface); box-shadow: none; transform: none; }
.pbtn.ghost:active { transform: scale(.97); }

.pbtn.sm { font-size: .9rem; padding: 8px 20px; max-width: 200px; }

/* ── Section label ── */
.sec-label {
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--text2);
  letter-spacing: 1px;
  align-self: flex-start;
  margin-bottom: -4px;
}

/* ── Pill row ── */
.pill-row { display: flex; gap: 8px; width: 100%; justify-content: center; flex-wrap: wrap; }
.pill {
  font-family: 'Baloo 2', cursive;
  font-weight: 600;
  font-size: .95rem;
  padding: 7px 20px;
  border-radius: 999px;
  border: 2.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.pill:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }
.pill.sel   { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 3px 0 #a0472a; }
.pill.sel-blue { background: var(--x-color); color: #fff; border-color: var(--x-color); box-shadow: 0 3px 0 #2a4e7a; }

.divider {
  width: 100%;
  height: 2px;
  border-radius: 1px;
  background: var(--border);
  opacity: .4;
}

/* ── Status bar ── */
.status {
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--text2);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 999px;
  padding: 6px 20px;
  text-align: center;
  letter-spacing: .5px;
  width: 100%;
  transition: background .3s;
}
.status.turn-o { background: var(--o-bg); border-color: var(--o-border); color: var(--o-color); }
.status.turn-x { background: var(--x-bg); border-color: var(--x-border); color: var(--x-color); }

/* ── Thinking dots ── */
.dots { display: none; gap: 5px; align-items: center; }
.dots.show { display: flex; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--x-color); animation: blink 1.1s ease-in-out infinite; }
.dot:nth-child(2){ animation-delay:.18s; }
.dot:nth-child(3){ animation-delay:.36s; }
@keyframes blink { 0%,80%,100%{ opacity:.2; transform:scale(1); } 40%{ opacity:1; transform:scale(1.35); } }

/* ── Board ── */
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
  background: var(--surface);
  border: 2.5px solid var(--border);
  border-radius: 20px;
  padding: 10px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
}

.cell {
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--card);
  border: 2.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: clamp(2rem, 9vw, 2.8rem);
  cursor: pointer;
  transition: transform .12s, box-shadow .12s, background .15s, border-color .15s;
  box-shadow: 0 3px 0 var(--border);
  user-select: none;
  position: relative;
  overflow: hidden;
}
.cell::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  transition: background .12s;
  border-radius: inherit;
}
.cell:not(.taken):hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 5px 0 var(--border); }
.cell:not(.taken):hover::after { background: rgba(0,0,0,0.03); }
.cell:not(.taken):active { transform: scale(.96); box-shadow: 0 1px 0 var(--border); }
.cell.taken { cursor: default; }

.cell.O {
  background: var(--o-bg);
  border-color: var(--o-border);
  color: var(--o-color);
  box-shadow: 0 3px 0 var(--o-border);
}
.cell.X {
  background: var(--x-bg);
  border-color: var(--x-border);
  color: var(--x-color);
  box-shadow: 0 3px 0 var(--x-border);
}
.cell.win {
  animation: cellWin .45s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes cellWin {
  0%  { transform: scale(1); }
  50% { transform: scale(1.18) rotate(-4deg); filter: brightness(1.1); }
  75% { transform: scale(.95) rotate(2deg); }
  100%{ transform: scale(1.08) rotate(0); }
}
.sym { animation: symPop .2s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes symPop {
  0%  { transform: scale(0) rotate(-15deg); opacity:0; }
  100%{ transform: scale(1) rotate(0); opacity:1; }
}

/* ── Score strip ── */
.score-strip {
  display: flex;
  width: 100%;
  gap: 8px;
  align-items: stretch;
}
.score-block {
  flex: 1;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 8px 4px;
  text-align: center;
  transition: background .3s, border-color .3s;
}
.score-block.o-block { background: var(--o-bg); border-color: var(--o-border); }
.score-block.x-block { background: var(--x-bg); border-color: var(--x-border); }
.score-block .slabel {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: .6;
}
.score-block .sval {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 1.7rem;
  line-height: 1.1;
}
.o-block .sval { color: var(--o-color); }
.x-block .sval { color: var(--x-color); }

/* ── Result overlay ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(58,48,40,.45);
  backdrop-filter: blur(4px);
  z-index: 50;
  align-items: center;
  justify-content: center;
  animation: fadeIn .25s;
}
.overlay.show { display: flex; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }

.result-box {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 28px;
  box-shadow: 0 8px 0 var(--shadow), 0 16px 48px rgba(0,0,0,0.18);
  padding: 36px 40px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  animation: popUp .35s cubic-bezier(.34,1.56,.64,1);
  width: min(340px, 92vw);
}
@keyframes popUp { from{transform:scale(.7) translateY(30px);opacity:0} to{transform:none;opacity:1} }

.result-emoji { font-size: 3.2rem; line-height: 1; }
.result-title {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 1.8rem;
  color: var(--accent);
  letter-spacing: 1px;
}
.result-sub { font-size: .95rem; color: var(--text2); font-weight: 600; }
.result-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; margin-top: 4px; }

/* ── Theme Switcher ── */
.theme-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column-reverse;
  align-items: flex-end;
  gap: 8px;
}
.theme-fab {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--card);
  box-shadow: 0 4px 0 var(--shadow), 0 6px 18px rgba(0,0,0,0.12);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s, box-shadow .2s;
}
.theme-fab:hover { transform: translateY(-2px) scale(1.06); }
.theme-fab:active { transform: scale(.93); }
.theme-fab.open { transform: rotate(30deg) scale(1.08); }

.theme-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: flex-end;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height .38s cubic-bezier(.4,0,.2,1), opacity .22s;
}
.theme-list.open { max-height: 700px; opacity: 1; }

.tswatch {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 6px 8px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  color: var(--text2);
  box-shadow: 0 3px 0 var(--shadow), 0 4px 10px rgba(0,0,0,0.08);
  white-space: nowrap;
  transition: transform .13s, box-shadow .13s;
}
.tswatch:hover { transform: translateX(-3px) scale(1.03); box-shadow: 0 4px 0 var(--shadow), 0 6px 14px rgba(0,0,0,0.12); }
.tswatch.active { border-color: var(--accent); }
.tdots { display: flex; gap: 3px; }
.tdot  { width: 11px; height: 11px; border-radius: 50%; }

/* ── Diff badge in game ── */
.diff-pill {
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: .78rem;
  letter-spacing: 1px;
  padding: 2px 12px;
  border-radius: 999px;
  border: 2px solid;
  display: none;
}
.diff-pill.easy   { display: inline; background: #e8f5e4; border-color: #a0c890; color: #4a8c40; }
.diff-pill.medium { display: inline; background: #fef5e4; border-color: #d4b870; color: #8c7020; }
.diff-pill.hard   { display: inline; background: #fce8e4; border-color: #d49090; color: #8c3030; }

/* top row in game */
.game-top { display: flex; align-items: center; gap: 8px; width: 100%; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<!-- ─────────────────── DEVICE SHELL ─────────────────── -->
<div class="device">

  <div class="game-title">○<span>✕</span> 圈圈叉叉</div>

  <!-- ① START -->
  <div class="screen active" id="sStart">
    <p style="color:var(--text2);font-weight:600;font-size:.95rem;text-align:center;line-height:1.7">
      準備好大展身手了嗎？<br>選一個模式開始吧 🎮
    </p>
    <div class="divider"></div>
    <button class="pbtn accent" onclick="goMode()">🎮 開始遊戲</button>
  </div>

  <!-- ② MODE -->
  <div class="screen" id="sMode">
    <div class="sec-label">選擇模式</div>
    <button class="pbtn accent" onclick="goSingle()">🤖 單人 vs 電腦</button>
    <button class="pbtn blue"   onclick="startGame('multi')">👥 雙人對戰</button>
    <button class="pbtn ghost sm" onclick="goStart()">← 返回</button>
  </div>

  <!-- ③ DIFFICULTY -->
  <div class="screen" id="sDiff">
    <div class="sec-label">選擇難度</div>
    <div class="pill-row">
      <div class="pill sel"      id="pEasy"   onclick="pickDiff('easy')">😊 簡單</div>
      <div class="pill"          id="pMedium" onclick="pickDiff('medium')">🤔 普通</div>
      <div class="pill"          id="pHard"   onclick="pickDiff('hard')">💀 困難</div>
    </div>
    <p id="diffDesc" style="font-size:.88rem;color:var(--text2);font-weight:600;text-align:center;min-height:32px;line-height:1.6">
      電腦幾乎亂下，穩穩拿勝！
    </p>
    <div class="divider"></div>
    <button class="pbtn accent" onclick="startGame('single')">出發！▶</button>
    <button class="pbtn ghost sm" onclick="goMode()">← 返回</button>
  </div>

  <!-- ④ GAME -->
  <div class="screen" id="sGame">
    <div class="game-top">
      <div class="status" id="statusBar">輪到 ○</div>
      <span class="diff-pill" id="diffPill"></span>
    </div>
    <div class="dots" id="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="board" id="board"></div>
    <div class="score-strip">
      <div class="score-block o-block">
        <div class="slabel" id="lP1">玩家 ○</div>
        <div class="sval" id="sP1">0</div>
      </div>
      <div class="score-block">
        <div class="slabel">平局</div>
        <div class="sval" id="sDraw">0</div>
      </div>
      <div class="score-block x-block">
        <div class="slabel" id="lP2">玩家 ✕</div>
        <div class="sval" id="sP2">0</div>
      </div>
    </div>
    <button class="pbtn ghost sm" onclick="goStart()">🏠 回首頁</button>
  </div>

</div><!-- /device -->

<!-- ─────────── RESULT OVERLAY ─────────── -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="result-emoji" id="rEmoji">🎉</div>
    <div class="result-title" id="rTitle">你贏了！</div>
    <div class="result-sub"   id="rSub"></div>
    <div class="result-btns">
      <button class="pbtn accent" onclick="playAgain()">再來一局 ↩</button>
      <button class="pbtn ghost sm" onclick="goStart()">回首頁</button>
    </div>
  </div>
</div>

<!-- ─────────── THEME PANEL ─────────── -->
<div class="theme-panel" id="themePanel">
  <button class="theme-fab" id="themeFab" onclick="toggleThemes()" title="換個心情">🎨</button>
  <div class="theme-list" id="themeList"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  THEMES
// ══════════════════════════════════════════════
const THEMES = [
  { id:'cream',  name:'🍞 奶油米白',
    '--bg':'#e8e0d4','--surface':'#f0ead8','--card':'#faf6ee','--border':'#c4b8a0',
    '--shadow':'#a89880','--text':'#3a3028','--text2':'#7a6a58',
    '--accent':'#d4704a','--o-color':'#c0522e','--x-color':'#3a6e9e',
    '--o-bg':'#fde8e0','--x-bg':'#ddeeff','--o-border':'#e89070','--x-border':'#7ab0d8',
    '--btn-face':'#f5efe3','--btn-side':'#b8a888' },

  { id:'sage',   name:'🪴 鼠尾草綠',
    '--bg':'#dbe4db','--surface':'#e4ede4','--card':'#f0f5f0','--border':'#afc4af',
    '--shadow':'#8aaa8a','--text':'#283028','--text2':'#587058',
    '--accent':'#5a8c5a','--o-color':'#3a6e3a','--x-color':'#4a7a6e',
    '--o-bg':'#e4f0e4','--x-bg':'#dff0ec','--o-border':'#8ac48a','--x-border':'#7ab4a8',
    '--btn-face':'#e8f0e8','--btn-side':'#9ab89a' },

  { id:'dusk',   name:'🌑 暮石灰藍',
    '--bg':'#d4d8e0','--surface':'#dce0ea','--card':'#e8ecf4','--border':'#b0b8cc',
    '--shadow':'#8890a8','--text':'#28303a','--text2':'#5a6878',
    '--accent':'#5a7aaa','--o-color':'#c0522e','--x-color':'#3a5a8e',
    '--o-bg':'#fde8e0','--x-bg':'#dde6f8','--o-border':'#e89070','--x-border':'#7aa0d4',
    '--btn-face':'#e0e6f0','--btn-side':'#9aa4bc' },

  { id:'blush',  name:'🌸 胭脂粉',
    '--bg':'#e8d8d8','--surface':'#f0e0e0','--card':'#faf0f0','--border':'#d0b0b0',
    '--shadow':'#b89090','--text':'#3a2828','--text2':'#7a5858',
    '--accent':'#c05878','--o-color':'#b04040','--x-color':'#7a4080',
    '--o-bg':'#fde8e8','--x-bg':'#f0e4f8','--o-border':'#e8a0a0','--x-border':'#c090d8',
    '--btn-face':'#f5e8e8','--btn-side':'#c0a0a0' },

  { id:'sand',   name:'🏜 沙漠棕',
    '--bg':'#e0d4c0','--surface':'#e8dcc8','--card':'#f4eedc','--border':'#c0a878',
    '--shadow':'#a08858','--text':'#38280a','--text2':'#786040',
    '--accent':'#b07830','--o-color':'#a05820','--x-color':'#587840',
    '--o-bg':'#fce8d4','--x-bg':'#e4f0d8','--o-border':'#d0a870','--x-border':'#90b878',
    '--btn-face':'#ede4cc','--btn-side':'#b09060' },

  { id:'slate',  name:'◼ 石板灰',
    '--bg':'#d0d0d0','--surface':'#dadada','--card':'#e8e8e8','--border':'#b0b0b0',
    '--shadow':'#909090','--text':'#282828','--text2':'#606060',
    '--accent':'#585858','--o-color':'#804040','--x-color':'#404880',
    '--o-bg':'#f0e8e8','--x-bg':'#e8eaf8','--o-border':'#c09090','--x-border':'#9098c8',
    '--btn-face':'#e0e0e0','--btn-side':'#a8a8a8' },

  { id:'navy',   name:'🔵 靜海藍',
    '--bg':'#c8d4e0','--surface':'#d4dcea','--card':'#e0eaf4','--border':'#9ab0cc',
    '--shadow':'#7090b0','--text':'#101828','--text2':'#405870',
    '--accent':'#285890','--o-color':'#b04040','--x-color':'#205088',
    '--o-bg':'#fde8e4','--x-bg':'#d8e8f8','--o-border':'#d09090','--x-border':'#7098c8',
    '--btn-face':'#d8e4f0','--btn-side':'#88a4bc' },

  { id:'ink',    name:'🖊 墨水黑',
    '--bg':'#d4d0cc','--surface':'#dcdad4','--card':'#eae8e0','--border':'#b4b0a8',
    '--shadow':'#949088','--text':'#181410','--text2':'#585450',
    '--accent':'#282420','--o-color':'#8c3020','--x-color':'#203060',
    '--o-bg':'#f8e8e4','--x-bg':'#e4e8f4','--o-border':'#c89888','--x-border':'#8898c8',
    '--btn-face':'#e4e0d8','--btn-side':'#a8a4a0' },
];

let themeOpen = false;
let currentTheme = THEMES[0];

function applyTheme(t){
  const r = document.documentElement.style;
  Object.entries(t).forEach(([k,v])=>{ if(k.startsWith('--')) r.setProperty(k,v); });
  currentTheme = t;
  buildThemeList();
}

function toggleThemes(){
  themeOpen = !themeOpen;
  document.getElementById('themeList').classList.toggle('open', themeOpen);
  document.getElementById('themeFab').classList.toggle('open', themeOpen);
}

function buildThemeList(){
  const el = document.getElementById('themeList');
  el.innerHTML = '';
  THEMES.forEach(t=>{
    const sw = document.createElement('div');
    sw.className = 'tswatch' + (t.id===currentTheme.id?' active':'');
    sw.innerHTML = `<div class="tdots">
      <div class="tdot" style="background:${t['--accent']}"></div>
      <div class="tdot" style="background:${t['--o-color']}"></div>
      <div class="tdot" style="background:${t['--x-color']}"></div>
    </div><span>${t.name}</span>`;
    sw.addEventListener('click', ()=>{ applyTheme(t); toggleThemes(); });
    el.appendChild(sw);
  });
}

document.addEventListener('click', e=>{
  if(themeOpen && !document.getElementById('themePanel').contains(e.target)) toggleThemes();
});

// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
let mode = 'single';
let diff = 'easy';
let board = Array(9).fill(null);
let current = 'O';
const HUMAN = 'O', AI = 'X';
let active = false;
let scores = {O:0, X:0, draw:0};
const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

const DIFF_INFO = {
  easy:   { desc:'😊 電腦幾乎亂下，穩穩拿勝！',      label:'😊 簡單' },
  medium: { desc:'🤔 偶爾出錯，有機會拿下！',       label:'🤔 普通' },
  hard:   { desc:'💀 會攻會守，有點挑戰哦！',        label:'💀 困難' },
};

// ── Navigation ──
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goStart(){ closeOverlay(); show('sStart'); }
function goMode() { show('sMode'); }
function goSingle(){ show('sDiff'); syncDiffUI(); }

function pickDiff(d){
  diff = d;
  syncDiffUI();
}
function syncDiffUI(){
  ['easy','medium','hard'].forEach(d=>{
    const el = document.getElementById('p'+d.charAt(0).toUpperCase()+d.slice(1));
    el.className = 'pill' + (d===diff?' sel':'');
  });
  document.getElementById('diffDesc').textContent = DIFF_INFO[diff].desc;
}

// ── Start game ──
function startGame(m){
  mode = m;
  scores = {O:0,X:0,draw:0};
  updateScores();
  document.getElementById('lP1').textContent = m==='single'?'玩家 ○':'玩家1 ○';
  document.getElementById('lP2').textContent = m==='single'?'電腦 ✕':'玩家2 ✕';
  const pill = document.getElementById('diffPill');
  if(m==='single'){ pill.textContent=DIFF_INFO[diff].label; pill.className='diff-pill '+diff; }
  else { pill.className='diff-pill'; }
  show('sGame');
  newRound();
}
function playAgain(){ closeOverlay(); newRound(); }

// ── Round ──
function newRound(){
  board = Array(9).fill(null);
  active = true;
  current = Math.random()<.5?'O':'X';
  renderBoard();
  updateStatus();
  closeOverlay();
  if(mode==='single'&&current===AI) scheduleAI();
}

// ── Board ──
function renderBoard(){
  const el = document.getElementById('board');
  el.innerHTML='';
  board.forEach((v,i)=>{
    const c = document.createElement('div');
    c.className = 'cell'+(v?' taken '+v:'');
    if(v){ const s=document.createElement('span'); s.className='sym'; s.textContent=v==='O'?'○':'✕'; c.appendChild(s); }
    c.addEventListener('click',()=>handleClick(i));
    el.appendChild(c);
  });
}

function handleClick(i){
  if(!active||board[i]) return;
  if(mode==='single'&&current===AI) return;
  move(i);
}

function move(i){
  board[i]=current;
  renderBoard();
  const r=checkResult();
  if(r){ endGame(r); return; }
  current=current==='O'?'X':'O';
  updateStatus();
  if(mode==='single'&&current===AI&&active) scheduleAI();
}

// ── Status ──
function updateStatus(){
  const bar=document.getElementById('statusBar');
  const sym=current==='O'?'○':'✕';
  bar.className='status turn-'+current.toLowerCase();
  if(mode==='single'){
    bar.textContent = current===HUMAN?`輪到你（${sym}）`:`電腦（${sym}）思考中…`;
  } else {
    bar.textContent = `玩家${current==='O'?'1':'2'} 出手（${sym}）`;
  }
  document.getElementById('dots').classList.toggle('show', mode==='single'&&current===AI);
}

// ── AI ──
function scheduleAI(){
  active=false;
  const d = diff==='easy'?280:diff==='medium'?500+Math.random()*250:580+Math.random()*180;
  setTimeout(()=>{ active=true; move(getAIMove()); }, d);
}

function getAIMove(){
  const empty=board.map((v,i)=>v?null:i).filter(i=>i!==null);
  if(diff==='easy'){
    if(Math.random()<.12){ const w=findImmediate(AI); if(w!==-1) return w; }
    return empty[Math.floor(Math.random()*empty.length)];
  }
  if(diff==='medium'){
    const w=findImmediate(AI); if(w!==-1) return w;
    if(Math.random()<.38){ const b=findImmediate(HUMAN); if(b!==-1) return b; }
    return empty[Math.floor(Math.random()*empty.length)];
  }
  // hard: win+block always, then minimax depth-4 + 15% random
  const w=findImmediate(AI); if(w!==-1) return w;
  const b=findImmediate(HUMAN); if(b!==-1) return b;
  if(Math.random()<.15) return empty[Math.floor(Math.random()*empty.length)];
  return bestMove(4);
}

function findImmediate(sym){
  for(const [a,b,c] of LINES){
    const line=[board[a],board[b],board[c]], idx=[a,b,c];
    const emp=idx.filter((_,i)=>line[i]===null);
    if(line.filter(v=>v===sym).length===2&&emp.length===1) return emp[0];
  }
  return -1;
}

function bestMove(depth){
  let best=-Infinity,idx=-1;
  board.forEach((v,i)=>{ if(!v){ board[i]=AI; const s=minimax(board,0,false,-Infinity,Infinity,depth); board[i]=null; if(s>best){best=s;idx=i;} } });
  return idx;
}

function minimax(b,d,isMax,a,be,max){
  const w=winnerOf(b);
  if(w===AI) return 10-d;
  if(w===HUMAN) return d-10;
  if(b.every(Boolean)||d>=max) return 0;
  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){ if(!b[i]){ b[i]=AI; best=Math.max(best,minimax(b,d+1,false,a,be,max)); b[i]=null; a=Math.max(a,best); if(be<=a) break; } }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){ if(!b[i]){ b[i]=HUMAN; best=Math.min(best,minimax(b,d+1,true,a,be,max)); b[i]=null; be=Math.min(be,best); if(be<=a) break; } }
    return best;
  }
}

// ── Win check ──
function winnerOf(b){
  for(const [a,bb,c] of LINES) if(b[a]&&b[a]===b[bb]&&b[a]===b[c]) return b[a];
  return null;
}

function checkResult(){
  for(const line of LINES){
    const [a,b,c]=line;
    if(board[a]&&board[a]===board[b]&&board[a]===board[c]){
      flashCells(line);
      return {winner:board[a]};
    }
  }
  if(board.every(Boolean)) return {winner:null};
  return null;
}

function flashCells(line){
  const cells=document.getElementById('board').children;
  line.forEach(i=>cells[i].classList.add('win'));
}

// ── End / overlay ──
function endGame(r){
  active=false;
  document.getElementById('dots').classList.remove('show');
  if(r.winner) scores[r.winner]++; else scores.draw++;
  updateScores();
  setTimeout(()=>showOverlay(r), 580);
}

function showOverlay(r){
  if(!r.winner){
    document.getElementById('rEmoji').textContent='🤝';
    document.getElementById('rTitle').textContent='平局！';
    document.getElementById('rSub').textContent='勢均力敵，再來一局！';
  } else {
    const sym=r.winner==='O'?'○':'✕';
    if(mode==='single'){
      const won=r.winner===HUMAN;
      document.getElementById('rEmoji').textContent=won?'🎉':'🤖';
      document.getElementById('rTitle').textContent=won?'你贏啦！':'電腦獲勝！';
      const msgs={
        easy:   won?'簡單模式輕鬆過！':'被簡單模式打敗了，加油！',
        medium: won?'普通模式也難不倒你！':'電腦普通模式勝出，再試試！',
        hard:   won?'困難模式都贏了，超強！💪':'困難模式輸了，不要氣餒！',
      };
      document.getElementById('rSub').textContent=msgs[diff];
    } else {
      document.getElementById('rEmoji').textContent='🎊';
      document.getElementById('rTitle').textContent=`玩家${r.winner==='O'?'1':'2'}（${sym}）獲勝！`;
      document.getElementById('rSub').textContent='恭喜！再來一局？';
    }
  }
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); }

function updateScores(){
  document.getElementById('sP1').textContent=scores.O;
  document.getElementById('sP2').textContent=scores.X;
  document.getElementById('sDraw').textContent=scores.draw;
}

// ── Init ──
buildThemeList();
syncDiffUI();
</script>
