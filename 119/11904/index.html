<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極聽歌猜歌王</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 2rem;
            color: #a5b4fc;
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* 模式選擇畫面 */
        .menu-instruction {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* 遊戲主畫面 */
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 模擬播放器樣式 */
        .player-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .vinyl {
            width: 80px;
            height: 80px;
            background: #000;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 5px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 3s linear infinite;
            animation-play-state: paused;
        }

        .vinyl.playing {
            animation-play-state: running;
        }

        .vinyl-center {
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .audio-status {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            color: #38bdf8;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: width 0.1s linear;
        }

        .player-controls .control-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-light);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .player-controls .control-btn:hover {
            border-color: white;
            background: rgba(255,255,255,0.05);
        }

        /* 輸入框模式與選項 */
        .input-area {
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }

        .input-box:focus {
            border-color: var(--primary-color);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .option-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 14px 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-btn:hover {
            background: #475569;
        }

        .option-btn.correct {
            background: var(--success) !important;
        }

        .option-btn.wrong {
            background: var(--error) !important;
        }

        /* 反饋訊息 */
        .feedback {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 27px;
        }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--error); }

        .next-btn {
            margin-top: 15px;
            background: #22c55e;
            width: 100%;
        }
        .next-btn:hover { background: #16a34a; }

        /* 結算畫面 */
        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: #f59e0b;
            margin: 20px 0;
        }
    </style>
</head>

                <button class="btn" onclick="startGame('C')">C: 台灣流行樂曲</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <div id="question-number">題目: 1 / 10</div>
                <div id="score-counter">得分: 0</div>

            <div class="player-box">

                <div class="audio-status" id="player-status">♪ 音樂播放中...</div>

                    <div class="progress-bar" id="music-progress"></div>
                </div>
                <div class="player-controls">
                    <button class="control-btn" id="toggle-play-btn" onclick="togglePlay()">⏸ 暫停</button>
                </div>
            </div>

            <div class="input-area">
                <p style="font-size: 0.9rem; margin-bottom: 8px; color: var(--text-muted);">
                    ⌨️ 做法1：可用鍵盤直接輸入歌名並按 Enter

                <input type="text" id="guess-input" class="input-box" placeholder="在此輸入歌名答案..." onkeydown="handleKeyPress(event)">
                <button class="btn" style="padding: 8px 15px; font-size:0.9rem; width:100%; margin-bottom:15px;" onclick="checkKeyboardAnswer()">提交鍵盤答案</button>

                <p style="font-size: 0.9rem; margin-bottom: 8px; color: var(--text-muted);">

                </p>
                <div class="options-grid" id="options-container">
                    </div>
            </div>

            <div id="feedback-msg" class="feedback"></div>
            <button id="next-question-btn" class="btn next-btn" style="display: none;" onclick="nextQuestion()">進入下一題 ➡️</button>
        </div>

        <div id="result-screen" class="screen">
            <h2>遊戲結束！</h2>
            <p style="margin-top: 10px; color: var(--text-muted);">您在此歌單挑戰中的最終得分為：</p>

            <p id="evaluation-msg" style="margin-bottom: 25px; font-weight: 500;"></p>
            <button class="btn" onclick="returnToMenu()">返回主選單</button>
        </div>
    </div>

        // --- 遊戲狀態變數 ---
        let currentPlaylist = []; // 當前選擇的歌單
        let gameQuestions = [];   // 從中隨機抽取的10道題目
        let currentQuestionIdx = 0; // 當前題號
        let score = 0;            // 得分
        let currentAnswer = "";   // 當前正確答案(歌名)
        let isAnswered = false;   // 本題是否已回答

        // 虛擬播放器定時器變數
        let progressInterval = null;
        let progressPercent = 0;
        let isPlaying = false;

        // --- 遊戲控制邏輯 ---

        // 開始遊戲
        function startGame(listType) {
            // 複製對應歌單並隨機洗牌
            let pool = [...songDatabase[listType]];
            
            // 洗牌演算法 (Fisher-Yates) 確保隨機性
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // 隨機抽取 10 題作為本次挑戰題
            gameQuestions = pool.slice(0, 10);
            
            // 初始化狀態
            currentQuestionIdx = 0;
            score = 0;
            
            // 切換畫面
            switchScreen('game-screen');
            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            isAnswered = false;
            document.getElementById('guess-input').value = "";
            document.getElementById('guess-input').disabled = false;
            document.getElementById('feedback-msg').innerText = "";
            document.getElementById('feedback-msg').className = "feedback";
            document.getElementById('next-question-btn').style.display = "none";
            
            // 更新進度顯示
            document.getElementById('question-number').innerText = `題目: ${currentQuestionIdx + 1} / 10`;
            document.getElementById('score-counter').innerText = `得分: ${score}`;

            // 獲取當前正確題目資料
            let currentQ = gameQuestions[currentQuestionIdx];
            currentAnswer = currentQ.song;

            // 生成隨機4個選項 (包含1個正確答案 + 3個同歌單的隨機歌名)
            let options = generateOptions(currentQ);

            // 渲染選項到滑鼠點擊區
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = "";
            options.forEach((optText, index) => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                // 提示包含歌手，增加提示性與遊戲樂趣
                btn.innerText = `【${optText.singer}】${optText.song}`;
                btn.onclick = () => checkMouseAnswer(optText.song, btn);
                optionsContainer.appendChild(btn);
            });

            // 啟動虛擬播放器（模擬音樂持續播放直到答對）
            startMockPlayer(currentQ.singer);
        }

        // 生成4個相異選項
        function generateOptions(correctQuestion) {
            // 從總歌單中找出其他歌名
            let allSongsInList = [];
            // 合併所有歌單以確保干擾項充足
            Object.keys(songDatabase).forEach(k => {
                allSongsInList = allSongsInList.concat(songDatabase[k]);
            });

            let wrongOptions = allSongsInList.filter(item => item.song !== correctQuestion.song);
            
            // 洗牌錯誤選項
            wrongOptions.sort(() => 0.5 - Math.random());
            
            // 取前3個
            let selectedOptions = wrongOptions.slice(0, 3);
            selectedOptions.push(correctQuestion);
            
            // 重新隨機排列這4個選項
            selectedOptions.sort(() => 0.5 - Math.random());
            return selectedOptions;
        }

        // 虛擬播放器控制
        function startMockPlayer(singerName) {
            clearInterval(progressInterval);
            progressPercent = 0;
            isPlaying = true;
            
            document.getElementById('vinyl-disc').className = "vinyl playing";
            document.getElementById('toggle-play-btn').innerText = "⏸ 暫停";
            document.getElementById('player-status').innerText = `♪ 正在某熱門歌曲...`;
            document.getElementById('music-progress').style.width = "0%";

            // 模擬進度條跑動
            progressInterval = setInterval(() => {
                if (isPlaying) {
                    progressPercent += 1;
                    if (progressPercent > 100) progressPercent = 0; // 循環播放
                    document.getElementById('music-progress').style.width = progressPercent + "%";
                }
            }, 100);
        }

        function stopMockPlayer() {
            clearInterval(progressInterval);
            document.getElementById('vinyl-disc').className = "vinyl";
            isPlaying = false;
            document.getElementById('player-status').innerText = "🛑 歌曲已停止（已答題）";
            document.getElementById('toggle-play-btn').innerText = "▶️ 播放";
        }

        function togglePlay() {
            if (isAnswered) return; // 答對停止後不允許再點
            isPlaying = !isPlaying;
            if (isPlaying) {
                document.getElementById('vinyl-disc').className = "vinyl playing";
                document.getElementById('toggle-play-btn').innerText = "⏸ 暫停";
                document.getElementById('player-status').innerText = document.getElementById('player-status').innerText.replace("⏸ 已暫停", "♪ 正在播放");
            } else {
                document.getElementById('vinyl-disc').className = "vinyl";
                document.getElementById('toggle-play-btn').innerText = "▶️ 播放";
                document.getElementById('player-status').innerText = "⏸ 已暫停音樂播放";
            }
        }

        // --- 答案檢查機制 ---

        // 處理鍵盤 Enter 事件
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                checkKeyboardAnswer();
            }
        }

        // 檢查鍵盤輸入答案
        function checkKeyboardAnswer() {
            if (isAnswered) return;
            let userGuess = document.getElementById('guess-input').value.trim();
            if (!userGuess) return;

            // 忽略大小寫與前後空白進行比對
            if (userGuess.toLowerCase() === currentAnswer.toLowerCase()) {
                handleCorrectAnswer();
            } else {
                handleWrongAnswer(`答錯囉！你輸入的是「${userGuess}」，再試著用滑鼠點擊或重新輸入吧！`);
            }
        }

        // 檢查滑鼠點擊選項答案
        function checkMouseAnswer(selectedSong, btnElement) {
            if (isAnswered) return;

            if (selectedSong === currentAnswer) {
                btnElement.classList.add('correct');
                handleCorrectAnswer();
            } else {
                btnElement.classList.add('wrong');
                handleWrongAnswer(`點擊錯誤！不是這首，音樂仍在播放中...`);
                // 1.5秒後清除該按鈕的錯誤紅色，允許玩家繼續猜
                setTimeout(() => { if(!isAnswered) btnElement.classList.remove('wrong'); }, 1500);
            }
        }

        // 答對時的處理程序
        function handleCorrectAnswer() {
            isAnswered = true;
            score += 10; // 每題10分，10題滿分100分
            document.getElementById('score-counter').innerText = `得分: ${score}`;
            
            // 停止播放音樂（符合需求：播放歌曲直到玩家猜出是哪一首後停止）
            stopMockPlayer();

            // 顯示正確反饋與下一題按鈕
            let fb = document.getElementById('feedback-msg');
            fb.innerText = `🎉 恭喜答對！正確歌名就是《${currentAnswer}》`;
            fb.className = "feedback correct";

            document.getElementById('guess-input').disabled = true;
            document.getElementById('next-question-btn').style.display = "block";
        }

        // 答錯時的處理程序
        function handleWrongAnswer(msg) {
            let fb = document.getElementById('feedback-msg');
            fb.innerText = msg;
            fb.className = "feedback wrong";
        }

        // 進入下一題或結算
        function nextQuestion() {
            currentQuestionIdx++;
            if (currentQuestionIdx < 10) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        // 遊戲結束結算
        function endGame() {
            stopMockPlayer();
            switchScreen('result-screen');
            document.getElementById('final-score').innerText = `${score} / 100`;
            
            let evaluation = "";
            if (score === 100) evaluation = "👑 太神了！你是絕對的終極音樂歌王！";
            else if (score >= 70) evaluation = "🔥 厲害喔！對這些歌曲如數家珍！";
            else if (score >= 40) evaluation = "🎵 還不錯，再多聽一點歌就能拿到高分！";
            else evaluation = "🎧 沒關係，再接再厲！快回主選單重選歌單挑戰吧！";
            
            document.getElementById('evaluation-msg').innerText = evaluation;
        }

        // 返回主選單
        function returnToMenu() {
            switchScreen('menu-screen');
        }

        // 切換畫面輔助函式
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
