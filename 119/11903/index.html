<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記憶翻牌遊戲</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

.info{
    display:flex;
    gap:30px;
    margin-bottom:15px;
    font-size:20px;
    font-weight:bold;
}

#message{
    margin-bottom:15px;
    font-size:18px;
    color:#444;
}

.board{
    display:grid;
    grid-template-columns:repeat(4,120px);
    grid-template-rows:repeat(4,120px);
    gap:10px;
}

.card{
    width:120px;
    height:120px;
    position:relative;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:transform 0.5s;
}

.card.flipped{
    transform:rotateY(180deg);
}

.card-front,
.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:12px;
    overflow:hidden;
    backface-visibility:hidden;
    border:2px solid #ddd;
}

.card-front{
    transform:rotateY(180deg);
    background:white;
}

.card-front img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-back{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

#result{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
    color:#ff5722;
}

@media(max-width:600px){

    .board{
        grid-template-columns:repeat(4,80px);
        grid-template-rows:repeat(4,80px);
    }

    .card{
        width:80px;
        height:80px;
    }
}
</style>
</head>
<body>

<h1>記憶翻牌遊戲</h1>

<div class="info">
    <div>時間：<span id="timer">0.0</span> 秒</div>
</div>

<div id="message">請記住所有卡牌圖案（3秒）</div>

<div class="board" id="board"></div>

<div id="result"></div>

<script>

const imageFiles = [
    "kitty.png",
    "Melody.png",
    "大耳狗.png",
    "布丁狗.png",
    "怕恰狗.png",
    "庫洛米.png",
    "醜魚.png",
    "酷企鵝.png"
];

const cardsData = [...imageFiles, ...imageFiles];

shuffle(cardsData);

const board = document.getElementById("board");

let firstCard = null;
let secondCard = null;
let lockBoard = true;
let matchedCount = 0;

let startTime = null;
let timerInterval = null;

cardsData.forEach(img => {

    const card = document.createElement("div");
    card.className = "card flipped";
    card.dataset.image = img;

    card.innerHTML = `
        <div class="card-front">
            <img src="${img}">
        </div>
        <div class="card-back">?</div>
    `;

    card.addEventListener("click", flipCard);

    board.appendChild(card);
});

setTimeout(() => {

    document.querySelectorAll(".card").forEach(card=>{
        card.classList.remove("flipped");
    });

    document.getElementById("message").textContent =
        "開始遊戲！";

    lockBoard = false;

    startTime = Date.now();

    timerInterval = setInterval(() => {

        const elapsed =
            (Date.now() - startTime) / 1000;

        document.getElementById("timer").textContent =
            elapsed.toFixed(1);

    },100);

},3000);

function flipCard(){

    if(lockBoard) return;

    if(this.classList.contains("matched")) return;

    if(this === firstCard) return;

    this.classList.add("flipped");

    if(!firstCard){
        firstCard = this;
        return;
    }

    secondCard = this;
    lockBoard = true;

    checkMatch();
}

function checkMatch(){

    const same =
        firstCard.dataset.image ===
        secondCard.dataset.image;

    if(same){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matchedCount += 2;

        resetTurn();

        if(matchedCount === 16){
            gameClear();
        }

    }else{

        setTimeout(()=>{

            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");

            resetTurn();

        },1000);
    }
}

function resetTurn(){

    firstCard = null;
    secondCard = null;
    lockBoard = false;
}

function gameClear(){

    clearInterval(timerInterval);

    const time =
        (Date.now() - startTime) / 1000;

    let rank;

    if(time <= 15){
        rank = "S";
    }
    else if(time <= 20){
        rank = "A";
    }
    else if(time <= 30){
        rank = "B";
    }
    else{
        rank = "C";
    }

    document.getElementById("message").textContent =
        "恭喜完成！";

    document.getElementById("result").innerHTML =
        `
        完成時間：${time.toFixed(1)} 秒<br>
        評價：${rank} 級
        `;
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j =
            Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }
}

</script>

</body>
</html>
