<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理輔導小測驗</title>

<style>
    *{
        box-sizing:border-box;
        font-family:"Microsoft JhengHei",sans-serif;
    }

    body{
        background:#ffffff;
        margin:0;
        padding:30px;
        color:#333;
    }

    .container{
        max-width:800px;
        margin:auto;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        color:#2c7a7b;
    }

    .subtitle{
        text-align:center;
        margin-bottom:30px;
        color:#666;
    }

    .question{
        margin-bottom:25px;
        padding:20px;
        background:#f7f9fa;
        border-radius:10px;
    }

    .question h3{
        margin-top:0;
    }

    label{
        display:block;
        margin:10px 0;
        cursor:pointer;
    }

    button{
        display:block;
        margin:20px auto;
        padding:12px 30px;
        border:none;
        border-radius:8px;
        background:#2c7a7b;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#246567;
    }

    #result{
        margin-top:25px;
        padding:20px;
        border-radius:10px;
        background:#eef8f8;
        display:none;
    }

    .score{
        font-size:22px;
        font-weight:bold;
        color:#2c7a7b;
    }
</style>
</head>
<body>

<div class="container">

    <h1>心理輔導小測驗</h1>

    <p class="subtitle">
        請依照最近一週的感受作答。本測驗僅供參考，不能取代專業心理評估。
    </p>

    <form id="quizForm">

        <div class="question">
            <h3>1. 最近遇到壓力時，你通常會？</h3>

            <label>
                <input type="radio" name="q1" value="3">
                保持冷靜並尋找解決方法
            </label>

            <label>
                <input type="radio" name="q1" value="2">
                有些焦慮，但仍能面對
            </label>

            <label>
                <input type="radio" name="q1" value="1">
                常感到緊張或不知所措
            </label>
        </div>

        <div class="question">
            <h3>2. 最近你的情緒狀態如何？</h3>

            <label>
                <input type="radio" name="q2" value="3">
                大多數時間都很穩定
            </label>

            <label>
                <input type="radio" name="q2" value="2">
                偶爾會有情緒起伏
            </label>

            <label>
                <input type="radio" name="q2" value="1">
                經常感到低落或煩躁
            </label>
        </div>

        <div class="question">
            <h3>3. 當需要幫助時，你會？</h3>

            <label>
                <input type="radio" name="q3" value="3">
                主動向家人、朋友或老師求助
            </label>

            <label>
                <input type="radio" name="q3" value="2">
                視情況而定
            </label>

            <label>
                <input type="radio" name="q3" value="1">
                傾向自己承受，不太求助
            </label>
        </div>

        <button type="button" onclick="showResult()">
            查看結果
        </button>

    </form>

    <div id="result"></div>

</div>

<script>
function showResult(){

    const q1 = document.querySelector('input[name="q1"]:checked');
    const q2 = document.querySelector('input[name="q2"]:checked');
    const q3 = document.querySelector('input[name="q3"]:checked');

    if(!q1 || !q2 || !q3){
        alert("請完成所有題目！");
        return;
    }

    let score =
        Number(q1.value) +
        Number(q2.value) +
        Number(q3.value);

    let message = "";

    if(score >= 8){
        message = `
        <div class="score">得分：${score} / 9</div>
        <p>
        目前看起來你的心理調適能力不錯，
        面對壓力時具有一定的應對能力。
        建議持續保持良好的生活作息與人際互動。
        </p>
        `;
    }
    else if(score >= 5){
        message = `
        <div class="score">得分：${score} / 9</div>
        <p>
        你偶爾可能會受到壓力或情緒影響。
        建議適度休息、運動，並與信任的人分享感受。
        </p>
        `;
    }
    else{
        message = `
        <div class="score">得分：${score} / 9</div>
        <p>
        近期可能承受較多壓力或情緒困擾。
        若情況持續影響生活，建議尋求師長、
        輔導老師或心理專業人員的協助。
        </p>
        `;
    }

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = message;
    resultDiv.style.display = "block";
}
</script>

</body>
</html>
