<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老公抽抽樂</title>
    <style>
        /* 網頁外觀：背景白色，文字黑色 */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* 按鈕樣式 */
        .draw-btn {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        /* 按鈕懸浮效果 */
        .draw-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* 圖片顯示區域 */
        .image-container {
            width: 100%;
            max-width: 500px;
            height: 400px;
            border: 2px dashed #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; /* 預設先隱藏圖片 */
        }

        /* 老公名字顯示樣式 */
        .partner-name {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            min-height: 36px; /* 固定高度防止畫面跳動 */
        }

        .placeholder-text {
            color: #888888;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>老公抽抽樂</h1>

    <button class="draw-btn" onclick="drawPartner()">來點新鮮的</button>

    <div class="image-container">
        <div id="placeholder" class="placeholder-text">按下按鈕開始抽獎！</div>
        <img id="partner-img" src="" alt="老公照片">
    </div>

    <div id="name-display" class="partner-name"></div>

        function drawPartner() {
            if (images.length === 0 || images[0] === "孔劉.jpg") {
                alert("請記得先用文字編輯修改程式碼中的 images 清單，換成你資料夾裡的照片名稱喔！");
                return;
            }

            // 隨機取得陣列中的一個圖片檔名
            const randomIndex = Math.floor(Math.random() * images.length);
            const selectedImage = images[randomIndex];

            // 取得網頁上的元素
            const imgElement = document.getElementById('partner-img');
            const placeholderElement = document.getElementById('placeholder');
            const nameElement = document.getElementById('name-display');

            // 隱藏預設文字，顯示圖片並替換路徑
            placeholderElement.style.display = 'none';
            imgElement.src = selectedImage;
            imgElement.style.display = 'block';

            // 自動切掉結尾的 .jpg 或 .png 或 .webp，只顯示名字
            const cleanName = selectedImage.replace(/\.(jpg|jpeg|png|webp)$/i, '');
            nameElement.textContent = cleanName;
        }
    </script>

</body>
</html>
