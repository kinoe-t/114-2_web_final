        { "type": "日本動漫", "title": "七龍珠", "poster": "https://upload.wikimedia.org/wikipedia/zh/3/31/Dragon_Ball_vol_1.jpg", "description": "鳥山明不朽名作，悟空的熱血進化史與超級賽亞人，全球動漫的頂天柱。" },
        { "type": "迪士尼動畫", "title": "超能陸戰隊 (大英雄天團)", "poster": "https://upload.wikimedia.org/wikipedia/en/4/4b/Big_Hero_6_(film)_poster.jpg", "description": "舊京山科技少年的復仇與釋懷，全網最暖心充氣機器人「杯麵」的終極治癒。" }
      ]
    };

    // 核心查詢功能
    function checkBirthdayMonth() {
      const month = document.getElementById("month").value;
      
      if (!month) {
        alert("請選擇你的生日月份！");
        return;
      }
      
      const movies = movieDatabase[month]; 
      
      // 隱藏查詢控制區
      document.getElementById("searchControls").style.display = "none";
      
      const firstMovie = movies[0]; // 第一部：真人電影
      const classicScreen = document.getElementById("classicScreen");
      const bgm = document.getElementById("bgm");
      
      // 設定真人電影大螢幕劇照與音樂
      document.getElementById("classicImage").src = firstMovie.classic;
      bgm.src = firstMovie.music;
      
      // 顯示滿版開場劇照並播放背景音樂
      classicScreen.classList.add("active");
      bgm.play().catch(e => console.log("音樂播放受限，需使用者互動", e));
      
      // 預先在幕後把結果卡片 HTML 生成好
      const container = document.getElementById("moviesContainer");
      container.innerHTML = ""; 
      
      movies.forEach(item => {
        let badgeClass = "movie";
        if (item.type === "日本動漫") badgeClass = "anime";
        if (item.type === "迪士尼動畫") badgeClass = "disney";
        
        const cardHtml = `
          <div class="work">
            <span class="badge ${badgeClass}">${item.type}</span>
            <img src="${item.poster}" alt="${item.title}">
            <h3>${item.title}</h3>
            <p class="desc">${item.description}</p>
          </div>
        `;
        container.innerHTML += cardHtml;
      });

      // 設定 4 秒後大螢幕「淡出」，並接續「依序淡入」卡片
      setTimeout(() => {
        classicScreen.classList.remove("active");
        bgm.pause();
        bgm.currentTime = 0; 
        
        // 顯示結果外層
        document.getElementById("result").style.display = "block";
        
        const cards = document.querySelectorAll(".work");
        
        // 卡片依序優雅淡入
        setTimeout(() => { cards[0].classList.add("visible"); }, 100);
        setTimeout(() => { if(cards[1]) cards[1].classList.add("visible"); }, 1600);
        setTimeout(() => { if(cards[2]) cards[2].classList.add("visible"); }, 3100);
        
        // 最後顯示「回到首頁」按鈕
        setTimeout(() => {
          document.getElementById("exitBtn").style.display = "block";
        }, 4100);

      }, 4000); 
    }

    // 回到首頁功能
    function goHome() {
      document.getElementById("result").style.display = "none";
      document.getElementById("exitBtn").style.display = "none";
      document.getElementById("month").value = "";
      document.getElementById("searchControls").style.display = "block";
    }
  </script>
