<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是我的眼</title>

<style>
body{
    background:white;
    text-align:center;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    font-size:80px;
    font-weight:900;
    margin:20px 0;
    background:linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        purple
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#eyesImage,
#fullImage{
    width:90%;
    max-width:450px;
    border:4px solid black;
    margin:20px 0;
}

#fullImage{
    display:none;
}

input{
    font-size:24px;
    padding:10px;
    width:120px;
    text-align:center;
}

button{
    font-size:22px;
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
}

#result{
    font-size:30px;
    font-weight:bold;
    margin-top:20px;
}

#nextBtn{
    display:none;
}

footer{
    margin-top:60px;
    color:#666;
    font-size:18px;
}

#questionNumber{
    font-size:24px;
    margin-bottom:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>
<body>

<h1>你是我的眼</h1>

<div id="questionNumber"></div>

<h2>請猜猜這雙眼睛的主人是誰 👀(座號不用加0)</h2>

<img id="eyesImage">

<br>

<input
    type="number"
    id="answer"
    placeholder="座號"
>

<br>

<button id="submitBtn" onclick="checkAnswer()">
送出答案
</button>

<div id="result"></div>

<div>
    <img id="fullImage">
</div>

<button id="nextBtn" onclick="nextQuestion()">
下一題 ➜
</button>

<footer>
此網站僅供娛樂，感謝各位的盛情演出💃❤️‍🔥❤️‍🔥
</footer>

<script>

/* =========================
   題庫
   請把班上所有座號加進來
========================= */

const questions = [
    "1",
    "2",
    "3",
    "4",
    "7",
    "9",
    "10",
    "11",
    "18",
    "21",
    "26",
    "30",
];

/* ========================= */

let remainingQuestions = [...questions];
let currentAnswer = "";

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

shuffle(remainingQuestions);

function loadQuestion(){

    if(remainingQuestions.length===0){

        document.body.innerHTML = `
            <h1 style="
                font-size:80px;
                background:linear-gradient(
                    90deg,
                    red,
                    orange,
                    yellow,
                    green,
                    cyan,
                    blue,
                    purple
                );
                -webkit-background-clip:text;
                -webkit-text-fill-color:transparent;
            ">
            挑戰完成！
            </h1>

            <h2>🎉 你已經猜完所有題目 🎉</h2>

            <p style="margin-top:50px;color:#666;">
            此網站僅供娛樂，感謝各位的盛情演出💃❤️‍🔥❤️‍🔥
            </p>
        `;
        return;
    }

    currentAnswer = remainingQuestions.pop();

    document.getElementById("questionNumber").innerText =
        `剩餘題數：${remainingQuestions.length + 1}`;

    document.getElementById("eyesImage").src =
        currentAnswer + "-2.jpg";

    document.getElementById("fullImage").src =
        currentAnswer + "-1.jpg";

    document.getElementById("fullImage").style.display = "none";

    document.getElementById("result").innerHTML = "";

    document.getElementById("answer").value = "";

    document.getElementById("submitBtn").style.display = "inline-block";

    document.getElementById("nextBtn").style.display = "none";
}

function checkAnswer(){

    const userAnswer =
        document.getElementById("answer")
        .value
        .trim();

    const result =
        document.getElementById("result");

    if(userAnswer === Number(currentAnswer).toString()){

        result.innerHTML =
            "🎉 答對了！你是眼睛專家😎！";

        confetti({
            particleCount:150,
            spread:100,
            origin:{y:0.6}
        });

    }else{

        result.innerHTML =
            `
            😡 答錯了！你太不了解同學了！<br><br>
            同學表示很受傷💔<br><br>
            正確答案：${currentAnswer}
            `;
    }

    document.getElementById("fullImage").style.display = "inline";

    document.getElementById("submitBtn").style.display = "none";

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion(){
    loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
