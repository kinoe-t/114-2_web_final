<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消失的燈塔守衛</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--panel:#0c1220;--panel2:#101828;
  --sea:#0a1628;--sky:#0d1f3c;
  --gold:#7eb8d4;--goldl:#a8d4e8;--goldd:#4a7a94;
  --accent:#c8a44a;--accentl:#e0bc6a;--accentd:#8a6a28;
  --txt:#c8dce8;--txtd:#6a8a9e;--txtm:#3a5a6e;
  --border:rgba(126,184,212,0.18);--borderl:rgba(126,184,212,0.45);
  --red:#7a2020;--green:#1a5a2a;
  --danger:#e05030;--safe:#40a060;
}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── TITLE ── */
#s-title{
  align-items:center;justify-content:center;text-align:center;
  padding:3rem 1.5rem;
  background:radial-gradient(ellipse at 50% 60%,#0d1f3c 0%,#06090f 70%);
  position:relative;overflow:hidden
}
.stars{position:absolute;inset:0;pointer-events:none}
.t-eye{font-size:3.5rem;margin-bottom:1.5rem;display:block;filter:drop-shadow(0 0 20px rgba(200,164,74,0.5))}
.t-main{
  font-family:'Noto Serif TC',serif;font-size:clamp(2rem,5vw,3.2rem);
  font-weight:700;color:var(--accent);letter-spacing:.12em;
  text-shadow:0 0 40px rgba(200,164,74,0.3);margin-bottom:.4rem
}
.t-sub{font-size:.8rem;color:var(--txtd);letter-spacing:.6em;margin-bottom:2rem}
.t-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--goldd),transparent);margin:0 auto 2rem}
.t-story{
  max-width:480px;margin:0 auto 2.5rem;color:var(--txtd);
  font-size:.9rem;line-height:2.1;
  border:1px solid var(--border);padding:1.6rem 2rem;
  background:rgba(10,22,40,0.6);position:relative
}
.t-story::before,.t-story::after{
  content:'';position:absolute;width:12px;height:12px;
  border-color:var(--goldd);border-style:solid
}
.t-story::before{top:-1px;left:-1px;border-width:1px 0 0 1px}
.t-story::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0}
.btn{
  background:transparent;border:1px solid var(--accent);color:var(--accent);
  font-family:'Noto Sans TC',sans-serif;font-size:.9rem;letter-spacing:.25em;
  padding:.85rem 2.5rem;cursor:pointer;transition:all .3s;
  position:relative
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:rgba(200,164,74,0);transition:background .3s
}
.btn:hover::before{background:rgba(200,164,74,0.08)}
.btn:hover{box-shadow:0 0 30px rgba(200,164,74,0.15)}
.btn:active{transform:scale(.97)}
.btn-sm{padding:.35rem .9rem;font-size:.75rem;letter-spacing:.12em;border-color:var(--border)}
.btn-sm:hover{border-color:var(--goldd);color:var(--goldd)}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover::before{background:rgba(224,80,48,0.08)}

/* ── GAME ── */
#s-game{flex-direction:column}
.hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1.2rem;background:#040709;
  border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.4rem;z-index:50
}
.hud-title{font-family:'Noto Serif TC',serif;color:var(--accent);font-size:.82rem;letter-spacing:.2em}
.hud-center{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-timer{
  font-family:'Space Mono',monospace;font-size:1.35rem;
  color:var(--txt);letter-spacing:.1em;
  transition:color .5s
}
.hud-timer.warn{color:var(--danger);animation:pulse 1s ease-in-out infinite}
.hud-timer.ok{color:var(--safe)}
.timer-bar-wrap{width:160px;height:3px;background:#1a2a38;border-radius:2px;overflow:hidden}
.timer-bar{height:100%;background:var(--safe);border-radius:2px;transition:width 1s linear,background .5s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.hud-r{display:flex;gap:.5rem;align-items:center}
.hint-badge{
  font-family:'Space Mono',monospace;font-size:.7rem;
  color:var(--txtd);background:#0c1828;border:1px solid var(--border);
  padding:.2rem .5rem;letter-spacing:.05em
}
.prog-wrap{height:1px;background:#080c14}
.prog{height:100%;background:var(--accent);transition:width .8s cubic-bezier(.4,0,.2,1)}

.game-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── PANORAMA ── */
.pano-outer{flex:1;min-width:0;position:relative;overflow:hidden;background:var(--sea);cursor:grab}
.pano-outer:active{cursor:grabbing}
.pano-inner{
  position:absolute;top:0;bottom:0;
  width:2000px;
  display:flex;align-items:stretch
}
.room-svg{width:100%;height:100%;display:block;min-height:480px}
.pano-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:rgba(126,184,212,0.4);letter-spacing:.15em;
  pointer-events:none;transition:opacity 1s
}

/* hotspots */
.hotspot{cursor:pointer;transition:opacity .2s}
.hotspot .hs-ring{opacity:0;transition:opacity .2s;pointer-events:none}
.hotspot:hover .hs-ring{opacity:1}
.hotspot.done{opacity:.35;pointer-events:none}

/* ── SIDE PANEL ── */
.side{
  width:250px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--panel);border-left:1px solid var(--border);overflow-y:auto
}
.pane{padding:.85rem 1rem;border-bottom:1px solid var(--border)}
.pane-label{
  font-size:.62rem;color:var(--txtm);letter-spacing:.4em;
  margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem
}
.pane-label::after{content:'';flex:1;height:1px;background:var(--border)}
.inv-grid{display:flex;flex-direction:column;gap:.3rem;min-height:20px}
.inv-chip{
  background:var(--panel2);border:1px solid var(--border);
  padding:.3rem .65rem;font-size:.74rem;color:var(--txtd);
  display:flex;align-items:center;gap:.4rem
}
.inv-chip .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0}
.locks-wrap{padding:.85rem 1rem}
.lock-row{
  display:flex;align-items:center;gap:.6rem;padding:.42rem .6rem;
  border:1px solid var(--border);margin-bottom:.35rem;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden
}
.lock-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:rgba(126,184,212,0.04);transition:width .3s
}
.lock-row:hover::before{width:100%}
.lock-row:hover{border-color:var(--goldd)}
.lock-row.open{opacity:.5;pointer-events:none}
.lock-row.open::before{width:100%;background:rgba(64,160,96,0.06)}
.lock-icon{font-size:.9rem;flex-shrink:0;font-family:'Space Mono',monospace}
.lock-label{font-size:.78rem;flex:1}
.lock-status{
  font-size:.62rem;font-family:'Space Mono',monospace;
  color:var(--txtm);letter-spacing:.05em
}
.lock-row.open .lock-status{color:var(--safe)}
.door-btn-wrap{padding:0 1rem 1rem}
.notes-wrap{flex:1;padding:.85rem 1rem;overflow-y:auto;max-height:240px}
.note-entry{
  font-size:.76rem;color:var(--txtd);line-height:1.85;
  padding:.35rem 0;border-bottom:1px solid rgba(126,184,212,0.06)
}
.note-entry:last-child{border-bottom:none}
.note-new{color:var(--goldl);animation:fadeNote 3s forwards}
@keyframes fadeNote{0%{color:var(--goldl)}100%{color:var(--txtd)}}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:200;
  align-items:center;justify-content:center;padding:1rem;
  backdrop-filter:blur(4px)
}
.overlay.open{display:flex}
.modal{
  background:var(--panel);border:1px solid var(--borderl);
  max-width:500px;width:100%;padding:1.8rem;
  position:relative;max-height:92vh;overflow-y:auto;
  box-shadow:0 0 60px rgba(0,0,0,.8)
}
.modal-corner{position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid}
.modal-corner.tl{top:0;left:0;border-width:1px 0 0 1px}
.modal-corner.tr{top:0;right:0;border-width:1px 1px 0 0}
.modal-corner.bl{bottom:0;left:0;border-width:0 0 1px 1px}
.modal-corner.br{bottom:0;right:0;border-width:0 1px 1px 0}
.modal-title{
  font-family:'Noto Serif TC',serif;color:var(--accent);
  font-size:1.05rem;margin-bottom:1rem;
  padding-bottom:.7rem;border-bottom:1px solid var(--border)
}
.modal-body{font-size:.85rem;color:var(--txtd);line-height:2}
.modal-close{
  position:absolute;top:.9rem;right:1rem;background:none;border:none;
  color:var(--txtm);font-size:1rem;cursor:pointer;
  transition:color .2s;font-family:'Space Mono',monospace;letter-spacing:0
}
.modal-close:hover{color:var(--accent)}
.modal-acts{margin-top:1.2rem;display:flex;gap:.5rem;flex-wrap:wrap;justify-content:flex-end}

/* ── PUZZLE WIDGETS ── */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;margin:.8rem 0}
.kbtn{
  background:#070b12;border:1px solid var(--border);
  color:var(--txt);font-family:'Space Mono',monospace;
  font-size:.95rem;padding:.55rem;cursor:pointer;
  transition:all .18s
}
.kbtn:hover{border-color:var(--goldd);background:#0c1520}
.kbtn:active{transform:scale(.93)}
.kdisp{
  text-align:center;font-family:'Space Mono',monospace;font-size:1.6rem;
  color:var(--accent);letter-spacing:.6em;padding:.5rem;
  background:#070b12;border:1px solid var(--border);margin-bottom:.5rem;
  min-height:60px;display:flex;align-items:center;justify-content:center
}
.kdisp .cursor{animation:blink-c .8s infinite;color:var(--goldd)}
@keyframes blink-c{0%,49%{opacity:1}50%,100%{opacity:0}}

/* Frequency dial puzzle */
.freq-display{
  background:#070b12;border:1px solid var(--border);
  padding:1rem;margin:.8rem 0;text-align:center;
  font-family:'Space Mono',monospace
}
.freq-val{font-size:2rem;color:var(--accent);letter-spacing:.1em}
.freq-unit{font-size:.7rem;color:var(--txtm);letter-spacing:.3em;display:block;margin-top:.2rem}
.freq-controls{display:flex;gap:.4rem;justify-content:center;margin:.6rem 0}
.freq-btn{
  background:#070b12;border:1px solid var(--border);color:var(--txt);
  font-family:'Space Mono',monospace;font-size:.9rem;padding:.4rem .9rem;
  cursor:pointer;transition:all .18s
}
.freq-btn:hover{border-color:var(--goldd)}
.freq-presets{display:flex;gap:.3rem;flex-wrap:wrap;margin:.5rem 0}
.freq-pre{
  background:#070b12;border:1px solid var(--border);color:var(--txtd);
  font-size:.72rem;font-family:'Space Mono',monospace;
  padding:.25rem .5rem;cursor:pointer;transition:all .18s
}
.freq-pre:hover{border-color:var(--accent);color:var(--accent)}
.freq-pre.active{border-color:var(--accent);color:var(--accent);background:rgba(126,184,212,0.06)}

/* Mirror angle puzzle */
.mirror-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:3px;margin:.8rem auto;width:fit-content
}
.mirror-cell{
  width:52px;height:52px;background:#070b12;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.2rem;transition:all .18s;position:relative
}
.mirror-cell:hover:not(.fixed){border-color:var(--goldd);background:#0c1520}
.mirror-cell.fixed{cursor:default;background:#0a1018}
.mirror-cell.lit{background:rgba(200,164,74,0.12);border-color:rgba(200,164,74,0.4)}
.mirror-cell svg{pointer-events:none}

/* Knot sequence puzzle */
.knot-sequence{display:flex;gap:.4rem;margin:.8rem 0;flex-wrap:wrap}
.knot-btn{
  background:#070b12;border:1px solid var(--border);color:var(--txt);
  font-size:1.1rem;width:44px;height:44px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;font-family:'Space Mono',monospace
}
.knot-btn:hover{border-color:var(--accent)}
.knot-btn.sel{border-color:var(--accent);background:rgba(126,184,212,0.1);color:var(--accent)}
.knot-slots{display:flex;gap:.4rem;margin:.6rem 0;min-height:52px;align-items:center}
.knot-slot{
  width:44px;height:44px;background:#040709;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  font-family:'Space Mono',monospace;color:var(--accent)
}
.knot-slot.empty{color:var(--txtm)}

.msg{
  margin-top:.6rem;padding:.4rem .8rem;font-size:.78rem;
  border-left:2px solid transparent;display:none;
  font-family:'Space Mono',monospace
}
.msg.ok{display:block;border-color:var(--safe);color:var(--safe);background:rgba(40,120,80,.08)}
.msg.err{display:block;border-color:var(--danger);color:var(--danger);background:rgba(120,40,30,.08)}

/* ── END ── */
#s-end{
  align-items:center;justify-content:center;text-align:center;
  padding:3rem 1.5rem;
  background:radial-gradient(ellipse at center,#0d1f3c 0%,#06090f 65%)
}
.end-ico{font-size:3.5rem;margin-bottom:1.5rem;display:block;
  filter:drop-shadow(0 0 20px rgba(200,164,74,0.5))}
.end-title{font-family:'Noto Serif TC',serif;font-size:1.8rem;color:var(--accent);margin-bottom:.8rem}
.end-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--goldd),transparent);margin:1rem auto}
.end-desc{color:var(--txtd);font-size:.87rem;line-height:2;max-width:420px;margin:0 auto 2rem}
.end-stats{display:flex;gap:2rem;justify-content:center;margin:1.5rem 0;flex-wrap:wrap}
.stat-val{font-family:'Space Mono',monospace;font-size:1.8rem;color:var(--accent)}
.stat-lbl{font-size:.68rem;color:var(--txtm);letter-spacing:.25em;margin-top:.2rem}

@media(max-width:680px){
  .game-body{flex-direction:column}
  .side{width:100%;max-height:260px;flex-direction:row;flex-wrap:wrap;overflow-y:visible}
  .pane,.locks-wrap,.notes-wrap{flex:1;min-width:150px}
  .notes-wrap{max-height:100px}
}
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <canvas class="stars" id="starCanvas"></canvas>
  <span class="t-eye">⚓</span>
  <h1 class="t-main">消失的燈塔守衛</h1>
  <p class="t-sub">密室逃脫 · 第二章</p>
  <div class="t-divider"></div>
  <div class="t-story">
    1953年，孤島燈塔守衛麥爾斯在一個風暴之夜憑空消失。<br>
    他留下了無線電、密碼、和一個不能說出的秘密。<br><br>
    你受困於燈塔之中。<strong style="color:var(--accent)">25分鐘</strong>後，
    漲潮將淹沒唯一的出口。<br>
    那些線索就藏在房間的每個角落。
  </div>
  <button class="btn" onclick="startGame()">進入燈塔</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="hud">
    <span class="hud-title">⚓ 消失的燈塔守衛</span>
    <div class="hud-center">
      <span class="hud-timer" id="hud-timer">25:00</span>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    </div>
    <div class="hud-r">
      <span class="hint-badge" id="hint-badge">HINT ×2</span>
      <button class="btn btn-sm" onclick="useHint()">求助</button>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog" id="prog" style="width:0%"></div></div>

  <div class="game-body">
    <!-- PANORAMA SVG SCENE -->
    <div class="pano-outer" id="pano-outer">
      <div class="pano-inner" id="pano-inner">
        <svg class="room-svg" viewBox="0 0 2000 520" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">
          <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#050c1a"/>
              <stop offset="100%" stop-color="#0a1830"/>
            </linearGradient>
            <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#081428"/>
              <stop offset="100%" stop-color="#040a18"/>
            </linearGradient>
            <radialGradient id="lampBeam" cx="50%" cy="100%" r="100%">
              <stop offset="0%" stop-color="#c8a44a" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#c8a44a" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="lampCore" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.9"/>
              <stop offset="60%" stop-color="#c8a44a" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#c8a44a" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0c1828"/>
              <stop offset="100%" stop-color="#08101e"/>
            </linearGradient>
            <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0e1a2c"/>
              <stop offset="100%" stop-color="#090f1c"/>
            </linearGradient>
            <linearGradient id="ironGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#1e2a3a"/>
              <stop offset="50%" stop-color="#2a3848"/>
              <stop offset="100%" stop-color="#182030"/>
            </linearGradient>
            <pattern id="woodPattern" x="0" y="0" width="40" height="8" patternUnits="userSpaceOnUse">
              <rect width="40" height="8" fill="#0e1a2c"/>
              <line x1="0" y1="7.5" x2="40" y2="7.5" stroke="#0a1420" stroke-width=".5"/>
              <rect x="0" y="0" width="20" height="7.5" fill="none" stroke="#121e2e" stroke-width=".3"/>
            </pattern>
            <pattern id="wallPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
              <rect width="60" height="60" fill="#0c1828"/>
              <rect x="0" y="0" width="29" height="29" fill="none" stroke="#0e1c30" stroke-width=".5"/>
              <rect x="31" y="0" width="29" height="29" fill="none" stroke="#0a1424" stroke-width=".5"/>
              <rect x="0" y="31" width="29" height="29" fill="none" stroke="#0a1424" stroke-width=".5"/>
              <rect x="31" y="31" width="29" height="29" fill="none" stroke="#0e1c30" stroke-width=".5"/>
            </pattern>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="softglow">
              <feGaussianBlur stdDeviation="8" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <clipPath id="roomClip"><rect width="2000" height="520"/></clipPath>
          </defs>
          <g clip-path="url(#roomClip)">

          <!-- ═══ BACKGROUND OUTSIDE WINDOW ═══ -->
          <!-- sky -->
          <rect x="0" y="0" width="2000" height="520" fill="url(#skyGrad)"/>
          <!-- stars visible through windows -->
          <circle cx="520" cy="60" r="1" fill="#c8d8e8" opacity=".6"/>
          <circle cx="560" cy="40" r=".8" fill="#c8d8e8" opacity=".5"/>
          <circle cx="600" cy="70" r="1.2" fill="#c8d8e8" opacity=".7"/>
          <circle cx="540" cy="85" r=".6" fill="#c8d8e8" opacity=".4"/>
          <circle cx="580" cy="55" r=".9" fill="#c8d8e8" opacity=".6"/>
          <circle cx="1420" cy="55" r="1" fill="#c8d8e8" opacity=".6"/>
          <circle cx="1460" cy="30" r=".8" fill="#c8d8e8" opacity=".5"/>
          <circle cx="1500" cy="80" r="1.1" fill="#c8d8e8" opacity=".7"/>
          <circle cx="1440" cy="90" r=".7" fill="#c8d8e8" opacity=".4"/>
          <!-- sea through windows -->
          <rect x="480" y="200" width="170" height="200" fill="url(#seaGrad)" opacity=".8"/>
          <rect x="1390" y="200" width="170" height="200" fill="url(#seaGrad)" opacity=".8"/>
          <!-- wave lines -->
          <path d="M480,300 Q530,295 580,300 Q630,305 650,300" stroke="#1a2e48" stroke-width="1" fill="none" opacity=".7"/>
          <path d="M480,320 Q540,314 590,320 Q630,326 650,320" stroke="#1a2e48" stroke-width="1" fill="none" opacity=".5"/>
          <path d="M1390,290 Q1440,285 1490,290 Q1530,295 1560,290" stroke="#1a2e48" stroke-width="1" fill="none" opacity=".7"/>
          <!-- distant lighthouse beam from outside -->

  for(let i=0;i<200;i++){

  outer.addEventListener('mousedown',e=>{dragging=true;startX=e.pageX-outer.offsetLeft;scrollLeft=outer.scrollLeft;});
  outer.addEventListener('mousemove',e=>{if(!dragging)return;const x=e.pageX-outer.offsetLeft;outer.scrollLeft=scrollLeft-(x-startX);});
  outer.addEventListener('mouseup',()=>dragging=false);
  outer.addEventListener('mouseleave',()=>dragging=false);
  outer.addEventListener('touchstart',e=>{startX=e.touches[0].pageX;scrollLeft=outer.scrollLeft;},{passive:true});
  outer.addEventListener('touchmove',e=>{outer.scrollLeft=scrollLeft-(e.touches[0].pageX-startX);},{passive:true});

  let hinted=false;

// ── TIMER ──
function startTimer(){
  G.ti=setInterval(()=>{
    G.secs--;
    updateTimerUI();
    if(G.secs<=0){clearInterval(G.ti);endGame(false);}
  },1000);
}
function updateTimerUI(){
  const m=Math.floor(G.secs/60),s=G.secs%60;
  const el=document.getElementById('hud-timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct=G.secs/G.totalSecs;
  const bar=document.getElementById('timer-bar');
  if(bar){bar.style.width=(pct*100)+'%';bar.style.background=pct<0.25?'var(--danger)':pct<0.5?'#c8a44a':'var(--safe)';}
  if(G.secs<=120){el.className='hud-timer warn';}
  else if(G.secs<=300){el.className='hud-timer';}
  else{el.className='hud-timer ok';}
}

  document.getElementById(id).classList.add('active');
}

  showScreen('s-game');
  initMirrorState();

// ── EXAMINE ──
function examineItem(id){
  const it=ITEMS[id];
  if(!it) return;
  G.examined.add(id);
  const acts=[{label:'關閉',fn:closeModal}];
  if(it.pickup&&!G.inv.includes(it.pickup)){
    acts.unshift({label:`取得「${it.pickup}」`,fn:()=>{addInv(it.pickup);closeModal();}});
  }
  openModal(it.title,it.body,acts);
  if(it.clue) addNote(it.clue);
  markExamined(id);
}
function markExamined(id){
  const el=document.getElementById('hs-'+id);
  // don't mark some items as done since they need revisiting
  if(id==='radio'||id==='mapboard'||id==='chest') return;
  if(el) el.classList.add('done');
}
function addInv(name){
  if(G.inv.includes(name)) return;
  G.inv.push(name);
  const grid=document.getElementById('inv-grid');
  if(G.inv.length===1) grid.innerHTML='';
  const chip=document.createElement('div');
  chip.className='inv-chip';
  chip.innerHTML=`<span class="dot"></span>${name}`;
  grid.appendChild(chip);
}
function addNote(note){
  if(G.notes.includes(note)) return;
  G.notes.push(note);
  const nl=document.getElementById('notes-list');
  if(G.notes.length===1) nl.innerHTML='';
  const div=document.createElement('div');
  div.className='note-entry note-new';
  div.innerHTML=note;
  nl.appendChild(div);
}

  if(n===1) showLock1Modal();
  else if(n===2) showLock2Modal();
  else showLock3Modal();
}
function updateLockUI(n,open){
  G.locks[n]=open;
  document.getElementById('li-'+n).textContent=open?'🔓':'🔒';
  document.getElementById('ls-'+n).textContent=open?'OPEN':'LOCKED';
  if(open){
    document.getElementById('lr-'+n).classList.add('open');
    const ind=document.getElementById('door-l'+n);
    if(ind){
      ind.querySelector('circle').setAttribute('stroke','var(--safe)');
      ind.querySelector('text').setAttribute('fill','var(--safe)');
    }
  }
  const pct=(Object.values(G.locks).filter(Boolean).length/3)*100;
  document.getElementById('prog').style.width=pct+'%';
  const allOpen=G.locks[1]&&G.locks[2]&&G.locks[3];
  const btn=document.getElementById('door-btn');
  btn.disabled=!allOpen;
  btn.style.opacity=allOpen?'1':'0.35';
  btn.style.cursor=allOpen?'pointer':'not-allowed';
}

function adjFreq(d){

function setFreq(f){

    el.classList.toggle('active',parseFloat(el.textContent).toFixed(3)===f.toFixed(3));

  const strength=Math.max(0,Math.round(8*(1-dist/5)));
  const bars='█'.repeat(strength)+'▁'.repeat(8-strength);
  const sb=document.getElementById('sig-bar');
  if(sb){sb.textContent=bars;sb.style.color=strength>5?'var(--safe)':strength>2?'var(--accent)':'var(--txtm)';}
}
function checkL1(){
  if(Math.abs(G.freqVal-174.200)<0.001){
    showMsg('l1msg','✅ 救援頻率接通！遠處傳來了回應聲……','ok');
    addNote('✅ 無線電頻率鎖 解除（174.200 MHz）');
    setTimeout(()=>{updateLockUI(1,true);closeModal();},1200);
  } else {
    const dist=Math.abs(G.freqVal-174.200);
    const hint=dist<0.5?'非常接近了……':dist<2?'頻率有些偏差':dist<5?'偏離太多':'完全不對';
    showMsg('l1msg',`❌ 雜訊頻道。${hint}，繼續嘗試。`,'err');
  }
}

// ── LOCK 2: Mirror Signal ──
// 5x5 grid, diagonal (0,6,12,18,24) must be: /, \, —, /, \
// angles: 0=/, 1=\, 2=—, 3=|
const M_CHARS=['/',`\\`,'—','|'];
const M_ANS=[0,1,2,0,1]; // diagonal positions 0,6,12,18,24
function initMirrorState(){
  G.mirrorState=Array(25).fill(2); // start all as —
  // randomize non-fixed cells
  for(let i=0;i<25;i++){
    if(![0,6,12,18,24].includes(i)) G.mirrorState[i]=Math.floor(Math.random()*4);
  }
}
function showLock2Modal(){
  openModal('🪞 鏡子訊號鎖','點擊鏡子格切換角度，讓訊號沿對角線反射出去：',[]);
  const puz=document.getElementById('m-puzzle');
  puz.innerHTML=`
    <div style="font-size:.74rem;color:var(--txtm);margin-bottom:.5rem;font-family:'Space Mono',monospace">
      格式：/ = 斜右 &nbsp; \\ = 斜左 &nbsp; — = 橫 &nbsp; | = 豎
    </div>
    <div class="mirror-grid" id="mirror-grid"></div>
    <div style="font-size:.74rem;color:var(--txtm);margin:.4rem 0">
      目標：讓<span style="color:var(--accent)">對角線（↘）</span>五個鏡子依序排列正確
    </div>
    <button class="kbtn" style="width:100%;margin-top:.6rem" onclick="checkL2()">✓ 啟動訊號陣列</button>
    <div class="msg" id="l2msg"></div>`;
  renderMirrors();
}
function renderMirrors(){
  const grid=document.getElementById('mirror-grid');
  if(!grid) return;
  grid.innerHTML='';
  const DIAG=[0,6,12,18,24];
  for(let i=0;i<25;i++){
    const cell=document.createElement('div');
    cell.className='mirror-cell'+(DIAG.includes(i)?' lit':'');
    const angle=G.mirrorState[i];
    // draw mirror as SVG line
    const lines={0:'10,42 42,10',1:'10,10 42,42',2:'4,26 48,26',3:'26,4 26,48'};
    cell.innerHTML=`<svg width="52" height="52" viewBox="0 0 52 52">
      <line x1="${lines[angle].split(' ')[0].split(',')[0]}" y1="${lines[angle].split(' ')[0].split(',')[1]}"
            x2="${lines[angle].split(' ')[1].split(',')[0]}" y2="${lines[angle].split(' ')[1].split(',')[1]}"
            stroke="${DIAG.includes(i)?'#c8a44a':'#4a7a8a'}" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`;
    if(!false){// all clickable
      cell.onclick=()=>{G.mirrorState[i]=(G.mirrorState[i]+1)%4;renderMirrors();}
    }
    grid.appendChild(cell);
  }
}
function checkL2(){
  const DIAG=[0,6,12,18,24];
  const correct=DIAG.every((pos,i)=>G.mirrorState[pos]===M_ANS[i]);
  if(correct){
    showMsg('l2msg','✅ 訊號對準！燈塔光束成功射向遠方的船隻！','ok');
    addNote('✅ 鏡子訊號鎖 解除（/\\—/\\）');
    setTimeout(()=>{updateLockUI(2,true);closeModal();},1200);
  } else {
    const DIAG=[0,6,12,18,24];
    const wrong=DIAG.filter((pos,i)=>G.mirrorState[pos]!==M_ANS[i]).length;
    showMsg('l2msg',`❌ 訊號散射。對角線有 ${wrong} 格方向錯誤，重新調整。`,'err');
  }
}

// ── LOCK 3: Knot SOS ──
// Answer: 🪢 ⚓ 🔱
const KNOTS=[{s:'🪢',l:'S'},{s:'⚓',l:'O'},{s:'🔱',l:'S'},{s:'🪝',l:'R'},{s:'⛵',l:'U'},{s:'🌊',l:'N'}];
function showLock3Modal(){
  G.knotSel=[];
  openModal('🪢 繩結密碼鎖','選擇三個繩結符號拼出暗語：',[]);
  const puz=document.getElementById('m-puzzle');
  puz.innerHTML=`
    <div style="font-size:.74rem;color:var(--txtm);margin-bottom:.4rem;font-family:'Space Mono',monospace">
      已選序列：
    </div>
    <div class="knot-slots" id="knot-slots">
      <div class="knot-slot empty">_</div>
      <div class="knot-slot empty">_</div>
      <div class="knot-slot empty">_</div>
    </div>
    <div style="font-size:.74rem;color:var(--txtm);margin:.4rem 0">可用繩結：</div>
    <div class="knot-sequence" id="knot-seq">
      ${KNOTS.map((k,i)=>`<div class="knot-btn" onclick="knotPick(${i})">${k.s}<br><span style="font-size:.6rem;color:var(--txtm)">${k.l}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:.4rem;margin-top:.5rem">
      <button class="kbtn" style="flex:1" onclick="checkL3()">✓ 送出暗語</button>
      <button class="kbtn" onclick="knotClear()">清除</button>
    </div>
    <div class="msg" id="l3msg"></div>`;
}
function knotPick(i){
  if(G.knotSel.length>=3) return;
  G.knotSel.push(i);
  renderKnotSlots();
}
function renderKnotSlots(){
  const slots=document.getElementById('knot-slots');
  if(!slots) return;
  slots.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='knot-slot'+(i>=G.knotSel.length?' empty':'');
    d.textContent=i<G.knotSel.length?KNOTS[G.knotSel[i]].s:'_';
    slots.appendChild(d);
  }
}
function knotClear(){G.knotSel=[];renderKnotSlots();showMsg('l3msg','','');}
function checkL3(){
  if(G.knotSel.length<3){showMsg('l3msg','請選擇3個繩結符號','err');return;}
  const ans=[0,1,2]; // 🪢⚓🔱
  if(G.knotSel.every((v,i)=>v===ans[i])){
    showMsg('l3msg','✅ 暗語正確！SOS，鎖具鬆開了！','ok');
    addNote('✅ 繩結密碼鎖 解除（🪢⚓🔱 = SOS）');
    setTimeout(()=>{updateLockUI(3,true);closeModal();},1200);
  } else {
    const letters=G.knotSel.map(i=>KNOTS[i].l).join('');
    showMsg('l3msg',`❌ 「${letters}」不是正確暗語，再想想。`,'err');
    setTimeout(knotClear,800);
  }
}

// ── DOOR ──
function openDoorPanel(){
  const allOpen=G.locks[1]&&G.locks[2]&&G.locks[3];
  if(allOpen){endGame(true);return;}
  const st=n=>`${G.locks[n]?'🔓 已解除':'🔒 待解'} — ${['','無線電頻率鎖','鏡子訊號鎖','繩結密碼鎖'][n]}`;
  openModal('🚪 出口鐵門',
    `鐵門沉重無比，三道鎖具紋絲不動。<br><br>
    <div style="font-family:'Space Mono',monospace;font-size:.8rem;line-height:2.2">
    ${st(1)}<br>${st(2)}<br>${st(3)}
    </div><br>
    解開所有鎖具才能推開這扇通往自由的門。`,
    [{label:'繼續搜查',fn:closeModal}]);
}

// ── HINTS ──
function useHint(){
  if(G.hintsLeft<=0){
    openModal('無法求助','提示已全部用完。憑藉自己的觀察力吧。',[{label:'明白了',fn:closeModal}]);
    return;
  }
  const idx=2-G.hintsLeft;
  G.hintsLeft--;G.hintsUsed++;
  document.getElementById('hint-badge').textContent=`HINT ×${G.hintsLeft}`;
  openModal(`求助 ${idx+1}/2`,HINTS[idx]||'沒有更多提示了。',[{label:'了解',fn:closeModal}]);
}

// ── MODAL ──
function openModal(title,body,acts){
  document.getElementById('m-title').innerHTML=title;
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-puzzle').innerHTML='';
  const ma=document.getElementById('m-acts');
  ma.innerHTML='';
  acts.forEach(a=>{
    const b=document.createElement('button');
    b.className='btn btn-sm';b.innerHTML=a.label;b.onclick=a.fn;
    ma.appendChild(b);
  });
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay')) closeModal();
});
function showMsg(id,txt,cls){
  const el=document.getElementById(id);
  if(!el) return;
  el.className='msg'+(cls?' '+cls:'');
  el.innerHTML=txt;
  if(!cls) el.style.display='none';
}

// ── END ──
function endGame(won){
  clearInterval(G.ti);
  const m=Math.floor(G.secs/60),s=G.secs%60;
  document.getElementById('end-ico').textContent=won?'🚢':'🌊';
  document.getElementById('end-title').textContent=won?'成功脫逃！':'潮水淹沒了出口';
  document.getElementById('end-desc').textContent=won
    ?'你推開了燈塔的鐵門，衝上岸邊。救援船就在不遠處等候。麥爾斯·艾德蒙的消失之謎或許永遠無法解開，但你活下來了。那個秘密，隨著海浪沉入了深海。'
    :'漲潮的海水切斷了退路，謎題未能解開。燈塔的秘密隨著你，沉入了海底。或許下一次，你能更快讀懂那些隱藏在黑夜中的線索。';
  document.getElementById('st-time').textContent=won?`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:'00:00';
  document.getElementById('st-hints').textContent=G.hintsUsed;
  // score
  const bonus=won?Math.floor(G.secs/30)*10:0;
  const penalty=G.hintsUsed*50;
  const score=Math.max(0,bonus-penalty+(won?200:0));
  document.getElementById('st-score').textContent=score;
  showScreen('s-end');
}
</script>
