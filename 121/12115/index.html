<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機抽籤轉盤</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 900px;
            width: 100%;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* 轉盤右側的指標 (紅色三角形) */
        .pointer {
            position: absolute;
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 30px solid #e74c3c;
            z-index: 10;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.1, 1);
            transform: rotate(0deg);
        }

        #result {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            min-height: 36px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🎡 隨機抽籤轉盤</h1>

    <div class="container">
        <div class="input-section">
            <label for="items">請輸入選項 (每行一個)：</label>
            <textarea id="items">吃火鍋
看電影
在家睡覺
去逛街
吃拉麵</textarea>
            <button onclick="updateWheel()">更新轉盤</button>
        </div>

        <div class="wheel-container">
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <canvas id="wheel" width="300" height="300"></canvas>
            </div>
            <button id="spinBtn" onclick="spin()">開始抽籤！</button>
        </div>
    </div>

    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const itemsTextarea = document.getElementById('items');
        const resultDiv = document.getElementById('result');
        const spinBtn = document.getElementById('spinBtn');

        let items = [];
        let currentDeg = 0;
        let isSpinning = false;

        // 預設顏色清單
        const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#f39c12', '#d35400', '#c0392b'];

        function init() {
            updateWheel();
        }

        function updateWheel() {
            // 取得輸入的選項並過濾空白行
            items = itemsTextarea.value.split('\n').map(item => item.trim()).filter(item => item !== '');
            
            if (items.length === 0) {
                items = ['請輸入選項'];
            }

            drawWheel();
            resultDiv.innerText = '';
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;
            const arcDeg = 360 / items.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < items.length; i++) {
                const startAngle = (i * arcDeg) * Math.PI / 180;
                const endAngle = ((i + 1) * arcDeg) * Math.PI / 180;

                // 畫扇形
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.save();

                // 畫文字
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + (arcDeg / 2) * Math.PI / 180);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px sans-serif';
                
                // 處理太長的文字
                let text = items[i];
                if (text.length > 8) {
                    text = text.substring(0, 8) + '...';
                }
                
                ctx.fillText(text, radius - 20, 6);
                ctx.restore();
            }
        }

        function spin() {
            if (isSpinning || items.length === 0) return;
            
            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.innerText = '抽籤中...';

            // 隨機旋轉圈數 (至少轉 5 圈) + 隨機額外角度
            const randomSpins = 5 + Math.floor(Math.random() * 5);
            const randomDeg = Math.floor(Math.random() * 360);
            
            currentDeg += (randomSpins * 360) + randomDeg;

            // 套用 CSS 動畫進行旋轉
            canvas.style.transform = `rotate(${currentDeg}deg)`;
        }

        // 監聽轉盤動畫結束事件
        canvas.addEventListener('transitionend', () => {
            if (!isSpinning) return;
            
            isSpinning = false;
            spinBtn.disabled = false;

            // 計算最終停在哪個選項
            // 因為轉盤順時針轉，指標在 0 度 (3點鐘方向)
            // 需要計算旋轉後，原本哪個角度轉到了 0 度的位置
            const actualDeg = currentDeg % 360;
            const arcDeg = 360 / items.length;
            
            // 360 - actualDeg 是目前停在指標上的原始角度
            const normalizedDeg = (360 - actualDeg) % 360; 
            
            const winningIndex = Math.floor(normalizedDeg / arcDeg);
            
            resultDiv.innerText = `🎉 抽中：${items[winningIndex]} 🎉`;
        });

        // 頁面載入時初始化
        init();
    </script>
</body>
</html>
