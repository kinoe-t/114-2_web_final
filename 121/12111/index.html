<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>海龜湯推理學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D 翻牌核心動畫特效 */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col items-center justify-center p-4 md:p-8">

    <div id="game-main-wrapper" class="w-full max-w-6xl space-y-6">

                </p>
            </div>
            <button onclick="resetGame()" class="mt-4 md:mt-0 text-xs bg-red-500/10 hover:bg-red-500/20 text-red-400 px-3 py-2 rounded-xl border border-red-500/20 transition-all">
                🔄 重置所有過關紀錄

        </header>

                                </p>
                            <span id="status-hint" class="absolute bottom-4 text-xs text-amber-400 bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">

                            </span>

                                🎉 湯底解開！

                    </div>
                </div>

                <div class="bg-slate-800/80 p-5 rounded-2xl border border-slate-700/50 space-y-4">

                        <label for="user-input" class="text-slate-300 font-medium text-sm">💡 提問範例：『這與主角的身體狀況有關嗎？』或直接輸入你猜測的完整真相：</label>

                        </button>
                    </div>

                q: "一名獨居的知名女網紅在自家公寓進行深夜吃播。直播到一半時，她突然對著鏡頭外的廚房喊了一句：「老公，幫我拿一下衛生紙。」隨後直播突然中斷。隔天警方在廚房發現了她的屍體。警方在沒有任何目擊者的情況下，第一時間就鎖定了兇手是她隔壁棟的瘋狂男粉絲，請問警方是怎麼推出來的？",
                a: "因為女網紅是「獨居（根本沒有老公）」。她突然對著空無一人的廚房喊「老公」，是因為她透過客廳的鏡子或直覺，發現有變態潛入家裡並躲在廚房。她故意喊這句話是為了嚇退歹徒，或是向直播觀眾發出『求救暗號』，這證明當時廚房確實藏了人。",
                keywords: "獨居 求救 暗號 嚇退 沒有老公 發現有人 潛入 藏在廚房",
                yes: [
                    "獨居", "求救", "暗號", "嚇退", "沒有老公", "發現有人", "藏在廚房", "單身", "沒有結婚",
                    "一個人住", "空無一人", "藏人", "躲在裡面", "潛入", "入侵", "求救訊號", "鏡子反射",
                    "警覺", "故意叫", "防衛", "虛張聲勢", "嚇走", "暗示", "有人躲", "歹徒", "變態"
                ],
                no: [
                    "手機定位", "遺留指紋", "發票", "監視器", "鄰居看到", "按讚留言", "錄音", "看到臉",
                    "腳印", "血跡", "開玩笑", "真正的老公", "演戲", "劇本", "打電話", "私訊", "監視器畫面"
                ],
                help_hint: "提示：這位網紅的公開資料顯示她一直是「單身且獨居」。在這種情況下，她突然對著廚房叫「老公」，絕對不是開玩笑，而是她發現了某個令人毛骨悚然的突發狀況，試圖用這句話保護自己..."
            },
            {
                id: 20,
                title: "不該出現的完美倒計時",
                q: "一棟商業大樓發生了慘烈的定時炸彈爆炸案，死傷慘重。警方在調查廢墟時，找到了一個已經被炸毀、表面焦黑的電子時鐘。鑑識人員大喜過望，對長官說：「長官，兇手露出了致命馬腳，我們抓到他了！」請問這個時鐘藏了什麼破綻？",
                a: "普通的電子時鐘在遭遇猛烈爆炸時，內部的晶片 and 電源會瞬間被摧毀，時鐘畫面應該會瞬間漆黑或停留在爆炸的那一刻。然而，這個時鐘的表面卻完美地融化並「定格在 00:00（倒計時結束）」，這證明它根本不是用來報時的時鐘，而是「炸彈本身的定時引爆器」，只有兇手會把它帶進來。",
                keywords: "定時器 引爆器 零點 倒計時 炸彈 00:00 融化 定格",
                yes: [
                    "定時器", "引爆器", "零點", "倒計時", "炸彈", "00:00", "定格", "倒數", "歸零",
                    "炸彈本身", "引爆", "不是時鐘", "破綻", "馬腳", "反常", "剛好歸零", "計時器", "爆炸時間",
                    "摧毀", "停在零", "時間不對", "完美定格", "兇手的物品", "倒數結束"
                ],
                no: [
                    "指紋", "指針", "購買紀錄", "發票", "鬧鐘響", "電池", "錄音", "齒輪", "遺留物",
                    "指紋殘留", "保險箱", "發票收據", "監視器拍到", "時間走慢", "停電", "手錶"
                ],
                help_hint: "提示：一個正常的時鐘在被炸飛的「瞬間」，時間顯示應該是隨機的（例如爆炸發生在下午 3:14，時鐘就會壞在 3:14）。什麼情況下，一個時鐘會極其反常地剛好壞在「零點零分（倒數結束）」？"
            }

        ];

        let currentLevelId = 1;
        let solvedLevels = JSON.parse(localStorage.getItem('soup_solved_animated')) || [];

        const cleanStr = str => str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()？。，！：\s]/g, "");

        // Levenshtein 核心計算 (僅在後台用來嚴格比對是否完全破解)
        function getSimilarity(s1, s2, keywordsStr) {
            const strA = cleanStr(s1);
            const strB = cleanStr(s2);
            if (strA.length === 0 || strB.length === 0) return 0;
            
            const track = Array(strB.length + 1).fill(null).map(() => Array(strA.length + 1).fill(null));
            for (let i = 0; i <= strA.length; i += 1) track[0][i] = i;
            for (let j = 0; j <= strB.length; j += 1) track[j][0] = j;
            
            for (let j = 1; j <= strB.length; j += 1) {
                for (let i = 1; i <= strA.length; i += 1) {
                    const indicator = strA[i - 1] === strB[j - 1] ? 0 : 1;
                    track[j][i] = Math.min(
                        track[j - 1][i] + 1, 
                        track[j][i - 1] + 1, 
                        track[j - 1][i - 1] + indicator 
                    );
                }
            }
            
            const distance = track[strB.length][strA.length];
            const maxLen = Math.max(strA.length, strB.length);
            let baseScore = (maxLen - distance) / maxLen;

            if (keywordsStr) {
                const keywords = keywordsStr.split(" ");
                let matchCount = 0;
                keywords.forEach(kw => {
                    if (strA.includes(cleanStr(kw))) matchCount++;
                });
                const keywordBonus = (matchCount / keywords.length) * 0.25; 
                baseScore += keywordBonus;
            }
            return Math.min(Math.round(baseScore * 100), 100);
        }

        // 渲染選單 (全自由切換)
        function renderLevelList() {
            const listContainer = document.getElementById('level-list');
            listContainer.innerHTML = '';

            levels.forEach(level => {
                const isSolved = solvedLevels.includes(level.id);
                const isActive = currentLevelId === level.id;
                
                const btn = document.createElement('button');
                let styleClass = isActive 
                    ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400 font-bold shadow-inner' 
                    : 'bg-slate-800 hover:bg-slate-700/80 text-slate-300 border-slate-700';

                btn.className = `w-full text-left p-3 rounded-xl flex items-center justify-between font-medium transition-all text-sm border-2 ${styleClass}`;
                btn.onclick = () => loadLevel(level.id);

                let icon = isSolved ? '✅' : '📖';
                btn.innerHTML = `<span>${icon} 關卡 ${level.id} - ${level.title}</span>`;
                
                listContainer.appendChild(btn);
            });
        }

        // 載入指定關卡
        function loadLevel(id) {
            currentLevelId = id;
            const level = levels.find(l => l.id === id);
            
            document.getElementById('level-badge').innerText = `關卡 ${level.id}`;
            document.getElementById('question-text').innerText = level.q;
            document.getElementById('answer-text').innerText = level.a;
            
            if (solvedLevels.includes(id)) {
                document.getElementById('card-container').classList.add('flipped');
            } else {
                document.getElementById('card-container').classList.remove('flipped');
            }
            
            document.getElementById('user-input').value = '';
            document.getElementById('feedback-msg').classList.add('hidden');

            renderLevelList();
        }

        // 審查答案與觸發動畫彈窗
        function checkAnswer() {
            const input = document.getElementById('user-input').value;
            const feedback = document.getElementById('feedback-msg');
            const level = levels.find(l => l.id === currentLevelId);

            if (!input.trim()) {
                feedback.innerText = "⚠️ 請輸入你想詢問湯主的問題，或者輸入核心推理！";
                feedback.className = "text-sm p-3 rounded-lg text-center font-medium bg-red-500/20 text-red-400 block";
                return;
            }

            const cleanInput = cleanStr(input);
            const score = getSimilarity(input, level.a, level.keywords);

            // 🌟 【答對破案分支】：觸發卡片翻牌與彈出式動畫視窗
            if (score >= 70) {
                document.getElementById('card-container').classList.add('flipped');
                feedback.innerHTML = `🔴 <strong>湯主回答：【是！】</strong><br><span class="text-sm">恭喜破案！完整真相已在上方翻牌揭曉。</span>`;
                feedback.className = "text-sm p-4 rounded-xl text-left font-medium bg-emerald-500/20 text-emerald-300 block border-2 border-emerald-500/40 shadow-lg";
                
                if (!solvedLevels.includes(currentLevelId)) {
                    solvedLevels.push(currentLevelId);
                    localStorage.setItem('soup_solved_animated', JSON.stringify(solvedLevels));
                    renderLevelList();
                }

                // 觸發彈窗與動畫效果
                triggerSuccessModal();
                return;
            }

            // 智慧型提問提示系統
            const matchedYesKeyword = level.yes.find(kw => cleanInput.includes(cleanStr(kw)));
            const matchedNoKeyword = level.no.find(kw => cleanInput.includes(cleanStr(kw)));

            if (matchedYesKeyword) {
                feedback.innerHTML = `🟢 湯主回答：<strong>【是】</strong><br>
                <span class="text-xs text-slate-300 font-normal mt-2 block bg-slate-900/60 p-2 rounded border border-emerald-500/20">
                     💡 <strong>湯主提示</strong>：沒錯，方向完全正確！這件事情跟<strong>「${matchedYesKeyword}」</strong>有著非常緊密的聯結，請沿著這個線索深入延伸！
                </span>`;
                feedback.className = "text-sm p-4 rounded-xl text-left font-medium bg-emerald-950/40 text-emerald-400 block border border-emerald-500/30";
            } else if (matchedNoKeyword) {
                feedback.innerHTML = `🟡 湯主回答：<strong>【不是】</strong><br>
                <span class="text-xs text-slate-300 font-normal mt-2 block bg-slate-900/60 p-2 rounded border border-amber-500/20">
                     💡 <strong>湯主提示</strong>：不對喔，這件事情跟<strong>「${matchedNoKeyword}」</strong>沒有任何關係。請清空這個假設，換個角度思考。
                </span>`;
                feedback.className = "text-sm p-4 rounded-xl text-left font-medium bg-amber-950/40 text-amber-400 block border border-amber-500/30";
            } else {
                feedback.innerHTML = `⚪ 湯主回答：<strong>【無關】</strong><br>
                <span class="text-xs text-slate-300 font-normal mt-2 block bg-slate-900/60 p-2 rounded border border-slate-700">
                     💡 <strong>破案引導</strong>：這個細節對真相並不重要。別灰心，${level.help_hint}
                </span>`;
                feedback.className = "text-sm p-4 rounded-xl text-left font-medium bg-slate-800 text-slate-400 block border border-slate-700";
            }
        }

        // 顯示慶祝彈窗動畫
        function triggerSuccessModal() {
            const modal = document.getElementById('success-modal');
            const nextBtn = document.getElementById('modal-next-btn');
            
            // 如果是最後一關，動態調整按鈕提示
            if (currentLevelId === levels.length) {
                nextBtn.innerText = "🔄 重新挑戰第 1 關";
            } else {
                nextBtn.innerText = "➡️ 前往下一關卡";
            }

            modal.classList.remove('hidden');
            // 延遲加上不透明度與縮放，確保 CSS 產生順暢的動畫過渡
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-90');
            }, 50);
        }

        // 關閉慶祝彈窗
        function closeSuccessModal() {
            const modal = document.getElementById('success-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // 選擇：下一關
        function handleModalNext() {
            closeSuccessModal();
            if (currentLevelId === levels.length) {
                loadLevel(1);
            } else {
                loadLevel(currentLevelId + 1);
            }
        }

        // 選擇：離開
        function handleModalLeave() {
            closeSuccessModal();
            // 自動隱藏主遊戲畫面，呈現致謝場景
            document.getElementById('game-main-wrapper').classList.add('hidden');
            document.getElementById('thank-you-screen').classList.remove('hidden');
        }

        // 從謝謝遊玩畫面重返遊戲
        function returnToGame() {
            document.getElementById('thank-you-screen').classList.add('hidden');
            document.getElementById('game-main-wrapper').classList.remove('hidden');
            loadLevel(currentLevelId);
        }

        // 重置功能
        function resetGame() {
            if(confirm("確定要清除所有關卡的過關紀錄嗎？")) {
                localStorage.removeItem('soup_solved_animated');
                solvedLevels = [];
                loadLevel(1);
            }
        }

        window.onload = () => {
            renderLevelList();
            loadLevel(currentLevelId);
        };
    </script>
