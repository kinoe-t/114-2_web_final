<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黃昏後的第二十四小時 — 末日人格測驗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green: #39ff71;
  --amber: #e8a020;
  --red: #ff3030;
  --dim: rgba(0,0,0,0.72);
  --glass: rgba(0,0,0,0.55);
}

html, body {
  width:100%; min-height:100vh;
  background:#000;
  color:#d4c89a;
  font-family:'Noto Sans TC', sans-serif;
  overflow-x:hidden;
}

/* ─── CRT overlay ─── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:9999; pointer-events:none;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px),
    radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.55) 100%);
}

/* ─── SCENE LAYER ─── */
#scene {
  position:fixed; inset:0; z-index:0;
  transition: background 1.2s ease, opacity 0.5s;
  will-change: background;
}

#scene canvas {
  position:absolute; inset:0; width:100%; height:100%;
}

/* dust particles */
#dust-canvas { position:fixed; inset:0; z-index:2; pointer-events:none; }

/* ─── SCREENS ─── */
#boot-screen, #quiz-screen, #result-screen {
  position:relative; z-index:10;
  min-height:100vh;
}
#quiz-screen, #result-screen { display:none; }

/* ══════════════ BOOT ══════════════ */
#boot-screen {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 20px;
  background:radial-gradient(ellipse at center, rgba(20,8,0,0.9) 0%, rgba(0,0,0,0.97) 100%);
}

.boot-logo {
  font-family:'Orbitron', monospace;
  font-size:clamp(28px,8vw,72px);
  font-weight:900;
  color:#c8782a;
  text-shadow: 0 0 20px rgba(200,120,42,0.6), 0 0 60px rgba(200,120,42,0.2);
  letter-spacing:6px;
  text-align:center;
  animation: logoGlow 3s ease infinite;
  line-height:1.1;
  margin-bottom:12px;
}
.boot-logo-sub {
  font-family:'Noto Serif TC', serif;
  font-size:clamp(13px,3vw,18px);
  color:rgba(200,120,42,0.5);
  letter-spacing:8px;
  text-align:center;
  margin-bottom:50px;
}

@keyframes logoGlow {
  0%,100% { text-shadow: 0 0 20px rgba(200,120,42,0.6), 0 0 60px rgba(200,120,42,0.2); }
  50% { text-shadow: 0 0 40px rgba(200,120,42,0.9), 0 0 100px rgba(200,120,42,0.4), 0 0 160px rgba(200,120,42,0.15); }
}

.boot-terminal {
  width:min(520px, 92vw);
  background:rgba(0,0,0,0.8);
  border:1px solid rgba(57,255,113,0.15);
  padding:24px;
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  color:rgba(57,255,113,0.7);
  margin-bottom:50px;
  position:relative;
}
.boot-terminal::before {
  content:'TERMINAL // SYS:0x48FF';
  position:absolute; top:-10px; left:20px;
  font-size:10px; color:rgba(57,255,113,0.4);
  background:#000; padding:0 8px;
  letter-spacing:3px;
}

.boot-line { opacity:0; margin:4px 0; animation: lineFade 0.4s ease forwards; }
.boot-line.warn { color:rgba(255,160,32,0.8); }
.boot-line.err  { color:rgba(255,48,48,0.8); }
@keyframes lineFade { to { opacity:1; } }

.cursor-blink::after { content:'█'; animation: blink 0.7s step-end infinite; }
@keyframes blink { 50% { opacity:0; } }

.boot-enter-btn {
  width:min(320px, 80vw);
  padding:16px 0;
  background:transparent;
  border:1px solid rgba(200,120,42,0.5);
  color:#c8782a;
  font-family:'Orbitron', monospace;
  font-size:13px;
  font-weight:700;
  letter-spacing:4px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
  opacity:0;
  animation: lineFade 0.5s ease 4.2s forwards;
}
.boot-enter-btn::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(200,120,42,0.08), transparent);
  transform:translateX(-100%);
  transition:transform 0.5s;
}
.boot-enter-btn:hover { border-color:rgba(200,120,42,0.9); box-shadow:0 0 30px rgba(200,120,42,0.3), inset 0 0 30px rgba(200,120,42,0.05); color:#e8a020; }
.boot-enter-btn:hover::before { transform:translateX(100%); }

/* ══════════════ QUIZ ══════════════ */
.quiz-wrap {
  max-width:720px;
  margin:0 auto;
  padding:30px 24px 80px;
}

/* HUD bar */
.hud-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0 20px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  margin-bottom:30px;
}
.hud-label {
  font-family:'Share Tech Mono', monospace;
  font-size:10px;
  color:rgba(200,120,42,0.5);
  letter-spacing:3px;
}
.hud-qnum {
  font-family:'Orbitron', monospace;
  font-size:22px;
  font-weight:900;
  color:#c8782a;
  text-shadow:0 0 20px rgba(200,120,42,0.5);
  letter-spacing:2px;
}
.hud-prog-wrap { flex:1; margin:0 20px; }
.hud-prog-track {
  height:2px;
  background:rgba(255,255,255,0.08);
  position:relative;
}
.hud-prog-fill {
  height:100%;
  background:linear-gradient(90deg, #c8782a, #e8a020);
  box-shadow:0 0 8px rgba(200,120,42,0.8);
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.hud-dots {
  display:flex; gap:6px;
}
.hud-dot {
  width:6px; height:6px;
  border:1px solid rgba(200,120,42,0.3);
  border-radius:50%;
  transition:all 0.3s;
}
.hud-dot.done { background:#c8782a; border-color:#c8782a; box-shadow:0 0 6px rgba(200,120,42,0.8); }
.hud-dot.active { border-color:#e8a020; box-shadow:0 0 8px rgba(200,120,42,0.5); animation:dotPulse 1.5s ease infinite; }
@keyframes dotPulse { 0%,100%{box-shadow:0 0 6px rgba(200,120,42,0.4);} 50%{box-shadow:0 0 14px rgba(200,120,42,0.9);} }

/* Scene title overlay */
.scene-title-block {
  margin-bottom:28px;
  animation:cardIn 0.5s ease;
}
.scene-eyebrow {
  font-family:'Share Tech Mono', monospace;
  font-size:10px;
  color:rgba(57,255,113,0.5);
  letter-spacing:4px;
  margin-bottom:6px;
}
.scene-heading {
  font-family:'Noto Serif TC', serif;
  font-size:clamp(18px,4vw,26px);
  font-weight:900;
  color:#e8a020;
  text-shadow:0 2px 20px rgba(232,160,32,0.3);
  line-height:1.3;
  margin-bottom:10px;
}
.scene-situation {
  font-size:13px;
  color:rgba(212,200,154,0.55);
  line-height:1.9;
  border-left:2px solid rgba(200,120,42,0.25);
  padding-left:14px;
  font-family:'Noto Serif TC', serif;
  font-weight:300;
}

/* Question card */
.q-card {
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(200,120,42,0.18);
  backdrop-filter:blur(6px);
  padding:24px;
  margin-bottom:16px;
  position:relative;
  animation:cardIn 0.6s ease;
}
.q-card::before {
  content:'';
  position:absolute; top:0; left:0;
  width:3px; height:100%;
  background:linear-gradient(180deg, #c8782a, transparent);
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.q-prompt {
  font-family:'Noto Serif TC', serif;
  font-size:15px;
  color:#d4c89a;
  line-height:1.8;
  margin-bottom:24px;
  text-shadow:0 1px 4px rgba(0,0,0,0.6);
}

/* Options */
.options { display:flex; flex-direction:column; gap:10px; }
.opt-btn {
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(212,200,154,0.8);
  padding:14px 18px;
  text-align:left;
  cursor:pointer;
  font-family:'Noto Sans TC', sans-serif;
  font-size:13px;
  line-height:1.7;
  display:grid;
  grid-template-columns:28px 1fr;
  gap:12px;
  align-items:start;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.opt-btn::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(90deg, rgba(200,120,42,0.07), transparent);
  opacity:0;
  transition:opacity 0.2s;
}
.opt-btn:hover::after { opacity:1; }
.opt-btn:hover {
  border-color:rgba(200,120,42,0.35);
  color:#d4c89a;
  transform:translateX(3px);
}
.opt-btn.selected {
  background:rgba(200,120,42,0.1);
  border-color:rgba(200,120,42,0.6);
  color:#e8c870;
  box-shadow:0 0 20px rgba(200,120,42,0.15), inset 0 0 20px rgba(200,120,42,0.04);
  transform:translateX(0);
}
.opt-btn.selected::after { opacity:1; }
.opt-key {
  font-family:'Orbitron', monospace;
  font-size:10px;
  font-weight:700;
  color:rgba(200,120,42,0.6);
  padding-top:3px;
}
.opt-btn.selected .opt-key { color:#e8a020; }

/* Nav */
.nav-row {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:24px;
}
.nav-btn {
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(212,200,154,0.5);
  padding:10px 28px;
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.2s;
}
.nav-btn:hover:not(:disabled) { border-color:rgba(200,120,42,0.4); color:#c8782a; }
.nav-btn:disabled { opacity:0.2; cursor:default; }
.nav-btn.primary {
  border-color:rgba(200,120,42,0.4);
  color:#c8782a;
  box-shadow:0 0 12px rgba(200,120,42,0.1);
}
.nav-btn.primary:hover:not(:disabled) {
  background:rgba(200,120,42,0.08);
  box-shadow:0 0 24px rgba(200,120,42,0.25);
  color:#e8a020;
}

/* ══════════════ COMPUTING ══════════════ */
#computing-overlay {
  display:none;
  position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(10px);
  flex-direction:column;
  align-items:center; justify-content:center;
  gap:24px;
}
.computing-ring {
  width:80px; height:80px;
  border:1px solid rgba(200,120,42,0.2);
  border-top-color:#c8782a;
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 20px rgba(200,120,42,0.2), inset 0 0 20px rgba(200,120,42,0.05);
}
@keyframes spin { to { transform:rotate(360deg); } }
.computing-lbl {
  font-family:'Orbitron', monospace;
  font-size:12px;
  color:#c8782a;
  letter-spacing:5px;
  animation:logoGlow 1.5s ease infinite;
}
.computing-bar {
  width:260px; height:1px;
  background:rgba(200,120,42,0.15);
  position:relative; overflow:hidden;
}
.computing-bar-fill {
  position:absolute; top:0; left:0;
  height:100%;
  background:linear-gradient(90deg, #c8782a, #e8a020);
  box-shadow:0 0 8px rgba(200,120,42,0.9);
  animation:barFill 2.2s ease forwards;
}
@keyframes barFill { 0%{width:0} 70%{width:75%} 100%{width:100%} }

/* ══════════════ RESULT ══════════════ */
#result-screen { background:radial-gradient(ellipse at center, rgba(12,4,0,0.95) 0%, rgba(0,0,0,0.98) 100%); }

.result-wrap {
  max-width:680px;
  margin:0 auto;
  padding:60px 24px 80px;
  animation:cardIn 0.8s ease;
}

.result-stamp {
  display:inline-block;
  border:1px solid rgba(255,48,48,0.5);
  color:rgba(255,48,48,0.7);
  font-family:'Share Tech Mono', monospace;
  font-size:10px;
  letter-spacing:4px;
  padding:4px 14px;
  transform:rotate(-1.5deg);
  margin-bottom:24px;
  box-shadow:0 0 12px rgba(255,48,48,0.15);
}
.result-file {
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  color:rgba(57,255,113,0.4);
  letter-spacing:5px;
  margin-bottom:8px;
}
.result-name {
  font-family:'Noto Serif TC', serif;
  font-size:clamp(24px,6vw,48px);
  font-weight:900;
  color:#e8a020;
  text-shadow:0 0 30px rgba(232,160,32,0.4), 0 0 80px rgba(232,160,32,0.15);
  letter-spacing:1px;
  line-height:1.2;
  margin-bottom:4px;
}
.result-en {
  font-family:'Orbitron', monospace;
  font-size:11px;
  color:rgba(200,120,42,0.4);
  letter-spacing:4px;
  margin-bottom:40px;
}

.result-divider {
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(200,120,42,0.3), transparent);
  margin:28px 0;
}

/* Character reveal */
.char-block {
  display:grid;
  grid-template-columns:auto 1fr;
  gap:28px;
  align-items:start;
  margin-bottom:32px;
}
@media(max-width:520px) { .char-block { grid-template-columns:1fr; } }

.char-img-frame {
  position:relative;
  width:140px; flex-shrink:0;
}
.char-img-frame::before {
  content:'';
  position:absolute; inset:-4px;
  border:1px solid rgba(200,120,42,0.25);
  pointer-events:none;
}
.char-img-frame::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.6), transparent 50%);
}
.char-img {
  width:140px; height:175px;
  object-fit:cover;
  display:block;
  filter:sepia(25%) contrast(1.05) saturate(0.9);
}
.char-img-fallback {
  width:140px; height:175px;
  display:flex; align-items:center; justify-content:center;
  font-size:60px;
  background:rgba(200,120,42,0.04);
  border:1px solid rgba(200,120,42,0.1);
}
.char-info { padding-top:4px; }
.resonance-label {
  font-family:'Share Tech Mono', monospace;
  font-size:9px;
  color:rgba(57,255,113,0.4);
  letter-spacing:4px;
  margin-bottom:8px;
}
.char-name {
  font-family:'Noto Serif TC', serif;
  font-size:24px;
  font-weight:900;
  color:#d4c89a;
  text-shadow:0 0 20px rgba(212,200,154,0.2);
  margin-bottom:2px;
}
.char-source {
  font-size:12px;
  color:rgba(200,120,42,0.5);
  letter-spacing:2px;
  margin-bottom:16px;
  font-family:'Share Tech Mono', monospace;
}
.trait-list { display:flex; flex-wrap:wrap; gap:6px; }
.trait {
  font-family:'Share Tech Mono', monospace;
  font-size:10px;
  color:rgba(57,255,113,0.6);
  border:1px solid rgba(57,255,113,0.2);
  padding:3px 10px;
  letter-spacing:1px;
}

/* Analysis */
.analysis-section {
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(200,120,42,0.12);
  padding:24px;
  position:relative;
}
.analysis-section::before {
  content:'▌ PSYCHE PROFILE // CLASSIFIED ▐';
  position:absolute; top:-9px; left:20px;
  font-family:'Share Tech Mono', monospace;
  font-size:9px;
  color:rgba(255,48,48,0.5);
  background:rgba(0,0,0,0.9);
  padding:0 8px;
  letter-spacing:3px;
}
.analysis-text {
  font-family:'Noto Serif TC', serif;
  font-size:14px;
  line-height:2.1;
  color:rgba(212,200,154,0.85);
  font-weight:300;
}
.analysis-text em {
  color:#e8c870;
  font-style:normal;
  font-weight:600;
}

.restart-btn {
  display:block; width:100%;
  padding:16px;
  background:transparent;
  border:1px solid rgba(200,120,42,0.2);
  color:rgba(200,120,42,0.6);
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  letter-spacing:4px;
  cursor:pointer;
  margin-top:36px;
  transition:all 0.3s;
}
.restart-btn:hover {
  border-color:rgba(200,120,42,0.5);
  color:#c8782a;
  box-shadow:0 0 20px rgba(200,120,42,0.1);
}

/* Noise vignette frame for immersion */
.vignette {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}

/* Smoke/haze layer */
#haze-canvas { position:fixed; inset:0; z-index:3; pointer-events:none; opacity:0.35; }
</style>
</head>
<body>

<!-- Atmospheric layers -->
<div id="scene"></div>
<div class="vignette"></div>
<canvas id="dust-canvas"></canvas>
<canvas id="haze-canvas"></canvas>

<!-- ══════ BOOT ══════ -->
<div id="boot-screen">
  <div class="boot-logo">黃昏後<br>第二十四小時</div>
  <div class="boot-logo-sub">DOOMSDAY PERSONA ASSESSMENT</div>
  <div class="boot-terminal">
    <div class="boot-line" style="animation-delay:.3s">▸ SYSTEM BOOT ........... [OK]</div>
    <div class="boot-line" style="animation-delay:.7s">▸ 載入末日人格資料庫 ..... [OK]</div>
    <div class="boot-line" style="animation-delay:1.1s">▸ 比對12份機密人格檔案 ... [OK]</div>
    <div class="boot-line warn" style="animation-delay:1.6s">⚠ 文明存活率 &lt; 0.001% ... [CRITICAL]</div>
    <div class="boot-line err" style="animation-delay:2.0s">✕ 不適者將被系統自動淘汰 . [WARNING]</div>
    <div class="boot-line" style="animation-delay:2.5s">&nbsp;</div>
    <div class="boot-line cursor-blink" style="animation-delay:2.9s">▸ 準備評估受測者靈魂適性_</div>
  </div>
  <button class="boot-enter-btn" onclick="startQuiz()">▶ 進入末日評估系統</button>
</div>

<!-- ══════ QUIZ ══════ -->
<div id="quiz-screen">
  <div class="quiz-wrap">
    <div class="hud-bar">
      <div>
        <div class="hud-label">QUESTION</div>
        <div class="hud-qnum" id="hud-num">01 / 07</div>
      </div>
      <div class="hud-prog-wrap">
        <div class="hud-prog-track">
          <div class="hud-prog-fill" id="prog-fill" style="width:14%"></div>
        </div>
      </div>
      <div class="hud-dots" id="hud-dots"></div>
    </div>

    <div class="scene-title-block" id="scene-title-block">
      <div class="scene-eyebrow" id="q-eyebrow">Q01 // SCENARIO ALPHA</div>
      <div class="scene-heading" id="q-heading">-</div>
      <div class="scene-situation" id="q-situation">-</div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-prompt" id="q-prompt">-</div>
      <div class="options" id="options"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="prevQ()" disabled>◀ BACK</button>
      <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(200,120,42,0.3);letter-spacing:2px;">SELECT TO CONTINUE</span>
      <button class="nav-btn primary" id="btn-next" onclick="nextQ()" disabled>NEXT ▶</button>
    </div>
  </div>
</div>

<!-- ══════ COMPUTING ══════ -->
<div id="computing-overlay">
  <div class="computing-ring"></div>
  <div class="computing-lbl">ANALYZING SOUL MATRIX</div>
  <div class="computing-bar"><div class="computing-bar-fill"></div></div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(57,255,113,0.35);letter-spacing:3px;margin-top:8px;">比對12份機密人格檔案中...</div>
</div>

<!-- ══════ RESULT ══════ -->
<div id="result-screen">
  <div class="result-wrap" id="result-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════
   SCENE BACKGROUNDS per question
═══════════════════════════════════════ */
const sceneBGs = [
  // Q1 - collapsing shelter - heavy amber/brown debris
  { bg:'radial-gradient(ellipse at 30% 70%, #1a0800 0%, #0d0400 50%, #000 100%)', dustColor:'#a06020', hazeColor:'rgba(80,30,0,' },
  // Q2 - armed camp at night - cold blue-steel

  unlucky_cargo:{ fid:'FILE-12', name:'倒楣的物資倉庫', en:'THE UNLUCKY CARGO', char:'萊歐斯', src:'迷宮飯', emoji:'🍖', traits:['運氣極差','神級撿寶','戰鬥力為零','所有人的目標'],
    img:'https://upload.wikimedia.org/wikipedia/en/thumb/8/87/Laios_Dungeon_Meshi.png/220px-Laios_Dungeon_Meshi.png',
    analysis:'你是末日裡的行走傳說——<em>完全沒有任何戰鬥力，卻能在廢墟的垃圾堆裡隨手撿到神裝。</em>你的人生就是：剛剛差點被怪物吃掉，回頭一看，怪物的巢穴裡有一整個倉庫的物資。你是所有大佬的「必爭之物」，不是因為你強，而是因為<em>跟著你走就是跟著運氣走。</em>唯一的問題是：你可能在研究怪物料理的時候忘了牠還沒死。預測生存指數：6.5／10（全靠運氣，一旦運氣沒了直接Game Over）。'},
};

/* ═════════ STATE ═════════ */
let answers = new Array(7).fill(null);
let cur = 0;

/* ═════════ DUST PARTICLES ═════════ */
(function initDust() {
  const canvas = document.getElementById('dust-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  let currentColor = '#a06020';

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function makeParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2.5 + 0.3,
      vx: (Math.random() - 0.3) * 0.6,
      vy: (Math.random() - 0.7) * 0.5,
      alpha: Math.random() * 0.6 + 0.1,
      life: Math.random()
    };
  }

  for (let i = 0; i < 90; i++) particles.push(makeParticle());

  function step() {
    ctx.clearRect(0, 0, W, H);
    for (let p of particles) {
      p.x += p.vx + Math.sin(p.life * 3) * 0.2;
      p.y += p.vy;
      p.life += 0.003;
      if (p.y < -10 || p.x < -10 || p.x > W + 10) Object.assign(p, makeParticle(), { y: H + 5 });

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = currentColor + (Math.floor(p.alpha * 255).toString(16).padStart(2,'0'));
      ctx.fill();
    }
    requestAnimationFrame(step);
  }
  step();

  window.setDustColor = c => { currentColor = c; };
})();

/* ═════════ HAZE ═════════ */
(function initHaze() {
  const canvas = document.getElementById('haze-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let hazeBase = 'rgba(80,30,0,';
  let blobs = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 4; i++) {
    blobs.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 150 + Math.random() * 250,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.08,
      phase: Math.random() * Math.PI * 2
    });
  }

  let t = 0;
  function step() {
    ctx.clearRect(0, 0, W, H);
    t += 0.004;
    for (let b of blobs) {
      b.x += b.vx + Math.sin(t + b.phase) * 0.1;
      b.y += b.vy + Math.cos(t + b.phase * 0.7) * 0.05;
      if (b.x < -b.r) b.x = W + b.r;
      if (b.x > W + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = H + b.r;
      if (b.y > H + b.r) b.y = -b.r;

      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      const alpha = (0.06 + Math.sin(t + b.phase) * 0.02).toFixed(3);
      grad.addColorStop(0, hazeBase + alpha + ')');
      grad.addColorStop(1, hazeBase + '0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(step);
  }
  step();

  window.setHazeColor = c => { hazeBase = c; };
})();

/* ═════════ SCENE TRANSITION ═════════ */
function setScene(idx) {
  const s = sceneBGs[idx] || sceneBGs[0];
  document.getElementById('scene').style.background = s.bg;
  window.setDustColor && window.setDustColor(s.dustColor);
  window.setHazeColor && window.setHazeColor(s.hazeColor);
}

/* ═════════ HUD DOTS ═════════ */
function buildDots() {
  const el = document.getElementById('hud-dots');
  el.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'hud-dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    el.appendChild(d);
  }
}

/* ═════════ RENDER QUESTION ═════════ */
function renderQ(idx) {
  cur = idx;
  const q = Qs[idx];
  setScene(idx);
  buildDots();

  document.getElementById('hud-num').textContent = `0${idx+1} / 07`;
  document.getElementById('prog-fill').style.width = `${(idx+1)/7*100}%`;
  document.getElementById('q-eyebrow').textContent = q.eyebrow;
  document.getElementById('q-heading').textContent = q.heading;
  document.getElementById('q-situation').textContent = q.situation;
  document.getElementById('q-prompt').textContent = q.prompt;

  // Animate blocks
  ['scene-title-block','q-card'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });

  const grid = document.getElementById('options');
  grid.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[idx] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-key">${o.k}</span><span>${o.t}</span>`;
    btn.onclick = () => selectOpt(idx, i);
    grid.appendChild(btn);
  });

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = answers[idx] === null;
  document.getElementById('btn-next').textContent = idx === 6 ? '查看結果 ▶' : 'NEXT ▶';
}

function selectOpt(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  document.querySelectorAll('.opt-btn').forEach((b,i) => b.classList.toggle('selected', i === optIdx));
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (answers[cur] === null) return;
  if (cur === 6) showComputing();
  else renderQ(cur + 1);
}
function prevQ() { if (cur > 0) renderQ(cur - 1); }

/* ═════════ COMPUTING ═════════ */
function showComputing() {
  const ov = document.getElementById('computing-overlay');
  ov.style.display = 'flex';
  // reset bar animation
  const bar = ov.querySelector('.computing-bar-fill');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = 'barFill 2.2s ease forwards';

  setTimeout(() => {
    ov.style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    renderResult(calcResult());
    document.getElementById('scene').style.background = 'radial-gradient(ellipse at center, #0e0300 0%, #000 100%)';
    window.setDustColor('#804010');
    window.setHazeColor('rgba(60,20,0,');
  }, 2800);
}

/* ═════════ CALCULATE ═════════ */
function calcResult() {
  const s = {};
  Object.keys(PERSONAS).forEach(k => s[k] = 0);
  answers.forEach((ans, qi) => {
    if (ans === null) return;
    Qs[qi].opts[ans].c.forEach(c => { if (s[c] !== undefined) s[c]++; });
  });
  let max = -1, winner = null;
  Object.entries(s).forEach(([k,v]) => { if (v > max) { max=v; winner=k; } });
  const ties = Object.entries(s).filter(([,v])=>v===max).map(([k])=>k);
  if (ties.length > 1 && answers[6] !== null) {
    const q7c = Qs[6].opts[answers[6]].c;
    const tw = q7c.find(c => ties.includes(c));
    if (tw) winner = tw;
  }
  return PERSONAS[winner];
}

/* ═════════ RENDER RESULT ═════════ */
function renderResult(p) {
  const wrap = document.getElementById('result-wrap');
  wrap.innerHTML = `
    <div style="margin-bottom:6px"><span class="result-stamp">⚠ 末日人格評估完畢 ⚠</span></div>
    <div class="result-file">◈ ${p.fid} // SOUL SCAN COMPLETE ◈</div>
    <div class="result-name">${p.name}</div>
    <div class="result-en">${p.en}</div>

    <div class="result-divider"></div>

    <div class="char-block">
      <div class="char-img-frame">
        <img class="char-img" src="${p.img}" alt="${p.char}"
          onerror="this.style.display='none';document.getElementById('char-fb').style.display='flex'">
        <div id="char-fb" class="char-img-fallback" style="display:none">${p.emoji}</div>
      </div>
      <div class="char-info">
        <div class="resonance-label">▌ SOUL RESONANCE TARGET ▐</div>
        <div class="char-name">${p.char}</div>
        <div class="char-source">《${p.src}》</div>
        <div class="trait-list">${p.traits.map(t=>`<span class="trait">▸ ${t}</span>`).join('')}</div>
      </div>
    </div>

    <div class="result-divider"></div>

    <div class="analysis-section">
      <div class="analysis-text">${p.analysis}</div>
    </div>

    <button class="restart-btn" onclick="restartQuiz()">↺ 重新評估 &nbsp;// RESTART ASSESSMENT</button>
  `;
}

/* ═════════ QUIZ START / RESTART ═════════ */
function startQuiz() {
  answers = new Array(7).fill(null);
  document.getElementById('boot-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ(0);
}

function restartQuiz() {
  answers = new Array(7).fill(null);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ(0);
}

/* Boot screen scene */
setScene(0);
</script>
