<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後宮甄嬛傳 - 解答之書</title>
    <style>
        /* 古風宮廷核心樣式 */
        body {
            margin: 0;
            padding: 0;
            background-color: #5c0b14; /* 原本的宮牆紅 */
            /* 還原原本的圓點背景樣式 */
            background-image: radial-gradient(rgba(0, 0, 0, 0.3) 20%, transparent 20%),
                              radial-gradient(rgba(0, 0, 0, 0.3) 20%, transparent 20%);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
            color: #f7e3af; /* 皇家金/米黃 */
            font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止花瓣特效造成滾動條 */
            position: relative;
        }

        /* 裝飾：古典宮廷頂部黃色琉璃瓦簷飾條 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #d4af37, #f7e3af, #aa820a, #d4af37);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* 花瓣飄落容器 */
        .petal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 讓滑鼠可以穿透花瓣點擊按鈕 */
            z-index: 1;
        }

        /* 花瓣樣式與動畫 */
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5, #e35d6a); /* 梅粉色 */
            border-radius: 15px 0px 15px 12px;
            opacity: 0.8;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translateY(-50px) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(105vh) translateX(150px) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: linear-gradient(135deg, #80111A, #4A050B);
            border: 4px double #d4af37; /* 雙金線邊框 */
            border-radius: 12px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(212,175,55,0.3);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* 改回原本的菱形符號，並配置在四個角落 */
        .corner-deco {
            position: absolute;
            color: #d4af37;
            font-size: 20px;
            user-select: none;
        }
        .top-left { top: 10px; left: 15px; }
        .top-right { top: 10px; right: 15px; }
        .bottom-left { bottom: 10px; left: 15px; }
        .bottom-right { bottom: 10px; right: 15px; }

        h1 {
            font-size: 2.2rem;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #f7e3af;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            background: linear-gradient(to bottom, #d4af37, #aa820a);
            color: #4A050B;
            border: 2px solid #f7e3af;
            border-radius: 30px;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            letter-spacing: 2px;
            min-width: 200px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212,175,55,0.6);
            background: linear-gradient(to bottom, #f7e3af, #d4af37);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: linear-gradient(to bottom, #7c7c7c, #444444);
            color: #ffffff;
            border-color: #aaaaaa;
        }
        .btn-secondary:hover {
            background: linear-gradient(to bottom, #aaaaaa, #666666);
            box-shadow: 0 6px 20px rgba(250,250,250,0.2);
        }

        /* 頁面切換控制 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* 圖片顯示區域 */
        .result-container {
            margin-top: 30px;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed rgba(212,175,55,0.4);
            border-radius: 8px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .answer-img {
            max-width: 100%;
            max-height: 350px;
            border: 3px solid #d4af37;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
            animation: scaleUp 0.5s ease-out;
        }

        .placeholder-text {
            color: rgba(247, 227, 175, 0.6);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* 動畫效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="petal-container" id="petalContainer"></div>

    <div class="container">
        <div class="corner-deco top-left">❖</div>
        <div class="corner-deco top-right">❖</div>
        <div class="corner-deco bottom-left">❖</div>
        <div class="corner-deco bottom-right">❖</div>

        <div id="page1" class="page active">
            <h1>後宮甄嬛傳</h1>
            <div class="subtitle">━ 答疑解惑 · 解冊 ━</div>
            <p style="margin-bottom: 40px; color: #f7e3af; letter-spacing: 1px;">心誠則靈，讓小主與娘娘們為您指點迷津。</p>
            <div class="btn-group">
                <button class="btn" onclick="navigateTo('page2')">熹妃回宮</button>
                <button class="btn btn-secondary" onclick="exitApp()">本宮乏了</button>
            </div>
        </div>

        <div id="page2" class="page">
            <h1>解答之書</h1>
            <div class="subtitle">━ 祈問天意，靜候聖諭 ━</div>
            <p style="color: #f7e3af;">請在心中默念您的疑惑...</p>
             
            <div class="btn-group" style="margin-top: 25px;">
                <button class="btn" onclick="drawAnswer()">娘娘有何吩咐？</button>
                <button class="btn btn-secondary" style="min-width: 120px; padding: 8px 20px; font-size: 1rem;" onclick="navigateTo('page1')">返回首頁</button>
            </div>

            <div class="result-container">
                <div id="placeholder" class="placeholder-text">按下上方按鈕，即賜娘娘金言</div>
                <img id="answerImage" class="answer-img" src="" alt="解答圖片">
            </div>
        </div>
    </div>

    <script>
        // 圖片庫清單 (共 102 張圖片)
        const imageList = [
            "IMG_0402.PNG", "IMG_0403.PNG", "IMG_0404.PNG", "IMG_0405.PNG", "IMG_0406.PNG", 
            "IMG_0407.PNG", "IMG_0408.PNG", "IMG_0409.PNG", "IMG_0410.PNG", "IMG_0411.PNG", 
            "IMG_0412.PNG", "IMG_0413.PNG", "IMG_0414.PNG", "IMG_0415.PNG", "IMG_0416.PNG", 
            "IMG_0417.PNG", "IMG_0418.PNG", "IMG_0419.PNG", "IMG_0420.PNG", "IMG_0421.PNG", 
            "IMG_0422.PNG", "IMG_0423.PNG", "IMG_0424.PNG", "IMG_0425.PNG", "IMG_0426.PNG", 
            "IMG_0427.PNG", "IMG_0428.PNG", "IMG_0429.PNG", "IMG_0430.PNG", "IMG_0431.PNG", 
            "IMG_0432.PNG", "IMG_0433.PNG", "IMG_0434.PNG", "IMG_0435.PNG", "IMG_0436.PNG", 
            "IMG_0437.PNG", "IMG_0438.PNG", "IMG_0439.PNG", "IMG_0440.PNG", "IMG_0441.PNG", 
            "IMG_0442.PNG", "IMG_0443.PNG", "IMG_0444.PNG", "IMG_0445.PNG", "IMG_0446.PNG", 
            "IMG_0447.PNG", "IMG_0448.PNG", "IMG_0449.PNG", "IMG_0450.PNG", "IMG_0451.PNG", 
            "IMG_4549.PNG", "IMG_4550.PNG", "IMG_4551.PNG", "IMG_4552.PNG", "IMG_4553.PNG", 
            "IMG_4554.PNG", "IMG_4555.PNG", "IMG_4556.PNG", "IMG_4557.PNG", "IMG_4558.PNG", 
            "IMG_4559.PNG", "IMG_4560.PNG", "IMG_4561.PNG", "IMG_4562.PNG", "IMG_4563.PNG", 
            "IMG_4564.PNG", "IMG_4565.PNG", "IMG_4566.PNG", "IMG_4567.PNG", "IMG_4568.PNG", 
            "IMG_4569.PNG", "IMG_4570.PNG", "IMG_4571.PNG", "IMG_4572.PNG", "IMG_4573.PNG", 
            "IMG_4574.PNG", "IMG_4575.PNG", "IMG_4576.PNG", "IMG_4577.PNG", "IMG_4578.PNG", 
            "IMG_4579.PNG", "IMG_4580.PNG", "IMG_4581.PNG", "IMG_4582.PNG", "IMG_4583.PNG", 
            "IMG_4584.PNG", "IMG_4585.PNG", "IMG_4586.PNG", "IMG_4587.PNG", "IMG_4588.PNG", 
            "IMG_4589.PNG", "IMG_4590.PNG", "IMG_4591.PNG", "IMG_4592.PNG", "IMG_4593.PNG", 
            "IMG_4594.PNG", "IMG_4595.PNG", "IMG_4596.PNG", "IMG_4597.PNG", "IMG_4598.PNG", 
            "IMG_4599.PNG", "IMG_4600.PNG"
        ];

        // 動態生成飄落花瓣的 JS 腳本
        function createPetals() {
            const container = document.getElementById('petalContainer');
            const petalCount = 25; // 限制花瓣數量維持效能

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                // 隨機尺寸、位置與動畫延遲
                const size = Math.random() * 12 + 8; // 8px ~ 20px
                petal.style.width = `${size}px`;
                petal.style.height = `${size}px`;
                petal.style.left = `${Math.random() * 100}vw`;
                
                const duration = Math.random() * 5 + 6; // 6s ~ 11s 慢速飄落
                petal.style.animationDuration = `${duration}s`;
                
                const delay = Math.random() * -10; // 負延遲讓動畫一開始就錯開分布
                petal.style.animationDelay = `${delay}s`;

                container.appendChild(petal);
            }
        }

        // 初始化背景裝飾
        window.addEventListener('DOMContentLoaded', createPetals);

        // 頁面切換函式
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // 退出畫面功能 (已刪除 alert 彈出視窗)
        function exitApp() {
            document.body.innerHTML = `
                <div class="container" style="animation: fadeIn 1s ease;">
                    <div class="corner-deco top-left">❖</div>
                    <div class="corner-deco top-right">❖</div>
                    <div class="corner-deco bottom-left">❖</div>
                    <div class="corner-deco bottom-right">❖</div>
                    <h1>恭送娘娘</h1>
                    <p style="color: #d4af37; margin-top:30px;">本宮乏了，起駕回宮 ──</p>
                </div>
            `;
        }

        // 隨機抽取解答圖片
        function drawAnswer() {
            const placeholder = document.getElementById('placeholder');
            const answerImage = document.getElementById('answerImage');
            
            const randomIndex = Math.floor(Math.random() * imageList.length);
            const selectedImage = imageList[randomIndex];
            
            answerImage.style.display = 'none';
            placeholder.style.display = 'block';
            placeholder.innerText = "正在恭請聖諭...";

            answerImage.src = selectedImage;
            
            answerImage.onload = function() {
                placeholder.style.display = 'none';
                answerImage.style.display = 'block';
            };

            answerImage.onerror = function() {
                placeholder.style.display = 'block';
                placeholder.innerHTML = `<span style="color: #ff8888;">未能尋獲該簽意 (${selectedImage})<br>請確認圖片檔案是否存在。</span>`;
            };
        }
    </script>
</body>
</html>
