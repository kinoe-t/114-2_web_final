<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彈道瞄準物理撞擊遊戲 - 石頭版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            background: linear-gradient(to bottom, #111936, #2a3a5e);
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .ui-text {
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #level-title {
            color: #4ffacf;
        }
        #score-text {
            color: #ffd43b;
        }
        #shots-text {
            color: #ff7675;
        }
        /* 彈出視窗樣式 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .overlay.hidden {
            display: none;
        }
        .overlay h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .overlay p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ccc;
        }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4ffacf;
            color: #111936;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(79, 250, 207, 0.4);
        }
        .btn:hover {
            background-color: #3ee6bd;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(1px);
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        
        <div id="ui-layer">
            <div id="level-title" class="ui-text">關卡: 1 / 5</div>
            <div id="shots-text" class="ui-text">已發射: 0</div>
            <div id="score-text" class="ui-text">目標剩餘: 0</div>
        </div>

        <div id="instruction">按住滑鼠左鍵並拖曳以瞄準，放開即可發射石頭</div>

        <div id="start-overlay" class="overlay">
            <h1 style="color: #4ffacf;">幾何彈道撞擊戰</h1>
            <p>調整完美的角度與力道，摧毀所有黃色目標物！</p>
            <button class="btn" onclick="startGame()">開始遊戲</button>
        </div>

        <div id="clear-overlay" class="overlay hidden">
            <h1 style="color: #ffd43b;">★ 關卡完成 ★</h1>
            <p id="clear-info">幹得好！準備迎接下一關。</p>
            <button id="next-btn" class="btn" onclick="nextLevel()">下一關</button>
        </div>

        <div id="gameover-overlay" class="overlay hidden">
            <h1 style="color: #4ffacf;">🎉 恭喜通關 🎉</h1>
            <p id="final-info">你成功的擊破了所有關卡！</p>
            <button class="btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 遊戲狀態
        let currentLevel = 1;
        const maxLevels = 5;
        let score = 0; 
        let shotCount = 0;
        let isGaming = false;

        // 物理環境參數
        const gravity = 0.25;
        const friction = 0.99; // 空氣阻力
        const bounce = 0.6;    // 彈力係數

        // 發射點 (發射台位置)
        const launcher = { x: 100, y: 400, radius: 20 };

        // 球的物件狀態 (現在是石頭)
        let ball = {
            x: launcher.x,
            y: launcher.y,
            vx: 0,
            vy: 0,
            radius: 12,
            isLaunched: false,
            color: '#888' // 石頭基礎灰色
        };

        // 滑鼠與瞄準狀態
        let mouse = { x: 0, y: 0, isDown: false };

        // 障礙物與目標物陣列
        // 類型: 'target' (必須擊倒的黃色箱子), 'static' (無法擊碎的灰色障礙物)
        let boxes = [];

        // 關卡地圖資料定義
        // 屬性：x, y, width, height, type, [angle(選填)]
        const levelData = {
            1: [
                { x: 600, y: 450, w: 40, h: 60, type: 'target' },
                { x: 650, y: 410, w: 40, h: 100, type: 'target' },
                { x: 700, y: 430, w: 40, h: 80, type: 'target' },
                { x: 500, y: 350, w: 150, h: 20, type: 'static' } // 懸空平台
            ],
            2: [
                { x: 550, y: 430, w: 40, h: 80, type: 'target' },
                { x: 750, y: 430, w: 40, h: 80, type: 'target' },
                { x: 650, y: 250, w: 50, h: 50, type: 'target' }, // 在平台上
                { x: 600, y: 300, w: 150, h: 20, type: 'static' },
                { x: 450, y: 200, w: 30, h: 310, type: 'static' } // 高牆阻擋
            ],
            3: [
                // 疊疊樂塔
                { x: 650, y: 450, w: 40, h: 60, type: 'target' },
                { x: 710, y: 450, w: 40, h: 60, type: 'target' },
                { x: 630, y: 390, w: 140, h: 20, type: 'static' }, // 夾層
                { x: 660, y: 310, w: 35, h: 80, type: 'target' },
                { x: 710, y: 310, w: 35, h: 80, type: 'target' },
                { x: 685, y: 250, w: 40, h: 60, type: 'target' }
            ],
            4: [
                // 躲在避難所裏的目標
                { x: 500, y: 470, w: 40, h: 40, type: 'target' },
                { x: 700, y: 430, w: 40, h: 80, type: 'target' },
                // 石頭防護罩
                { x: 600, y: 360, w: 30, h: 150, type: 'static' },
                { x: 600, y: 340, w: 160, h: 30, type: 'static' },
                { x: 730, y: 370, w: 30, h: 60, type: 'target' }
            ],
            5: [
                // 終極大關卡：全面包圍
                { x: 400, y: 470, w: 40, h: 40, type: 'target' },
                { x: 500, y: 410, w: 40, h: 100, type: 'target' },
                { x: 600, y: 310, w: 40, h: 200, type: 'static' }, // 沖天巨壁
                { x: 700, y: 430, w: 40, h: 80, type: 'target' },
                { x: 760, y: 450, w: 40, h: 60, type: 'target' },
                { x: 680, y: 200, w: 150, h: 20, type: 'static' }, 
                { x: 730, y: 140, w: 40, h: 60, type: 'target' } // 高空目標
            ]
        };

        // 預備與自定義類別：箱子/障礙物物件
        class Box {
            constructor(x, y, w, h, type) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.type = type; // 'target' 或 'static'
                
                // 物理動態屬性 (僅 target 具備模擬位移/倒塌，簡化採用速度模擬)
                this.vx = 0;
                this.vy = 0;
                this.isHit = false;
                this.alpha = 1.0; // 用於消失動畫
                this.toRemove = false;
            }

            update() {
                if (this.type === 'target' && this.isHit) {
                    // 套用重力與速度
                    this.vy += gravity;
                    this.vx *= friction;
                    this.vy *= friction;
                    this.x += this.vx;
                    this.y += this.vy;

                    // 地面碰撞
                    if (this.y + this.h >= canvas.height - 40) {
                        this.y = canvas.height - 40 - this.h;
                        this.vy = -this.vy * 0.3; // 輕微彈跳
                        this.vx *= 0.8; // 地面摩擦
                    }

                    // 如果掉出螢幕外面或者速度極慢，開始淡出
                    if (Math.abs(this.vx) < 0.2 && Math.abs(this.vy) < 0.2 || this.y > canvas.height) {
                        this.alpha -= 0.02;
                        if (this.alpha <= 0) {
                            this.toRemove = true;
                        }
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                if (this.type === 'target') {
                    // 目標物黃色
                    ctx.fillStyle = this.isHit ? '#ffeaa7' : '#ffd43b';
                    ctx.strokeStyle = '#e67e22';
                } else {
                    // 靜態障礙物灰色
                    ctx.fillStyle = '#7f8c8d';
                    ctx.strokeStyle = '#34495e';
                }
                ctx.lineWidth = 2;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeRect(this.x, this.y, this.w, this.h);
                ctx.restore();
            }
        }

        // 初始化關卡
        function initLevel(levelNum) {
            currentLevel = levelNum;
            shotCount = 0;
            resetBall();
            
            // 載入關卡物件
            boxes = [];
            const data = levelData[levelNum];
            data.forEach(item => {
                boxes.push(new Box(item.x, item.y, item.w, item.h, item.type));
            });

            updateUI();
        }

        // 重設球的位置
        function resetBall() {
            ball.x = launcher.x;
            ball.y = launcher.y;
            ball.vx = 0;
            ball.vy = 0;
            ball.isLaunched = false;
        }

        function updateUI() {
            const remainingTargets = boxes.filter(b => b.type === 'target' && !b.toRemove).length;
            document.getElementById('level-title').innerText = `關卡: ${currentLevel} / ${maxLevels}`;
            document.getElementById('shots-text').innerText = `已發射: ${shotCount}`;
            document.getElementById('score-text').innerText = `目標剩餘: ${remainingTargets}`;
            
            // 檢查是否過關
            if (remainingTargets === 0 && isGaming) {
                isGaming = false;
                setTimeout(handleLevelClear, 800);
            }
        }

        function handleLevelClear() {
            if (currentLevel < maxLevels) {
                document.getElementById('clear-info').innerText = `你用了 ${shotCount} 顆石頭完成了第 ${currentLevel} 關！`;
                document.getElementById('clear-overlay').classList.remove('hidden');
            } else {
                document.getElementById('final-info').innerText = `太厲害了！你通關了所有組態，總共完成了 ${maxLevels} 個挑戰。`;
                document.getElementById('gameover-overlay').classList.remove('hidden');
            }
        }

        // 按鈕控制事件
        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            isGaming = true;
            initLevel(1);
            animate();
        }

        function nextLevel() {
            document.getElementById('clear-overlay').classList.add('hidden');
            isGaming = true;
            initLevel(currentLevel + 1);
        }

        function restartGame() {
            document.getElementById('gameover-overlay').classList.add('hidden');
            isGaming = true;
            initLevel(1);
        }

        // 取得滑鼠在 Canvas 上的精確位置
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        // 事件監聽：滑鼠/觸控
        canvas.addEventListener('mousedown', (e) => {
            if (ball.isLaunched || !isGaming) return;
            mouse.isDown = true;
            const pos = getMousePos(e);
            mouse.x = pos.x;
            mouse.y = pos.y;
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            mouse.x = pos.x;
            mouse.y = pos.y;
        });

        window.addEventListener('mouseup', () => {
            if (!mouse.isDown) return;
            mouse.isDown = false;

            if (!ball.isLaunched && isGaming) {
                // 計算發射力道 (反比拖曳：像拉彈弓一樣)
                const dx = launcher.x - mouse.x;
                const dy = launcher.y - mouse.y;
                
                // 設定發射速度 (乘上係數調整手感)
                ball.vx = dx * 0.12;
                ball.vy = dy * 0.12;
                ball.isLaunched = true;
                shotCount++;
                updateUI();
            }
        });

        // 支援手機觸控
        canvas.addEventListener('touchstart', (e) => {
            if (ball.isLaunched || !isGaming) return;
            mouse.isDown = true;
            const pos = getMousePos(e.touches[0]);
            mouse.x = pos.x;
            mouse.y = pos.y;
            e.preventDefault();
        });
        canvas.addEventListener('touchmove', (e) => {
            const pos = getMousePos(e.touches[0]);
            mouse.x = pos.x;
            mouse.y = pos.y;
            e.preventDefault();
        });
        canvas.addEventListener('touchend', () => {
            if (!mouse.isDown) return;
            mouse.isDown = false;
            const dx = launcher.x - mouse.x;
            const dy = launcher.y - mouse.y;
            ball.vx = dx * 0.12;
            ball.vy = dy * 0.12;
            ball.isLaunched = true;
            shotCount++;
            updateUI();
        });


        // 矩形與圓形的碰撞偵測 AABB
        function checkCollision(circle, rect) {
            // 找出矩形上距離圓心最近的點
            const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
            const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));

            // 計算圓心與該最近點的距離
            const distanceX = circle.x - closestX;
            const distanceY = circle.y - closestY;
            const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

            if (distanceSquared < (circle.radius * circle.radius)) {
                return {
                    collided: true,
                    closestX: closestX,
                    closestY: closestY,
                    dx: distanceX,
                    dy: distanceY
                };
            }
            return { collided: false };
        }

        // 核心遊戲迴圈更新
        function updatePhysics() {
            // 1. 更新障礙物/目標狀態
            let targetRemovedEvent = false;
            boxes.forEach(box => {
                box.update();
                if (box.toRemove) {
                    targetRemovedEvent = true;
                }
            });
            // 過濾掉徹底消失的物件
            if (targetRemovedEvent) {
                boxes = boxes.filter(box => !box.toRemove);
                updateUI();
            }

            // 2. 更新球的物理
            if (ball.isLaunched) {
                ball.vy += gravity;    // 套用重力
                ball.vx *= friction;   // 空氣阻力
                ball.vy *= friction;
                ball.x += ball.vx;     // 位移
                ball.y += ball.vy;

                // 邊界碰撞：地面
                if (ball.y + ball.radius >= canvas.height - 40) {
                    ball.y = canvas.height - 40 - ball.radius;
                    ball.vy = -ball.vy * bounce;
                    ball.vx *= 0.95; // 地面摩擦力
                }
                // 邊界碰撞：左右牆壁
                if (ball.x - ball.radius <= 0) {
                    ball.x = ball.radius;
                    ball.vx = -ball.vx * bounce;
                } else if (ball.x + ball.radius >= canvas.width) {
                    ball.x = canvas.width - ball.radius;
                    ball.vx = -ball.vx * bounce;
                }
                // 邊界碰撞：天空
                if (ball.y - ball.radius <= 0) {
                    ball.y = ball.radius;
                    ball.vy = -ball.vy * bounce;
                }

                // 3. 球與方塊的碰撞處理
                boxes.forEach(box => {
                    let hitResult = checkCollision(ball, box);
                    if (hitResult.collided) {
                        box.isHit = true;
                        
                        // 計算碰撞反彈方向
                        // 判定撞擊點在矩形的哪一面
                        const overlapX = ball.radius - Math.abs(hitResult.dx);
                        const overlapY = ball.radius - Math.abs(hitResult.dy);

                        if (overlapX < overlapY) {
                            // 左右側撞擊
                            ball.vx = -ball.vx * bounce;
                            ball.x += hitResult.dx > 0 ? overlapX : -overlapX;
                            
                            // 傳遞衝量給目標物
                            if (box.type === 'target') {
                                box.vx = ball.vx * -0.5 + (hitResult.dx > 0 ? 2 : -2);
                            }
                        } else {
                            // 上下側撞擊
                            ball.vy = -ball.vy * bounce;
                            ball.y += hitResult.dy > 0 ? overlapY : -overlapY;
                            
                            if (box.type === 'target') {
                                box.vy = ball.vy * -0.5 + (hitResult.dy > 0 ? 2 : -2);
                            }
                        }
                    }
                });

                // 如果球的速度趨近於零且躺在地上，或者飛出右邊界，就重置球
                if (ball.y >= canvas.height - 40 - ball.radius && Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
                    resetBall();
                }
            }
        }

        // 繪製畫面
        function draw() {
            // 清空畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製草地/地面底座
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            ctx.fillStyle = '#219653';
            ctx.fillRect(0, canvas.height - 40, canvas.width, 8); // 草地亮邊

            // 繪製發射台
            ctx.beginPath();
            ctx.arc(launcher.x, launcher.y, launcher.radius, 0, Math.PI, true);
            ctx.fillStyle = '#7f8c8d';
            ctx.fill();
            ctx.closePath();

            // 繪製所有方塊
            boxes.forEach(box => box.draw());

            // 繪製彈道預測線 (當玩家正在拖曳瞄準時)
            if (mouse.isDown && !ball.isLaunched) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 8]); // 虛線效果

                // 彈道模擬虛擬點
                let simX = launcher.x;
                let simY = launcher.y;
                let simVx = (launcher.x - mouse.x) * 0.12;
                let simVy = (launcher.y - mouse.y) * 0.12;

                ctx.moveTo(simX, simY);
                // 模擬未來 40 個時間步的軌跡
                for (let i = 0; i < 40; i++) {
                    simVy += gravity;
                    simVx *= friction;
                    simVy *= friction;
                    simX += simVx;
                    simY += simVy;
                    
                    if (simY >= canvas.height - 40) break; // 模擬到地面就停止
                    ctx.lineTo(simX, simY);
                }
                ctx.stroke();
                ctx.setLineDash([]); // 還原實線
                
                // 繪製拖曳拉線 (橡皮筋視覺感)
                ctx.beginPath();
                ctx.strokeStyle = '#4ffacf';
                ctx.lineWidth = 2;
                ctx.moveTo(launcher.x, launcher.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
            }

            // 繪製主體球 (現在是石頭造型)
            ctx.fillStyle = ball.color; // 基礎石頭灰色
            ctx.shadowBlur = ball.isLaunched ? 10 : 0;
            ctx.shadowColor = ball.color;
            
            // 1. 繪製石頭不規則形狀
            ctx.beginPath();
            ctx.moveTo(ball.x - ball.radius * 0.8, ball.y - ball.radius * 0.5);
            ctx.lineTo(ball.x - ball.radius * 0.5, ball.y - ball.radius);
            ctx.lineTo(ball.x + ball.radius * 0.5, ball.y - ball.radius * 0.8);
            ctx.lineTo(ball.x + ball.radius, ball.y - ball.radius * 0.2);
            ctx.lineTo(ball.x + ball.radius * 0.8, ball.y + ball.radius * 0.6);
            ctx.lineTo(ball.x + ball.radius * 0.2, ball.y + ball.radius);
            ctx.lineTo(ball.x - ball.radius * 0.6, ball.y + ball.radius * 0.8);
            ctx.lineTo(ball.x - ball.radius, ball.y + ball.radius * 0.3);
            ctx.closePath();
            ctx.fill();

            // 2. 繪製石頭紋理 (內部的線條)
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#555'; // 較深的紋理線條
            ctx.beginPath();
            ctx.moveTo(ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.6);
            ctx.lineTo(ball.x + ball.radius * 0.2, ball.y - ball.radius * 0.2);
            ctx.lineTo(ball.x - ball.radius * 0.1, ball.y + ball.radius * 0.5);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(ball.x + ball.radius * 0.4, ball.y - ball.radius * 0.5);
            ctx.lineTo(ball.x + ball.radius * 0.7, ball.y);
            ctx.stroke();

            ctx.shadowBlur = 0; // 還原陰影
        }

        // 主遊戲循環
        function animate() {
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
