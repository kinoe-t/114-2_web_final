<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎶看emoji猜歌名🎶</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --success-color: #00b894;
            --danger-color: #d63031;
            --warning-color: #fdcb6e;
            --background-color: #f7f1e3;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-color);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 首頁排版 */
        .category-buttons {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-category {
            background-color: var(--primary-color);
            color: white;
            flex: 1;
        }

        /* 按下按鈕變大的動畫效果 */
        .btn-category.clicked {
            transform: scale(1.25);
            z-index: 10;
        }

        /* 遊戲中頁面排版 */
        .game-status {
            display: flex;
            justify-content: space-between;
            color: #636e72;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .emoji-display {
            font-size: 4.5rem;
            margin: 30px 0;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-hint { background-color: var(--warning-color); color: #2d3436; }
        .btn-skip { background-color: #636e72; color: white; }

        .hint-text {
            background-color: #ffeaa7;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: bold;
            display: none;
            color: #d35400;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid #b2bec3;
            border-radius: 30px;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 40px;
            margin-top: 15px;
        }

        /* 結果回饋 */
        .result-message {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
            display: none;
        }
        .result-message.bingo { color: var(--success-color); }
        .result-message.wrong { color: var(--danger-color); }

        .btn-next {
            background-color: #2ecc71;
            color: white;
            display: none;
            margin: 20px auto 0 auto;
        }

        /* 結算頁面 */
        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .summary-list {
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 15px;
            background: #f1f2f6;
            border-radius: 10px;
        }

        .summary-item {
            padding: 8px 0;
            border-bottom: 1px solid #dfe4ea;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }
        .summary-item:last-child { border-bottom: none; }

        .btn-home {
            background-color: #2d3436;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎶看emoji猜歌名🎶</h1>

        <div id="home-page" class="page active">
            <div class="category-buttons">
                <button class="btn btn-category" onclick="selectCategory('mandarin', this)">華語歌曲</button>
                <button class="btn btn-category" onclick="selectCategory('kpop', this)">K-POP</button>
                <button class="btn btn-category" onclick="selectCategory('jpop', this)">J-POP</button>
            </div>
        </div>

        <div id="game-page" class="page">
            <div class="game-status">
                <span id="question-number">第 1 / 10 題</span>
                <span id="current-score">目前分數: 0</span>
            </div>

            <div id="emoji-box" class="emoji-display"></div>

            <div class="action-row" id="action-buttons">
                <button class="btn btn-hint" onclick="showHint()">提示💡</button>
                <button class="btn btn-skip" onclick="skipQuestion()">跳過⏩️</button>
            </div>

            <div id="hint-box" class="hint-text"></div>

            <div class="input-group" id="answer-area">
                <input type="text" id="user-answer" placeholder="請輸入歌名..." autocomplete="off" onkeydown="if(event.key==='Enter') checkAnswer()">
                <br>
                <button class="btn btn-submit" onclick="checkAnswer()">送出答案</button>
            </div>

            <div id="bingo-msg" class="result-message bingo">Bingo!!</div>
            <div id="wrong-msg" class="result-message wrong">❌❌</div>
            <button id="next-btn" class="btn btn-next" onclick="nextQuestion()">下一題▶️</button>
        </div>

        <div id="result-page" class="page">
            <h2>遊戲結束！</h2>
            <div class="score-display">總分：<span id="final-score">0</span> / 100</div>
            <h3>作答狀況：</h3>
            <div id="summary-container" class="summary-list"></div>
            <button class="btn btn-home" onclick="goHome()">回首頁</button>
        </div>
    </div>

    <script>
        // 題庫資料
        const questionBank = {
            mandarin: [
                { emoji: "🌛♥️", answers: ["月亮代表我的心"], hint: "月_ _ _ _ _ _" },
                { emoji: "😭💔🍺", answers: ["傷心酒店"], hint: "傷_ _ _" },
                { emoji: "🫵🌸", answers: ["你是我的花朵"], hint: "你_ _ _ _ _" },
                { emoji: "♥️📝", answers: ["心願便利貼"], hint: "心_ _ _ _" },
                { emoji: "🌾", answers: ["稻香"], hint: "稻_" },
                { emoji: "👧🏻", answers: ["女孩"], hint: "女_" },
                { emoji: "👨‍❤️‍💋‍👨3️⃣0️⃣0️⃣🎁", answers: ["崴孟三百天禮物", "崴孟300天禮物"], hint: "崴_ _ _ _ _ _" },
                { emoji: "🟢✨", answers: ["綠光"], hint: "綠_" },
                { emoji: "💤❌", answers: ["無眠"], hint: "無_" },
                { emoji: "9️⃣⤵️1️⃣8️⃣↪️", answers: ["九彎十八拐"], hint: "九_ _ _ _" }
            ],
            kpop: [
                { emoji: "📢", answers: ["Klaxon", "클락셩"], hint: "K_ _ _ _ _" },
                { emoji: "🦸‍♀️", answers: ["Super Lady"], hint: "S_ _ _ _  _ _ _ _" },
                { emoji: "🔵💌👩‍❤️‍👨", answers: ["Blue Valentine"], hint: "B_ _ _  _ _ _ _ _ _ _ _ _" },
                { emoji: "⭐⭐⭐", answers: ["See that?", "별별별"], hint: "S_ _  _ _ _ _ _" },
                { emoji: "🎭🤪", answers: ["Psycho", "레드벨벳"], hint: "P_ _ _ _ _" },
                { emoji: "👤❌", answers: ["Nobody", "nobody"], hint: "N_ _ _ _ _" },
                { emoji: "🔪👉♥️", answers: ["Kill This Love", "Kill this love", "kill this love"], hint: "K_ _ _  _ _ _ _  _ _ _ _" },
                { emoji: "🧬", answers: ["DNA", "Dna", "dna"], hint: "D_ _" },
                { emoji: "🦁", answers: ["LION", "lion", "Lion"], hint: "L_ _ _" },
                { emoji: "👩💍", answers: ["wife", "Wife", "WIFE"], hint: "W_ _ _ _ _ _" }
            ],
            jpop: [
                { emoji: "💐", answers: ["花束"], hint: "花_" },
                { emoji: "🍋", answers: ["Lemon", "lemon"], hint: "L_ _ _ _" },
                { emoji: "🌻", answers: ["向日葵"], hint: "向_ _ _" },
                { emoji: "🌹", answers: ["Rose", "rose"], hint: "R_ _ _" },
                { emoji: "⚪️📅", answers: ["白日"], hint: "白_" },
                { emoji: "💘🌬️", answers: ["恋風", "戀風"], hint: "恋_" },
                { emoji: "🔵☀️", answers: ["青と夏", "青和夏"], hint: "青_ _" },
                { emoji: "數位🍽️🎶", emoji: "開頭更正為星空", emoji:"🌃🍽️🎶", answers: ["晚餐歌"], hint: "晚_ _" }, 
                { emoji: "😈👶👩‍🍼", answers: ["悪魔の子", "惡魔之子"], hint: "悪_ _ _" },
                { emoji: "1️⃣0️⃣0️⃣0️⃣📖🌸", answers: ["千本桜", "千本櫻"], hint: "千_ _" }
            ]
        };

        // 修正 J-POP 第八題結構防錯
        questionBank.jpop[7] = { emoji: "🌃🍽️🎶", answers: ["晚餐歌"], hint: "晚_ _" };

        // 遊戲狀態變數
        let currentCategory = '';
        let currentQuestionIndex = 0;
        let score = 0;
        let hintUsed = false;
        let history = []; // 紀錄每題作答狀況

        // 選擇分類並切換 (包含放大特效與延遲跳轉)
        function selectCategory(category, buttonElement) {
            buttonElement.classList.add('clicked');
            
            setTimeout(() => {
                currentCategory = category;
                currentQuestionIndex = 0;
                score = 0;
                history = [];
                
                buttonElement.classList.remove('clicked');
                switchPage('game-page');
                loadQuestion();
            }, 400); // 0.4 秒後跳轉，讓變大動畫能被看見
        }

        // 載入題目
        function loadQuestion() {
            hintUsed = false;
            document.getElementById('hint-box').style.display = 'none';
            document.getElementById('bingo-msg').style.display = 'none';
            document.getElementById('wrong-msg').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            document.getElementById('action-buttons').style.display = 'flex';
            document.getElementById('answer-area').style.display = 'block';
            document.getElementById('user-answer').value = '';
            document.getElementById('user-answer').disabled = false;

            const currentQuestions = questionBank[currentCategory];
            const q = currentQuestions[currentQuestionIndex];

            document.getElementById('question-number').innerText = `第 ${currentQuestionIndex + 1} / ${currentQuestions.length} 題`;
            document.getElementById('current-score').innerText = `目前分數: ${score}`;
            document.getElementById('emoji-box').innerText = q.emoji;
            document.getElementById('hint-box').innerText = `提示：${q.hint}`;
            
            document.getElementById('user-answer').focus();
        }

        // 顯示提示
        function showHint() {
            hintUsed = true;
            document.getElementById('hint-box').style.display = 'block';
        }

        // 跳過題目
        function skipQuestion() {
            const currentQuestions = questionBank[currentCategory];
            const q = currentQuestions[currentQuestionIndex];
            
            history.push({
                qNum: currentQuestionIndex + 1,
                emoji: q.emoji,
                status: '跳過 ⏩️',
                points: 0,
                ans: q.answers[0]
            });

            handleQuestionEnd(null); // 直接進入下一題按鈕狀態
        }

        // 檢查答案
        function checkAnswer() {
            const inputAns = document.getElementById('user-answer').value.trim();
            if(!inputAns) return;

            const currentQuestions = questionBank[currentCategory];
            const q = currentQuestions[currentQuestionIndex];
            
            // 檢查是否答案相符 (不分大小寫，去除頭尾空格)
            const isCorrect = q.answers.some(ans => ans.toLowerCase() === inputAns.toLowerCase());

            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('answer-area').style.display = 'none';

            let pointsEarned = 0;
            let statusText = '';

            if (isCorrect) {
                pointsEarned = hintUsed ? 8 : 10;
                score += pointsEarned;
                statusText = hintUsed ? '答對 (有提示) 💡' : '完美答對 ✨';
                document.getElementById('bingo-msg').style.display = 'block';
            } else {
                pointsEarned = 0;
                statusText = '答錯 ❌';
                document.getElementById('wrong-msg').style.display = 'block';
            }

            history.push({
                qNum: currentQuestionIndex + 1,
                emoji: q.emoji,
                status: statusText,
                points: pointsEarned,
                ans: q.answers[0]
            });

            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('next-btn').focus();
        }

        // 跳過或回答後隱藏介面的輔助函式
        function handleQuestionEnd(type) {
            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('answer-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('next-btn').focus();
        }

        // 下一題按鈕點擊
        function nextQuestion() {
            const currentQuestions = questionBank[currentCategory];
            currentQuestionIndex++;

            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // 顯示結算頁面
        function showResults() {
            switchPage('result-page');
            document.getElementById('final-score').innerText = score;

            const container = document.getElementById('summary-container');
            container.innerHTML = '';

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'summary-item';
                div.innerHTML = `
                    <span>第 ${item.qNum} 題 ${item.emoji} (${item.ans})</span>
                    <span>${item.status} (+${item.points}分)</span>
                `;
                container.appendChild(div);
            });
        }

        // 回首頁
        function goHome() {
            switchPage('home-page');
        }

        // 切換顯示頁面的工具函式
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
