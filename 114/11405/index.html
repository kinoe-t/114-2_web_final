<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛子 ─ 地雷系戀愛攻略</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Maru+Gothic:wght@300;400;500&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0810;
    --surface: #140f1a;
    --surface2: #1c1525;
    --border: #3a2545;
    --accent: #e06fa0;
    --accent2: #b84c82;
    --accent3: #f7a8c4;
    --text: #f0e8f5;
    --text2: #c4aad4;
    --text3: #8a6a9a;
    --danger: #ff4f7b;
    --safe: #7ec8a0;
    --warn: #f0c060;
    --ribbon: #c45080;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ─── noise overlay ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  /* ─── petals ─── */
  .petal { position: fixed; pointer-events: none; z-index: 1; font-size: 1rem; animation: fall linear infinite; opacity: 0.18; }
  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.18; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* ─── layout ─── */
  #app {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative; z-index: 2;
  }

  /* ─── header ─── */
  .game-header {
    text-align: center;
    padding: 40px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .game-header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: var(--accent3);
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(224,111,160,0.5);
  }
  .game-header .subtitle {
    font-size: 0.78rem;
    color: var(--text3);
    letter-spacing: 0.3em;
    margin-top: 6px;
  }

  /* ─── status bar ─── */
  #status-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 18px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.78rem;
    color: var(--text2);
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-label { color: var(--text3); }
  .stat-val { color: var(--accent3); font-weight: 600; }
  .stat-hearts { color: var(--accent); }
  .meter-wrap { flex: 1; min-width: 120px; }
  .meter-label { font-size: 0.72rem; color: var(--text3); margin-bottom: 3px; }
  .meter-bar {
    height: 5px; background: var(--surface2);
    border-radius: 3px; overflow: hidden;
  }
  .meter-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.6s ease;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .meter-fill.danger { background: linear-gradient(90deg, #c0304a, var(--danger)); }
  .meter-fill.warn   { background: linear-gradient(90deg, #c08020, var(--warn)); }

  /* ─── scene card ─── */
  .scene-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 26px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .scene-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .scene-day {
    font-size: 0.72rem; letter-spacing: 0.25em;
    color: var(--text3); margin-bottom: 10px;
  }
  .scene-location {
    display: inline-block;
    font-size: 0.7rem; color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 20px; padding: 2px 10px;
    margin-bottom: 14px; letter-spacing: 0.1em;
  }
  .scene-text {
    font-size: 0.95rem; line-height: 1.95;
    color: var(--text); white-space: pre-wrap;
  }
  .scene-text .aiko { color: var(--accent3); font-weight: 500; }
  .scene-text .player { color: #a0d8b0; font-weight: 500; }
  .scene-text .narr { color: var(--text2); font-style: italic; }
  .scene-text .msg {
    display: block;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px; margin: 10px 0;
    border-radius: 0 6px 6px 0;
    font-size: 0.88rem; color: var(--text2);
  }
  .scene-text .msg.system {
    border-left-color: var(--text3); color: var(--text3); font-size: 0.8rem;
  }
  .aiko-portrait {
    float: right; margin: 0 0 12px 18px;
    width: 90px; height: 90px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    box-shadow: 0 0 20px rgba(224,111,160,0.3);
    flex-shrink: 0;
  }
  .mood-label {
    clear: both;
    display: inline-block;
    font-size: 0.68rem;
    padding: 2px 8px; border-radius: 10px;
    margin-bottom: 14px;
    letter-spacing: 0.1em;
  }
  .mood-sweet  { background: rgba(247,168,196,0.15); color: var(--accent3); border: 1px solid rgba(247,168,196,0.3); }
  .mood-dark   { background: rgba(255,79,123,0.1);  color: var(--danger);  border: 1px solid rgba(255,79,123,0.25); }
  .mood-normal { background: rgba(138,106,154,0.15); color: var(--text2);  border: 1px solid var(--border); }
  .mood-obsess { background: rgba(192,48,74,0.15);  color: #ff8080;        border: 1px solid rgba(192,48,74,0.4); }

  /* ─── choices ─── */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .choice-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 18px;
    color: var(--text);
    font-family: inherit; font-size: 0.9rem;
    text-align: left; cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .choice-btn::after {
    content: '›';
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); font-size: 1.1rem;
    transition: all 0.2s;
  }
  .choice-btn:hover {
    border-color: var(--accent);
    background: rgba(224,111,160,0.08);
    color: var(--accent3);
    transform: translateX(3px);
  }
  .choice-btn:hover::after { color: var(--accent); right: 10px; }
  .choice-btn.risky  { border-color: rgba(255,79,123,0.4); }
  .choice-btn.risky:hover { border-color: var(--danger); background: rgba(255,79,123,0.08); color: #ff8080; }
  .choice-btn.safe   { border-color: rgba(126,200,160,0.3); }
  .choice-btn.safe:hover  { border-color: var(--safe); background: rgba(126,200,160,0.08); color: var(--safe); }

  /* ─── ending card ─── */
  .ending-card {
    text-align: center;
    padding: 40px 28px;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-top: 20px;
  }
  .ending-card.good { border-color: rgba(126,200,160,0.5); background: rgba(126,200,160,0.05); }
  .ending-card.bad  { border-color: rgba(255,79,123,0.5);  background: rgba(255,79,123,0.05); }
  .ending-card.true-end { border-color: rgba(247,168,196,0.6); background: rgba(224,111,160,0.06); }
  .ending-card h2 { font-family: 'Shippori Mincho', serif; font-size: 1.6rem; margin-bottom: 12px; }
  .ending-card.good h2 { color: var(--safe); }
  .ending-card.bad  h2 { color: var(--danger); }
  .ending-card.true-end h2 { color: var(--accent3); }
  .ending-label {
    font-size: 0.7rem; letter-spacing: 0.3em;
    color: var(--text3); margin-bottom: 20px;
  }
  .ending-text { font-size: 0.92rem; line-height: 1.9; color: var(--text2); margin-bottom: 24px; }
  .restart-btn {
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent3); font-family: inherit;
    font-size: 0.88rem; padding: 10px 28px;
    border-radius: 20px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.1em;
  }
  .restart-btn:hover { background: rgba(224,111,160,0.1); }

  /* ─── setup screen ─── */
  #setup-screen {
    max-width: 420px; margin: 60px auto;
    text-align: center;
  }
  #setup-screen h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.5rem; color: var(--accent3);
    margin-bottom: 8px;
  }
  #setup-screen p { font-size: 0.85rem; color: var(--text3); margin-bottom: 30px; line-height: 1.7; }
  .setup-group { margin-bottom: 22px; text-align: left; }
  .setup-label { font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; letter-spacing: 0.1em; }
  .setup-options { display: flex; gap: 10px; }
  .gender-btn {
    flex: 1; padding: 12px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 0.88rem;
    color: var(--text2); transition: all 0.2s;
  }
  .gender-btn.active { border-color: var(--accent); color: var(--accent3); background: rgba(224,111,160,0.1); }
  .name-input {
    width: 100%; padding: 11px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: 0.92rem;
    outline: none; transition: border 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }
  .start-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 10px;
    color: #fff; font-family: inherit;
    font-size: 1rem; font-weight: 600;
    cursor: pointer; letter-spacing: 0.15em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(224,111,160,0.3);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(224,111,160,0.45); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── title screen ─── */
  #title-screen { text-align: center; padding: 60px 20px; }
  #title-screen .big-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: var(--accent3);
    text-shadow: 0 0 50px rgba(224,111,160,0.6);
    margin-bottom: 10px; line-height: 1.2;
  }
  #title-screen .jp-sub {
    font-size: 0.9rem; color: var(--text3);
    letter-spacing: 0.3em; margin-bottom: 50px;
  }
  .title-deco { font-size: 2rem; margin-bottom: 30px; opacity: 0.6; }
  .begin-btn {
    padding: 14px 50px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 30px; color: var(--accent3);
    font-family: 'Shippori Mincho', serif;
    font-size: 1.05rem; cursor: pointer;
    letter-spacing: 0.25em; transition: all 0.3s;
  }
  .begin-btn:hover {
    background: rgba(224,111,160,0.12);
    box-shadow: 0 0 30px rgba(224,111,160,0.3);
  }

  /* ─── phone notification ─── */
  .notif {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 14px 0;
    display: flex; align-items: flex-start; gap: 12px;
    font-size: 0.85rem;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(-10px); } to { opacity:1; transform: none; } }
  .notif-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
  .notif-app  { font-size: 0.68rem; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 4px; }
  .notif-body { color: var(--text2); line-height: 1.6; }
  .notif.line  { border-left: 3px solid #00b900; }
  .notif.sns   { border-left: 3px solid #e1306c; }
  .notif.sms   { border-left: 3px solid var(--accent2); }
  .notif.sys   { border-left: 3px solid var(--text3); }

  /* ─── affection display ─── */
  .aff-change {
    display: inline-block;
    font-size: 0.75rem; padding: 2px 8px;
    border-radius: 10px; margin-left: 8px;
    font-weight: 600;
  }
  .aff-up   { background: rgba(224,111,160,0.2); color: var(--accent3); }
  .aff-down { background: rgba(255,79,123,0.15); color: var(--danger); }

  .chapter-banner {
    text-align: center; padding: 16px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 24px 0;
  }
  .chapter-banner span {
    font-size: 0.72rem; letter-spacing: 0.4em; color: var(--text3);
  }
  .chapter-banner h3 {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.25rem; color: var(--accent3); margin-top: 4px;
  }

  @media (max-width: 480px) {
    .scene-card { padding: 18px 16px; }
    .aiko-portrait { width: 70px; height: 70px; font-size: 1.9rem; }
  }

  .fade-in { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<!-- floating petals -->
<div id="petals"></div>

<div id="app">
  <div class="game-header">
    <h1>🎀 愛子 ─ 束縛系戀愛譚</h1>
    <div class="subtitle">AIKO ─ YANDERE LOVE CHRONICLE</div>
  </div>

  <div id="status-bar" style="display:none">
    <div class="stat"><span class="stat-label">Day</span><span class="stat-val" id="s-day">1</span></div>
    <div class="stat"><span class="stat-label">好感度</span><span class="stat-hearts" id="s-hearts">♡♡♡♡♡</span></div>
    <div class="meter-wrap">
      <div class="meter-label">執著度 <span id="s-obs-val">0</span>%</div>
      <div class="meter-bar"><div class="meter-fill" id="s-obs" style="width:0%"></div></div>
    </div>
    <div class="meter-wrap">
      <div class="meter-label">警戒值 <span id="s-wary-val">0</span>%</div>
      <div class="meter-bar"><div class="meter-fill warn" id="s-wary" style="width:0%"></div></div>
    </div>
  </div>

  <div id="main-content" class="fade-in"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   GAME ENGINE
═══════════════════════════════════════════════ */
const state = {
  screen: 'title',
  playerName: '',
  playerGender: '',
  suffix: '',
  day: 1,
  affection: 20,    // 0-100
  obsession: 10,    // 0-100 (愛子執著度)
  wariness: 0,      // 0-100 (主控警戒度)
  flags: {},        // story flags
  chapter: 1,
  ending: null,
};

// ─── Helpers ───
const $ = id => document.getElementById(id);
const content = () => $('main-content');
const P = () => state.playerName;
const A = name => `<span class="aiko">${name}</span>`;
const PL = name => `<span class="player">${name}</span>`;
const N = txt => `<span class="narr">${txt}</span>`;
const MSG = (txt, type='') => `<span class="msg ${type}">${txt}</span>`;

function hearts(n) {
  const full = Math.floor(n / 20);
  const arr = Array(5).fill('♡').map((h,i) => i < full ? '♥' : '♡');
  return arr.join('');
}

function updateStatus() {
  if (state.screen === 'game') {
    $('status-bar').style.display = 'flex';
    $('s-day').textContent = state.day;
    $('s-hearts').textContent = hearts(state.affection);
    const obsEl = $('s-obs');
    obsEl.style.width = state.obsession + '%';
    obsEl.className = 'meter-fill' + (state.obsession > 70 ? ' danger' : '');
    $('s-obs-val').textContent = state.obsession;
    const waryEl = $('s-wary');
    waryEl.style.width = state.wariness + '%';
    $('s-wary-val').textContent = state.wariness;
  }
}

function clamp(v, min=0, max=100) { return Math.max(min, Math.min(max, v)); }

function delta(aff=0, obs=0, war=0) {
  state.affection  = clamp(state.affection + aff);
  state.obsession  = clamp(state.obsession + obs);
  state.wariness   = clamp(state.wariness  + war);
  updateStatus();
}

function render(html) {
  content().innerHTML = html;
  content().classList.remove('fade-in');
  void content().offsetWidth;
  content().classList.add('fade-in');
  updateStatus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function scene(opts) {
  // opts: { day, loc, mood, portrait, text, choices, notifs }
  const moodMap = {
    sweet: ['mood-sweet', '甜甜的♡'],
    dark:  ['mood-dark',  '陰暗模式'],
    normal:['mood-normal','普通'],
    obsess:['mood-obsess','危險信號⚠'],
  };
  const [moodCls, moodTxt] = moodMap[opts.mood] || moodMap.normal;
  const dayStr = opts.day ? `DAY ${opts.day}` : '';
  const locStr = opts.loc ? `<div class="scene-location">📍 ${opts.loc}</div>` : '';
  const portraitStr = opts.portrait !== false
    ? `<div class="aiko-portrait">${opts.portrait || '🎀'}</div>` : '';

  const notifStr = (opts.notifs || []).map(n => `
    <div class="notif ${n.type}">
      <div class="notif-icon">${n.icon}</div>
      <div>
        <div class="notif-app">${n.app}</div>
        <div class="notif-body">${n.text}</div>
      </div>
    </div>`).join('');

  const choicesStr = opts.choices.map(c => `
    <button class="choice-btn ${c.cls||''}" onclick="choose(${JSON.stringify(c.next).replace(/"/g,'&quot;')},${c.aff||0},${c.obs||0},${c.war||0},${JSON.stringify(c.flag||null).replace(/"/g,'&quot;')})">
      ${c.text}
    </button>`).join('');

  render(`
    <div class="scene-card">
      ${portraitStr}
      <div class="scene-day">${dayStr}</div>
      ${locStr}
      <div class="mood-label ${moodCls}">${moodTxt}</div>
      <div class="scene-text">${opts.text}</div>
      ${notifStr}
    </div>
    <div class="choices">${choicesStr}</div>
  `);
}

function chapterBanner(num, title) {
  return `<div class="chapter-banner"><span>CHAPTER ${num}</span><h3>${title}</h3></div>`;
}

function choose(next, aff, obs, war, flag) {
  delta(aff, obs, war);
  if (flag) state.flags[flag] = true;
  if (typeof next === 'string') {
    SCENES[next]();
  } else if (typeof next === 'function') {
    next();
  }
}

function notif(type, icon, app, text) {
  return { type, icon, app, text };
}

// ─── Petals ───
function makePetals() {
  const container = $('petals');
  const symbols = ['🌸','✿','❀','✾','♡'];
  for (let i = 0; i < 14; i++) {
    const d = document.createElement('div');
    d.className = 'petal';
    d.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    d.style.left = Math.random()*100 + 'vw';
    d.style.animationDuration = (8 + Math.random()*12) + 's';
    d.style.animationDelay = (Math.random()*12) + 's';
    d.style.fontSize = (0.6 + Math.random()*0.8) + 'rem';
    container.appendChild(d);
  }
}

/* ═══════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════ */
function showTitle() {
  state.screen = 'title';
  $('status-bar').style.display = 'none';
  render(`
    <div id="title-screen">
      <div class="title-deco">🎀 ✿ 🎀</div>
      <div class="big-title">愛 子</div>
      <div class="jp-sub">YANDERE LOVE CHRONICLE</div>
      <p style="color:var(--text3);font-size:0.82rem;line-height:1.8;margin-bottom:40px;max-width:320px;margin-left:auto;margin-right:auto;">
        表面甜美，內心暗黑。<br>
        她用微笑包裹著執著，<br>
        用愛意編織成囚籠。<br>
        ──你還敢走進去嗎？
      </p>
      <button class="begin-btn" onclick="showSetup()">✦ 開始遊戲 ✦</button>
    </div>
  `);
}

function showSetup() {
  state.screen = 'setup';
  render(`
    <div id="setup-screen">
      <h2>🎀 遊戲設定</h2>
      <p>在故事開始之前，先告訴她一些關於你的事。</p>

      <div class="setup-group">
        <div class="setup-label">你的性別</div>
        <div class="setup-options">
          <button class="gender-btn" id="btn-male" onclick="setGender('male')">♂ 男生</button>
          <button class="gender-btn" id="btn-female" onclick="setGender('female')">♀ 女生</button>
        </div>
      </div>

      <div class="setup-group">
        <div class="setup-label">你的名字（姓氏或全名皆可）</div>
        <input class="name-input" id="name-input" type="text" placeholder="輸入你的名字..." maxlength="10"
          oninput="checkSetup()" />
      </div>

      <button class="start-btn" id="start-btn" disabled onclick="startGame()">
        ✦ 進入故事 ✦
      </button>
    </div>
  `);
}

function setGender(g) {
  state.playerGender = g;
  state.suffix = g === 'male' ? 'くん' : 'ちゃん';
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  $(`btn-${g}`).classList.add('active');
  checkSetup();
}

function checkSetup() {
  const name = $('name-input') ? $('name-input').value.trim() : '';
  const ok = name.length > 0 && state.playerGender !== '';
  if ($('start-btn')) $('start-btn').disabled = !ok;
}

function startGame() {
  state.playerName = $('name-input').value.trim();
  state.screen = 'game';
  state.day = 1;
  state.affection = 20;
  state.obsession = 10;
  state.wariness = 0;
  state.flags = {};
  state.chapter = 1;
  SCENES.intro();
}

function ending(type, title, text, note) {
  render(`
    <div class="ending-card ${type}">
      <div class="ending-label">── ENDING ──</div>
      <h2>${title}</h2>
      <div class="ending-text">${text.split('\n').join('<br>')}</div>
      ${note ? `<p style="font-size:0.78rem;color:var(--text3);margin-bottom:20px;font-style:italic;">${note}</p>` : ''}
      <button class="restart-btn" onclick="showTitle()">✦ 重新開始 ✦</button>
    </div>
  `);
  $('status-bar').style.display = 'none';
}
