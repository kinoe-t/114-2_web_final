<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏箭頭挑戰賽 - 天賦特效版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #121214;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 遊戲大包裝（包含左右跳舞角色） */
        #main-stage {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }

        /* 角色圖片容器 */
        .character-box {
            width: 180px;
            height: 280px;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
        }

        /* 角色跳躍動畫效果 */
        @keyframes danceLeft {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-30px) rotate(-5deg); opacity: 1; box-shadow: 0 20px 30px rgba(233, 69, 96, 0.6); }
        }
        @keyframes danceRight {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-30px) rotate(5deg); opacity: 1; box-shadow: 0 20px 30px rgba(0, 255, 204, 0.6); }
        }

        .dance-l { animation: danceLeft 0.5s ease; border-color: #e94560; }
        .dance-r { animation: danceRight 0.5s ease; border-color: #00ffcc; }

        /* 遊戲主容器（預設暗色背景） */
        #game-container {
            position: relative;
            width: 400px;
            height: 650px;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* 特效一：回血瞬間的彩色閃爍效果 */
        @keyframes healFlash {
            0% { background: linear-gradient(180deg, #16213e 0%, #0f3460 100%); }
            50% { background: linear-gradient(135deg, #10b981 0%, #059669 50%, #06b6d4 100%); }
            100% { background: linear-gradient(180deg, #16213e 0%, #0f3460 100%); }
        }
        .heal-effect {
            animation: healFlash 0.6s ease-in-out;
        }

        /* 特效二：持續強化判定時的彩色霓虹背景 */
        .buff-rainbow-bg {
            background: linear-gradient(125deg, #ec4899, #8b5cf6, #3b82f6, #10b981) !important;
            background-size: 400% 400% !important;
            animation: rainbowShift 3s ease infinite !important;
        }
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 計分板與資訊 */
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
        }

        .info-text {
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #talent-buff-status {
            position: absolute;
            top: 50px;
            left: 15px;
            font-size: 1rem;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
            z-index: 10;
        }

        /* 血量條外框 */
        .hp-bar-container {
            width: 120px;
            height: 14px;
            background: #222;
            border-radius: 7px;
            border: 1px solid #555;
            overflow: hidden;
            margin-top: 5px;
        }
        #hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            transition: width 0.1s ease;
        }

        /* 準確度評語與 Combo */
        #combo-rating {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }
        #combo-count {
            font-size: 1.5rem;
            color: #ffd700;
            display: block;
        }

        /* 軌道與判定區 */
        .tracks {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: space-around;
        }
        .track {
            width: 25%;
            height: 100%;
            border-right: 1px dashed rgba(255, 255, 255, 0.08);
            position: relative;
        }
        .track:last-child { border-right: none; }

        /* 底部判定框 */
        .judgment-zone {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            pointer-events: none;
        }
        .target-node {
            width: 65px;
            height: 65px;
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.4);
            background-color: rgba(0, 0, 0, 0.4);
            transition: all 0.05s;
        }
        /* 被強化判定時的發光效果 */
        .target-node.buffed {
            border-color: #ffd700;
            box-shadow: 0 0 15px #ffd700;
            color: #ffd700;
        }
        .target-node.active {
            background-color: #e94560;
            color: #fff;
            transform: scale(0.92);
            box-shadow: 0 0 15px #e94560;
        }

        /* 下落物 */
        .note {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            left: 50%;
            transform: translateX(-50%);
            top: -70px;
        }
        .note-left { background-color: #ff4757; }
        .note-down { background-color: #2ed573; }
        .note-up { background-color: #1e90ff; }
        .note-right { background-color: #ffa502; }

        /* 炸彈樣式 */
        .note-bomb {
            background-image: url('istockphoto-842671590-612x612.jpg');
            background-size: cover;
            background-position: center;
            border: 2px solid #ff3333;
            box-shadow: 0 0 12px #ff3333;
        }

        /* 覆蓋層選單（開始與結束） */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 20;
            padding: 30px 20px;
            overflow-y: auto;
        }
        .overlay h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #e94560;
            text-align: center;
        }
        .section-title {
            font-size: 1rem;
            color: #00ffcc;
            margin: 15px 0 8px 0;
            align-self: flex-start;
            font-weight: bold;
        }

        /* 選項按鈕組 */
        .selector-group {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 5px;
        }
        .select-btn {
            flex: 1;
            padding: 10px;
            background: #1f293d;
            border: 2px solid #334155;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .select-btn.active {
            background: #e94560;
            border-color: #ff6b81;
            color: #fff;
            box-shadow: 0 0 10px rgba(233,69,96,0.4);
        }

        /* 角色專屬卡片選單 */
        .char-card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-bottom: 25px;
        }
        .char-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1f293d;
            border: 2px solid #334155;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .char-card.active {
            border-color: #00ffcc;
            background: #162e3d;
            box-shadow: 0 0 10px rgba(0,255,204,0.2);
        }
        .char-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid #fff;
        }
        .char-info {
            flex: 1;
            text-align: left;
        }
        .char-name { font-weight: bold; font-size: 1rem; margin-bottom: 2px;}
        .char-talent { font-size: 0.75rem; color: #a4b0be; line-height: 1.3;}

        .btn-main {
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e94560, #ff6b81);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            margin-top: 10px;
        }
        .btn-main:hover { transform: translateY(-2px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-stage">
        <div class="character-box" id="char-dance-left"></div>

        <div id="game-container">
            
            <div id="ui-layer">
                <div>
                    <div class="info-text">分數: <span id="score-val">0</span></div>
                    <div id="shield-status" class="info-text" style="color: #00ffcc; font-size: 0.9rem; display:none;">免疫次數: 3</div>
                </div>
                <div style="text-align: right;">
                    <div class="info-text">血量: <span id="hp-text">100</span>/100</div>
                    <div class="hp-bar-container"><div id="hp-fill"></div></div>
                </div>
            </div>

            <div id="talent-buff-status"></div>

            <div id="combo-rating">
                <div id="rating-text">PERFECT</div>
                <div id="combo-count">0 Combo</div>
            </div>

            <div class="tracks">
                <div class="track" id="track-0"></div>
                <div class="track" id="track-1"></div>
                <div class="track" id="track-2"></div>
                <div class="track" id="track-3"></div>
            </div>

            <div class="judgment-zone">
                <div class="target-node" id="node-0">←</div>
                <div class="target-node" id="node-1">↓</div>
                <div class="target-node" id="node-2">↑</div>
                <div class="target-node" id="node-3">→</div>
            </div>

            <div id="start-overlay" class="overlay">
                <h1>Rhythm Challenge</h1>
                
                <div class="section-title">1. 選擇遊戲難度</div>
                <div class="selector-group">
                    <button class="select-btn active" id="btn-diff-easy" onclick="setDifficulty('easy')">簡單 (慢速/無炸彈)</button>
                    <button class="select-btn" id="btn-diff-hard" onclick="setDifficulty('hard')">困難 (快速+炸彈)</button>
                </div>

                <div class="section-title">2. 選擇挑戰角色與技能</div>
                <div class="char-card-list">
                    <div class="char-card active" id="card-0" onclick="selectCharacter(0)">
                        <div class="char-thumb" style="background-image: url('image.png');"></div>
                        <div class="char-info">
                            <div class="char-name">帥氣女孩</div>
                            <div class="char-talent">【復甦之風】每隔 20 秒自動恢復 10 點血量。</div>
                        </div>
                    </div>
                    <div class="char-card" id="card-1" onclick="selectCharacter(1)">
                        <div class="char-thumb" style="background-image: url('1bb1ab5b-cc1c-4b1e-92a2-92ab249db4cb.png');"></div>
                        <div class="char-info">
                            <div class="char-name">可愛女孩</div>
                            <div class="char-talent">【心靈專注】每 30 秒觸發 10 秒超強判定（Good 變 Perfect）。</div>
                        </div>
                    </div>
                    <div class="char-card" id="card-2" onclick="selectCharacter(2)">
                        <div class="char-thumb" style="background-image: url('images.jpg');"></div>
                        <div class="char-info">
                            <div class="char-name">神祕行者</div>
                            <div class="char-talent">【排爆專家】開局自帶 3 次免受炸彈傷害的護盾。</div>
                        </div>
                    </div>
                </div>

                <button class="btn-main" onclick="startGame()">開始挑戰</button>
            </div>

            <div id="gameover-overlay" class="overlay hidden" style="justify-content: center;">
                <h1>GAME OVER</h1>
                <p style="font-size: 1.1rem; margin-bottom: 20px;">挑戰結束！</p>
                <p style="margin-bottom: 30px;">最終得分：<br><span id="final-score" style="font-size: 2.5rem; color: #ffd700; font-weight: bold;">0</span></p>
                <button class="btn-main" onclick="backToMenu()">返回主選單</button>
            </div>

        </div>

        <div class="character-box" id="char-dance-right"></div>
    </div>

    <script>
        const GAME_HEIGHT = 650;
        const NOTE_HEIGHT = 65;
        const TARGET_TOP = GAME_HEIGHT - 50 - NOTE_HEIGHT;

        let currentDifficulty = 'easy';
        let noteSpeed = 4;
        let spawnInterval = 1000;
        let bombChance = 0;

        // 已更換最新圖片路徑檔名
        const charImages = ['image.png', '1bb1ab5b-cc1c-4b1e-92a2-92ab249db4cb.png', 'images.jpg'];
        let selectedCharIndex = 0;

        let score = 0;
        let hp = 100;
        let combo = 0;
        let gameActive = false;
        let notes = [];
        
        let gameLoopId;
        let spawnTimer;
        let talentTimer;
        let talentBuffTimer;

        let shieldCount = 0;
        let isJudgmentBuffed = false;

        const keyMap = {
            'ArrowLeft': { index: 0, class: 'note-left', char: '←' },
            'ArrowDown': { index: 1, class: 'note-down', char: '↓' },
            'ArrowUp':   { index: 2, class: 'note-up',   char: '↑' },
            'ArrowRight':{ index: 3, class: 'note-right',char: '→' }
        };
        const indexToKey = ['ArrowLeft', 'ArrowDown', 'ArrowUp', 'ArrowRight'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(pitch, type = 'sine', duration = 0.08) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.getElementById('btn-diff-easy').classList.toggle('active', diff === 'easy');
            document.getElementById('btn-diff-hard').classList.toggle('active', diff === 'hard');
        }

        function selectCharacter(index) {
            selectedCharIndex = index;
            for (let i = 0; i < 3; i++) {
                document.getElementById(`card-${i}`).classList.toggle('active', i === index);
            }
        }

        function startGame() {
            score = 0;
            hp = 100;
            combo = 0;
            notes.forEach(n => n.el.remove());
            notes = [];

            const container = document.getElementById('game-container');
            container.className = ""; // 移除所有附加的特效背景類別

            if (currentDifficulty === 'easy') {
                noteSpeed = 4.5;
                spawnInterval = 900;
                bombChance = 0; 
            } else {
                noteSpeed = 6.5;
                spawnInterval = 650;
                bombChance = 0.25;
            }

            shieldCount = (selectedCharIndex === 2) ? 3 : 0;
            isJudgmentBuffed = false;
            updateShieldUI();

            const imgUrl = `url('${charImages[selectedCharIndex]}')`;
            document.getElementById('char-dance-left').style.backgroundImage = imgUrl;
            document.getElementById('char-dance-right').style.backgroundImage = imgUrl;

            document.getElementById('score-val').innerText = score;
            updateHPBar();
            document.getElementById('talent-buff-status').innerText = "";

            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('gameover-overlay').classList.add('hidden');

            gameActive = true;

            gameLoopId = requestAnimationFrame(updateGame);
            startSpawning();
            initTalentLoop();
        }

        function startSpawning() {
            if (spawnTimer) clearInterval(spawnTimer);
            spawnTimer = setInterval(() => {
                if (!gameActive) return;
                const trackIndex = Math.floor(Math.random() * 4);
                const isBomb = Math.random() < bombChance;
                createNote(trackIndex, isBomb);
            }, spawnInterval);
        }

        function createNote(trackIndex, isBomb) {
            const trackEl = document.getElementById(`track-${trackIndex}`);
            const noteEl = document.createElement('div');
            
            if (isBomb) {
                noteEl.className = 'note note-bomb';
            } else {
                const keyInfo = keyMap[indexToKey[trackIndex]];
                noteEl.className = `note ${keyInfo.class}`;
                noteEl.innerText = keyInfo.char;
            }

            trackEl.appendChild(noteEl);
            notes.push({
                el: noteEl,
                track: trackIndex,
                isBomb: isBomb,
                y: -NOTE_HEIGHT
            });
        }

        function updateGame() {
            if (!gameActive) return;

            for (let i = notes.length - 1; i >= 0; i--) {
                const note = notes[i];
                note.y += noteSpeed;
                note.el.style.top = note.y + 'px';

                if (note.y > GAME_HEIGHT) {
                    note.el.remove();
                    notes.splice(i, 1);
                    
                    if (!note.isBomb) {
                        showRating('MISS', '#ff4757');
                        modifyHP(-8); 
                    }
                }
            }

            gameLoopId = requestAnimationFrame(updateGame);
        }

        function judgeNote(trackIndex) {
            const trackNotes = notes.filter(n => n.track === trackIndex);
            if (trackNotes.length === 0) return;

            const targetNote = trackNotes[0];
            const distance = Math.abs(targetNote.y - TARGET_TOP);

            if (targetNote.isBomb) {
                if (distance < 60) {
                    removeNoteFromList(targetNote);
                    if (shieldCount > 0) {
                        shieldCount--;
                        updateShieldUI();
                        showRating('護盾免疫', '#00ffcc');
                        playSound(300, 'triangle', 0.2);
                    } else {
                        showRating('炸彈爆炸!!', '#ff3333');
                        modifyHP(-25);
                        playSound(100, 'sawtooth', 0.4);
                    }
                }
                return;
            }

            if (distance < 75) {
                removeNoteFromList(targetNote);
                triggerCharacterDance(trackIndex);

                let rating = 'GOOD';
                let scoreAdd = 30;
                let color = '#ffa502';
                let pitch = 400;

                if (distance < 22) {
                    rating = 'PERFECT';
                    scoreAdd = 100;
                    color = '#00ffcc';
                    pitch = 650;
                } else if (distance < 48) {
                    rating = 'GREAT';
                    scoreAdd = 60;
                    color = '#2ed573';
                    pitch = 530;
                }

                if (isJudgmentBuffed && rating === 'GOOD') {
                    rating = 'PERFECT (專注補正)';
                    scoreAdd = 100;
                    color = '#ffd700';
                    pitch = 650;
                }

                if (rating.includes('PERFECT') || rating === 'GREAT') {
                    combo++;
                } else {
                    combo = 0;
                }

                score += scoreAdd;
                document.getElementById('score-val').innerText = score;
                showRating(rating, color);
                playSound(pitch, 'sine');
            }
        }

        function triggerCharacterDance(trackIndex) {
            const leftChar = document.getElementById('char-dance-left');
            const rightChar = document.getElementById('char-dance-right');
            
            leftChar.classList.remove('dance-l');
            rightChar.classList.remove('dance-r');
            
            void leftChar.offsetWidth; 
            void rightChar.offsetWidth;

            if (trackIndex === 0 || trackIndex === 1) {
                leftChar.classList.add('dance-l');
            } else {
                rightChar.classList.add('dance-r');
            }
        }

        // 核心輪詢機制與背景特效控制
        function initTalentLoop() {
            if (talentTimer) clearInterval(talentTimer);
            if (talentBuffTimer) clearTimeout(talentBuffTimer);

            let elapsedSeconds = 0;
            const container = document.getElementById('game-container');

            talentTimer = setInterval(() => {
                if (!gameActive) return;
                elapsedSeconds++;

                // 角色一：每 20 秒回血 + 閃爍彩色能量背景 (不包含"天賦"二字)
                if (selectedCharIndex === 0 && elapsedSeconds % 20 === 0) {
                    modifyHP(10);
                    showStatusMsg("血量 +10", 2000);
                    playSound(440, 'sine', 0.2);
                    
                    // 觸發彩色閃爍特效
                    container.classList.remove('heal-effect');
                    void container.offsetWidth;
                    container.classList.add('heal-effect');
                    setTimeout(() => container.classList.remove('heal-effect'), 600);
                }

                // 角色二：每 30 秒進入持續 10 秒的彩色霓虹背景 (不包含"天賦"二字)
                if (selectedCharIndex === 1 && elapsedSeconds % 30 === 0) {
                    isJudgmentBuffed = true;
                    setNodesBuffStyle(true);
                    showStatusMsg("★ 判定強化中 (10s) ★", 10000);
                    
                    // 開啟彩色霓虹滾動特效
                    container.classList.add('buff-rainbow-bg');
                    
                    talentBuffTimer = setTimeout(() => {
                        isJudgmentBuffed = false;
                        setNodesBuffStyle(false);
                        // 移除彩色背景特效
                        container.classList.remove('buff-rainbow-bg');
                    }, 10000);
                }

            }, 1000);
        }

        function showStatusMsg(msg, duration) {
            const el = document.getElementById('talent-buff-status');
            el.innerText = msg;
            setTimeout(() => {
                if (el.innerText === msg) el.innerText = "";
            }, duration);
        }

        function setNodesBuffStyle(isBuffed) {
            for (let i = 0; i < 4; i++) {
                document.getElementById(`node-${i}`).classList.toggle('buffed', isBuffed);
            }
        }

        function modifyHP(amount) {
            hp += amount;
            if (hp > 100) hp = 100;
            if (hp <= 0) {
                hp = 0;
                endGame();
            }
            updateHPBar();
        }

        function updateHPBar() {
            document.getElementById('hp-text').innerText = hp;
            document.getElementById('hp-fill').style.width = hp + '%';
        }

        function updateShieldUI() {
            const shieldEl = document.getElementById('shield-status');
            if (selectedCharIndex === 2 && gameActive) {
                shieldEl.style.display = 'block';
                shieldEl.innerText = `免疫次數: ${shieldCount}`;
            } else {
                shieldEl.style.display = 'none';
            }
        }

        function removeNoteFromList(noteInstance) {
            noteInstance.el.remove();
            const index = notes.indexOf(noteInstance);
            if (index > -1) notes.splice(index, 1);
        }

        let ratingTimeout;
        function showRating(text, color) {
            const ratingEl = document.getElementById('combo-rating');
            const ratingTextEl = document.getElementById('rating-text');
            const comboCountEl = document.getElementById('combo-count');

            ratingTextEl.innerText = text;
            ratingTextEl.style.color = color;
            
            if (combo > 0) {
                comboCountEl.innerText = `${combo} Combo`;
                comboCountEl.style.display = 'block';
            } else {
                comboCountEl.style.display = 'none';
            }

            ratingEl.style.opacity = '1';
            ratingEl.style.transform = 'translate(-50%, -50%) scale(1.1)';
            
            clearTimeout(ratingTimeout);
            ratingTimeout = setTimeout(() => {
                ratingEl.style.opacity = '0';
            }, 300);
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnTimer);
            clearInterval(talentTimer);
            clearTimeout(talentBuffTimer);
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('gameover-overlay').classList.remove('hidden');
            playSound(150, 'sawtooth', 0.6);
        }

        function backToMenu() {
            document.getElementById('gameover-overlay').classList.add('hidden');
            document.getElementById('start-overlay').classList.remove('hidden');
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const keyInfo = keyMap[e.key];
            if (keyInfo) {
                e.preventDefault();
                document.getElementById(`node-${keyInfo.index}`).classList.add('active');
                judgeNote(keyInfo.index);
            }
        });

        window.addEventListener('keyup', (e) => {
            const keyInfo = keyMap[e.key];
            if (keyInfo) {
                document.getElementById(`node-${keyInfo.index}`).classList.remove('active');
            }
        });
    </script>
</body>
</html>
