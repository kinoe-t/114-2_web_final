<!DOCTYPE html>
<html lang="zh-Tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘占星術：星座頻率</title>
    <style>
        * {
            box-sizing: border-box; 
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #0b0f19; /* 神秘宇宙深藍黑 */
            color: #f1f5f9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: linear-gradient(145deg, #1e1b4b, #111827); /* 魔幻紫色漸層底框 */
            border: 2px solid #4338ca;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 35px;
            text-align: center;
        }

        h1 {
            color: #a78bfa; /* 浪漫紫羅蘭色 */
            font-size: 28px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .progress-bar {
            color: #a78bfa;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: rgba(99, 102, 241, 0.1);
            color: #f1f5f9;
            border: 1px solid #4338ca;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #4338ca;
            transform: translateX(5px);
        }

        .feedback-text {
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .result-desc {
            font-size: 16px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .meme-img {
            display: block;
            width: 100%;
            max-width: 350px;
            height: auto;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .restart-btn {
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 35px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .restart-btn:hover { background-color: #4f46e5; }

        .yes-btn { background-color: #10b981; color: white; border: none; border-radius: 8px; padding: 12px 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .yes-btn:hover { background-color: #059669; }
        
        .no-btn { background-color: #f43f5e; color: white; border: none; border-radius: 8px; padding: 12px 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .no-btn:hover { background-color: #e11d48; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🔮 神秘占星術：靈魂頻率測驗</h1>
        
        <!-- 1. 測驗進行中的區塊 -->
        <div id="quiz-section">
            <div class="progress-bar" id="progress">題目載入中...</div>
            <div class="question-text" id="question">正在連結星象核心...</div>
            <div class="options-container" id="options"></div>
        </div>

        <!-- 2. 測驗結果區塊 -->
        <div id="result-section" class="hidden">
            <p class="feedback-text" style="color: #a78bfa;">✨ 占星核心共振完畢 ✨</p>
            <p style="font-size: 18px; margin-bottom: 5px;">窺探你的靈魂本質，你絕對是：</p>
            <h2 id="zodiac-name" style="font-size: 36px; color: #fbbf24; margin: 10px 0; letter-spacing: 2px;">星座計算中...</h2>
            <p class="result-desc" id="zodiac-desc">特質分析中...</p>
            
            <hr style="border: 0; border-top: 1px solid #4338ca; margin: 25px 0;">
            <p style="font-size: 18px; font-weight: bold; color: #cbd5e1;">請問占星術大師猜得準嗎？</p>
            <div class="btn-group">
                <button class="yes-btn" onclick="handleFeedback(true)">沒錯！太準了 🔮</button>
                <button class="no-btn" onclick="handleFeedback(false)">不太對，猜錯了 ❌</button>
            </div>
        </div>

        <!-- 3. 最終梗圖回饋區塊 -->
        <div id="feedback-section" class="hidden">
            <h2 id="feedback-title" style="font-size: 32px; margin-bottom: 10px;"></h2>
            <p id="feedback-comment" style="font-size: 18px; color: #cbd5e1; margin-bottom: 20px;"></p>
            
            <!-- 修正後的動態梗圖圖片 -->
            <img id="meme-image" class="meme-img" src="" alt="梗圖載入中...">
            
            <div style="margin-top: 25px;">
                <button class="restart-btn" onclick="restartQuiz()">重新測驗</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "1. 當你面對一個全新的挑戰或未知冒險時，你的第一反應是？",
                options: [
                    { text: "熱血沸騰，先衝再說！毫無畏懼！", zodiacs: ["Aries", "Leo", "Sagittarius"] },
                    { text: "冷靜觀察，默默收集資料規劃完美路線", zodiacs: ["Virgo", "Capricorn", "Scorpio"] },
                    { text: "找朋友討論，聽聽大家的想法再決定", zodiacs: ["Libra", "Gemini", "Aquarius"] },
                    { text: "憑直覺感受，覺得不對勁就先觀望", zodiacs: ["Cancer", "Pisces", "Taurus"] }
                ]
            },
            {
                text: "2. 朋友臨時取消晚上的聚會，你內心的真實想法是？",
                options: [
                    { text: "太棒了！終於可以合法宅在家放空了！", zodiacs: ["Taurus", "Cancer", "Capricorn"] },
                    { text: "有點小失落，那我找別人出去玩好了！", zodiacs: ["Gemini", "Leo", "Sagittarius"] },
                    { text: "沒關係，剛好可以利用時間做自己的計畫", zodiacs: ["Virgo", "Aquarius", "Aries"] },
                    { text: "會想很多，是不是自己講錯話被討厭了？", zodiacs: ["Pisces", "Scorpio", "Libra"] }
                ]
            },
            {
                text: "3. 挑選隨身物品（如手機殼、衣服）時，你最看重什麼？",
                options: [
                    { text: "實用性高、耐用且高質感、性價比好", zodiacs: ["Taurus", "Virgo", "Capricorn"] },
                    { text: "設計獨特、外觀一定要耀眼、有大牌感", zodiacs: ["Leo", "Aries", "Scorpio"] },
                    { text: "款式新穎，要嘛搞怪、要嘛走在流行尖端", zodiacs: ["Gemini", "Aquarius", "Sagittarius"] },
                    { text: "看感覺，最好帶有某種故事或溫暖的氛圍", zodiacs: ["Cancer", "Libra", "Pisces"] }
                ]
            },
            {
                text: "4. 你最不能忍受哪一種人的相處模式？",
                options: [
                    { text: "講話拐彎幕角、虛偽不真誠的人", zodiacs: ["Aries", "Leo", "Sagittarius"] },
                    { text: "毫無邏輯、講不聽又沒計畫的人", zodiacs: ["Virgo", "Capricorn", "Gemini"] },
                    { text: "控制狂，連芝麻綠豆小事都要管的人", zodiacs: ["Aquarius", "Libra", "Scorpio"] },
                    { text: "自私自利、完全不顧及別人感受的人", zodiacs: ["Cancer", "Pisces", "Taurus"] }
                ]
            },
            {
                text: "5. 面對工作或學業上的壓力，你通常怎麼宣洩？",
                options: [
                    { text: "瘋狂大吃美食、爆買東西犒賞自己", zodiacs: ["Taurus", "Cancer", "Libra"] },
                    { text: "去唱KTV、運動暴汗、找人痛快大哭一場", zodiacs: ["Aries", "Pisces", "Leo"] },
                    { text: "瘋狂追劇、打遊戲，讓腦袋徹底與世隔絕", zodiacs: ["Gemini", "Sagittarius", "Aquarius"] },
                    { text: "把壓力轉換成動力，逼自己做到完美為止", zodiacs: ["Virgo", "Scorpio", "Capricorn"] }
                ]
            },
            {
                text: "6. 在團體中，你通常不知不覺中扮演什麼角色？",
                options: [
                    { text: "帶頭衝鋒、給出肯定方向的決策者", zodiacs: ["Aries", "Leo", "Capricorn"] },
                    { text: "傾聽大家心聲、居中調解的和事佬", zodiacs: ["Libra", "Cancer", "Pisces"] },
                    { text: "提供瘋狂鬼點子、活絡氣氛的開心果", zodiacs: ["Gemini", "Sagittarius", "Aquarius"] },
                    { text: "默默做事、注重細節的把關者", zodiacs: ["Taurus", "Virgo", "Scorpio"] }
                ]
            },
            {
                text: "7. 關於愛情，你內心深處最渴望的是？",
                options: [
                    { text: "轟轟烈烈、充滿激情與崇拜的愛", zodiacs: ["Aries", "Leo", "Scorpio"] },
                    { text: "相知相惜、像朋友一樣靈魂契合且自由", zodiacs: ["Gemini", "Sagittarius", "Aquarius"] },
                    { text: "相濡以沫、細水長流的日常陪伴與安全感", zodiacs: ["Taurus", "Cancer", "Libra"] },
                    { text: "絕對的忠誠、互相扶持走向未來的踏實感", zodiacs: ["Virgo", "Capricorn", "Pisces"] }
                ]
            }
        ];

        const zodiacDatabase = {
            Aries: { name: "牡羊座 ♈", desc: "純真熱情、行動力爆表的直球對決大師！" },
            Taurus: { name: "金牛座 ♉", desc: "精打細算、懂得享受極致生活的低調美學家！" },
            Gemini: { name: "雙子座 ♊", desc: "一秒鐘有八百個鬼點子的靈魂社交觀察家！" },
            Cancer: { name: "巨蟹座 ♋", desc: "防備心高卻極度溫柔、充滿母愛光輝的傾聽者！" },
            Leo: { name: "獅子座 ♌", desc: "天生自帶聚光燈、講義氣又愛面子的霸氣王者！" },
            Virgo: { name: "處女座 ♍", desc: "細節控、精神潔癖、將清醒與理性刻入骨髓的智者！" },
            Libra: { name: "天秤座 ♎", desc: "追求和諧、骨子裡優雅卻有選擇障礙的和平使者！" },
            Scorpio: { name: "天蠍座 ♏", desc: "第六感極強、愛恨分明且充滿致命神秘感的強者！" },
            Sagittarius: { name: "射手座 ♐", desc: "靈魂永不被拘束、永遠在追求新奇冒險的自由浪子！" },
            Capricorn: { name: "摩羯座 ♑", desc: "內冷外熱、默默耕耘、意志力驚人的現實主義王者！" },
            Aquarius: { name: "水瓶座 ♒", desc: "思維活在外太空、討厭墨守成規的獨特外星人！" },
            Pisces: { name: "雙魚座 ♓", desc: "浪漫至上、情感豐富、活在夢幻泡泡裡的藝術家！" }
        };

        let currentQuestionIndex = 0;
        let zodiacScores = {
            Aries: 0, Taurus: 0, Gemini: 0, Cancer: 0, Leo: 0, Virgo: 0,
            Libra: 0, Scorpio: 0, Sagittarius: 0, Capricorn: 0, Aquarius: 0, Pisces: 0
        };

        function startQuiz() {
            currentQuestionIndex = 0;
            for (let z in zodiacScores) zodiacScores[z] = 0;
            
            document.getElementById("quiz-section").classList.remove("hidden");
            document.getElementById("result-section").classList.add("hidden");
            document.getElementById("feedback-section").classList.add("hidden");
            showQuestion();
        }

        function showQuestion() {
            const currentQuestion = questions[currentQuestionIndex];
            document.getElementById("progress").innerText = `問題 ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById("question").innerText = currentQuestion.text;
            
            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "";
            
            currentQuestion.options.forEach(option => {
                const button = document.createElement("button");
                button.classList.add("option-btn");
                button.innerText = option.text;
                button.onclick = () => selectOption(option.zodiacs);
                optionsContainer.appendChild(button);
            });
        }

        function selectOption(associatedZodiacs) {
            associatedZodiacs.forEach(z => zodiacScores[z]++);
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-section").classList.add("hidden");
            document.getElementById("result-section").classList.remove("hidden");
            
            let finalZodiac = "Aries";
            let maxScore = -1;
            for (const z in zodiacScores) {
                if (zodiacScores[z] > maxScore) {
                    maxScore = zodiacScores[z];
                    finalZodiac = z;
                }
            }
            
            const resultData = zodiacDatabase[finalZodiac];
            document.getElementById("zodiac-name").innerText = resultData.name;
            document.getElementById("zodiac-desc").innerText = resultData.desc;
        }

        // 🌟 核心修正：改用 GIPHY 官方絕對穩定的開放圖源網址！
        function handleFeedback(isCorrect) {
            document.getElementById("result-section").classList.add("hidden");
            document.getElementById("feedback-section").classList.remove("hidden");
            
            const titleEl = document.getElementById("feedback-title");
            const commentEl = document.getElementById("feedback-comment");
            const imgEl = document.getElementById("meme-image");
            
            if (isCorrect) {
                titleEl.innerText = "🎉 太棒了！！！";
                titleEl.style.color = "#10b981"; 
                commentEl.innerText = "我就知道占星大師是不會出錯的！簡直神準！";
                // GIPHY 官方經典快樂慶祝動態圖
                imgEl.src = "https://media.giphy.com/media/l0AM3MDqA40cRlJXG/giphy.gif"; 
                imgEl.alt = "開心動態梗圖";
            } else {
                titleEl.innerText = "😭 太可惜了，重新再來一次";
                titleEl.style.color = "#f43f5e"; 
                commentEl.innerText = "可惡，宇宙星象竟然失手了！一定是磁場干擾，再測一次試試看！";
                // GIPHY 官方經典無奈哭笑不得/崩潰動態圖
                imgEl.src = "https://media.giphy.com/media/26BGAOkDPOZTXwmHK/giphy.gif";
                imgEl.alt = "哭臉動態梗圖";
            }
        }

        function restartQuiz() {
            startQuiz();
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
