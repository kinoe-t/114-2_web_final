<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 摸彩洗牌機</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --accent-color: #ff6b6b;
            --bg-color: #f5f7fa;
            --ball-color: #ffd32a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* 球體通用樣式 */
        .ball-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            min-height: 60px;
            transition: all 0.5s ease;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, var(--ball-color) 40%, #d4af37 100%);
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            user-select: none;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        /* 摸彩箱舞台 */
        .stage {
            width: 300px;
            height: 300px;
            position: relative;
            margin-bottom: 40px;
            perspective: 800px;
            display: none; /* 初始隱藏，點擊洗牌才出現 */
        }

        /* 透明摸彩箱球體 */
        .lottery-machine {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.6);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 70%, rgba(0, 0, 0, 0.05) 100%);
            box-shadow: inset 0 0 40px rgba(255,255,255,0.6), 0 10px 3px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* 摸彩箱旋轉動畫 */
        @keyframes rotateMachine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1080deg); }
        }

        .lottery-machine.spinning {
            animation: rotateMachine 2.5s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
        }

        /* 內部的複製球（動畫用） */
        .inner-ball {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 0.9rem;
        }

        /* 控制按鈕 */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 30px;
        }

        .btn:hover {
            background-color: #357abd;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* 結果複製區塊 */
        .result-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .input-group {
            display: flex;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #result-input {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-right: none;
            outline: none;
            background: white;
            text-align: center;
            font-weight: 500;
        }

        .copy-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background-color: #e65252;
        }

        /* 噴出球的起點位置動畫 */
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -150%) scale(1.2); opacity: 1; }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }

        .ball.popping {
            animation: popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <h1>上台順序抽籤機</h1>

    <div class="ball-container" id="ball-display">
        </div>

    <div class="stage" id="lottery-stage">
        <div class="lottery-machine" id="machine">
            </div>
    </div>

    <button class="btn" id="shuffle-btn">洗 牌</button>

    <div class="result-section" id="result-box">
        <label style="font-weight: bold; color: #555;">重新排列結果：</label>
        <div class="input-group">
            <input type="text" id="result-input" readonly>
            <button class="copy-btn" id="copy-btn">複製</button>
        </div>
    </div>

    <script>
        const ballDisplay = document.getElementById('ball-display');
        const lotteryStage = document.getElementById('lottery-stage');
        const machine = document.getElementById('machine');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const resultBox = document.getElementById('result-box');
        const resultInput = document.getElementById('result-input');
        const copyBtn = document.getElementById('copy-btn');

        const totalBalls = 18;
        let currentOrder = Array.from({ length: totalBalls }, (_, i) => i + 1);

        // 初始化：渲染 1-18 顆球
        function renderInitialBalls() {
            ballDisplay.innerHTML = '';
            currentOrder.forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.textContent = num;
                ballDisplay.appendChild(ball);
            });
        }

        // 產生隨機顏色（讓球看起來更繽紛，若想維持純金黃色可跳過此函式）
        function getBallColor(num) {
            const hues = [0, 30, 50, 140, 200, 280]; // 各種繽紛顏色
            const hue = hues[num % hues.length];
            return `radial-gradient(circle at 30% 30%, #ffffff 0%, hsl(${hue}, 85%, 60%) 40%, hsl(${hue}, 85%, 40%) 100%)`;
        }

        // 初始化
        renderInitialBalls();
        // 為球著色
        document.querySelectorAll('.ball').forEach((ball, idx) => {
            ball.style.background = getBallColor(idx + 1);
        });

        // 洗牌按鈕事件
        shuffleBtn.addEventListener('click', () => {
            shuffleBtn.disabled = true;
            resultBox.classList.remove('show');

            // 1. 讓原本排好的球縮小消失，假裝「裝進摸彩箱」
            const balls = ballDisplay.querySelectorAll('.ball');
            balls.forEach((ball, i) => {
                setTimeout(() => {
                    ball.style.transform = 'scale(0)';
                    ball.style.opacity = '0';
                }, i * 30); // 依序製造吸入感
            });

            // 2. 顯示摸彩箱並開始搖晃動畫
            setTimeout(() => {
                ballDisplay.style.display = 'none';
                lotteryStage.style.display = 'block';
                machine.classList.add('spinning');

                // 在摸彩箱生成滾動的假球替代品
                machine.innerHTML = '';
                for (let i = 0; i < 25; i++) {
                    const innerBall = document.createElement('div');
                    innerBall.className = 'ball inner-ball';
                    innerBall.style.background = getBallColor(i);
                    innerBall.style.top = Math.random() * 70 + 15 + '%';
                    innerBall.style.left = Math.random() * 70 + 15 + '%';

                    // 隨機在箱內亂滾的動畫
                    innerBall.animate([
                        { transform: 'translate(0, 0)' },
                        { transform: `translate(${(Math.random() - 0.5) * 160}px, ${(Math.random() - 0.5) * 160}px)` },
                        { transform: `translate(${(Math.random() - 0.5) * 160}px, ${(Math.random() - 0.5) * 160}px)` },
                        { transform: 'translate(0, 0)' }
                    ], {
                        duration: 1000 + Math.random() * 1000,
                        iterations: Infinity,
                        direction: 'alternate'
                    });

                    machine.appendChild(innerBall);
                }
            }, totalBalls * 30 + 300);

            // 3. 搖晃完畢，計算洗牌結果並噴出
            setTimeout(() => {
                // Fisher-Yates 洗牌演算法
                for (let i = currentOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentOrder[i], currentOrder[j]] = [currentOrder[j], currentOrder[i]];
                }

                // 隱藏摸彩箱，還原展示區
                machine.classList.remove('spinning');
                lotteryStage.style.display = 'none';
                ballDisplay.style.display = 'flex';
                ballDisplay.innerHTML = '';

                // 依序讓洗牌後的球「噴出來」
                currentOrder.forEach((num, i) => {
                    setTimeout(() => {
                        const ball = document.createElement('div');
                        ball.className = 'ball popping';
                        ball.style.background = getBallColor(num);
                        ball.textContent = num;
                        ballDisplay.appendChild(ball);
                    }, i * 150); // 每隔 0.15 秒跳出一顆球
                });

                // 4. 顯示文字框與結果
                setTimeout(() => {
                    resultInput.value = currentOrder.join(', ');
                    resultBox.classList.add('show');
                    shuffleBtn.disabled = false;
                }, currentOrder.length * 150 + 200);

            }, 3000); // 摸彩箱總共搖晃 3 秒
        });

        // 複製按鈕功能
        copyBtn.addEventListener('click', () => {
            resultInput.select();
            resultInput.setSelectionRange(0, 99999); // 針對行動裝置

            navigator.clipboard.writeText(resultInput.value)
                .then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '已複製！';
                    copyBtn.style.backgroundColor = '#2ecc71';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.style.backgroundColor = 'var(--accent-color)';
                    }, 1500);
                })
                .catch(err => {
                    alert('複製失敗，請手動全選複製。');
                });
        });
    </script>
</body>
</html>
