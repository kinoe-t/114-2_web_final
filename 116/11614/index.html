<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中生占卜屋</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top, #1e40af 0%, transparent 40%),
        linear-gradient(
            180deg,
            #020617 0%,
            #081229 40%,
            #0f172a 100%
        );
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:30px;

    padding:40px;
    text-align:center;

    box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        0 0 40px rgba(59,130,246,0.15);

    color:white;
}

h1{
    color:white;
    margin-bottom:10px;
    font-size:2.2rem;
    letter-spacing:2px;
}

.subtitle{
    color:rgba(255,255,255,0.8);
}

textarea{
    width:100%;
    height:120px;

    background:rgba(255,255,255,0.08);
    color:white;

    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;

    padding:16px;
    font-size:16px;

    backdrop-filter:blur(10px);
    outline:none;

    transition:0.3s;
}

textarea::placeholder{
    color:rgba(255,255,255,0.5);
}

textarea:focus{
    border-color:#60a5fa;
    box-shadow:0 0 20px rgba(96,165,250,0.3);
}

button{
    margin-top:20px;
    padding:14px 36px;

    border:none;
    border-radius:50px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    color:white;
    font-size:18px;
    font-weight:600;

    cursor:pointer;
    transition:0.3s;

    box-shadow:
        0 8px 25px rgba(37,99,235,0.4);
}

button:hover{
    transform:translateY(-3px);
    box-shadow:
        0 12px 35px rgba(37,99,235,0.55);
}

.result{
    margin-top:30px;
    display:none;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);

    border-radius:20px;
    padding:25px;
    margin-top:15px;

    backdrop-filter:blur(15px);
}

.question{
    color:rgba(255,255,255,0.75);
    margin-bottom:15px;
}

.answer{
    color:#93c5fd;
    font-size:24px;
    font-weight:bold;
}

.tip{
    margin-top:20px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔮 高中生占卜屋</h1>
    <p class="subtitle">輸入任何問題，看看命運給你的答案</p>

    <textarea id="question"
        placeholder="例如：我這次段考會考得好嗎？"></textarea>

    <button onclick="tellFortune()" disabled>
    開始占卜
</button>


    <div class="result" id="result">
        <div class="card">
            <div class="question" id="showQuestion"></div>
            <div class="answer" id="answer"></div>
        </div>
    </div>


</div>

<script>
const normalAnswers = [
    "是的，機率相當高。",
    "看起來會很順利。",
    "結果比你想像中更好。",
    "值得嘗試。",
    "大膽前進吧。",
    "成功的可能性很高。",
    "未來充滿希望。",
    "有機會實現。",
    "運勢站在你這邊。",
    "答案偏向肯定。",
    "超好笑。",
    "嗯。",
    "蛤。",
    "你再好好想想。",
    "不行。",
    "會的。",
    "超可憐。",

    "暫時不太樂觀。",
    "可能需要更多努力。",
    "現在不是最佳時機。",
    "結果或許不如預期。",
    "建議再多觀察。",
    "阻礙比想像中多。",
    "這條路可能較辛苦。",
    "答案偏向否定。",
    "近期運勢較弱。",
    "需要重新考慮。"
];

const supportAnswers = [
    "請不要放棄自己，事情有機會慢慢變好。",
    "先照顧好自己，尋求信任的人陪伴與協助會很有幫助。",
    "現在的困難並不代表未來，請給自己更多時間。",
    "你值得被關心與支持。",
    "再艱難的時刻也能找到出口，請繼續撐下去。",
    "你的存在具有價值。",
    "把今天當成新的開始，一步一步面對問題。",
    "你的感受很重要，請向值得信任的人說說看。",
    "未來仍有許多可能性等待著你。",
    "先讓自己休息一下，再尋找能提供幫助的人。"
];

const sensitiveKeywords = [
    "自殺",
    "想死",
    "去死",
    "死亡",
    "輕生",
    "結束生命",
    "不想活",
    "活不下去",
    "自殘",
    "傷害自己",
    "割腕",
    "跳樓",
    "壓力",
    "崩潰",
    "絕望",
    "憂鬱",
    "痛苦"
];



function isSensitive(text){
    text = text.toLowerCase();

    return sensitiveKeywords.some(keyword =>
        text.includes(keyword.toLowerCase())
    );
}

function tellFortune(){

    const question = document
        .getElementById("question")
        .value
        .trim();


    if(question === ""){
    return;
}
   if(question.length === 1){

    let records =
        JSON.parse(sessionStorage.getItem("fortuneRecords") || "{}");

    records[question] = "?";

    sessionStorage.setItem(
        "fortuneRecords",
        JSON.stringify(records)
    );

    showResult(question, "?");
    return;
}

    let records =
        JSON.parse(sessionStorage.getItem("fortuneRecords") || "{}");

    if(records[question]){
        showResult(question, records[question]);
        return;
    }

    let answer;

    if(isSensitive(question)){
        answer =
            supportAnswers[
                Math.floor(Math.random() * supportAnswers.length)
            ];
    }else{
        answer =
            normalAnswers[
                Math.floor(Math.random() * normalAnswers.length)
            ];
    }

    records[question] = answer;

    sessionStorage.setItem(
        "fortuneRecords",
        JSON.stringify(records)
    );

    showResult(question, answer);
}

function showResult(question, answer){
    document.getElementById("showQuestion").innerHTML =
        "你的問題：" + question;

    document.getElementById("answer").innerHTML =
        "✨ " + answer;

    document.getElementById("result").style.display =
        "block";
}
</script>

</body>
</html>
