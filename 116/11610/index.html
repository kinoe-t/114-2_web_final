<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霸屏黑爪！專屬相片絲滑消消樂 🐾</title>
    <style>
        :root {
            --cat-pink: #ffd3e2; 
            --cat-cream: #fff5eb; 
            --cat-brown: #5d4037; 
            --cat-orange: #ffb74d; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            color: var(--cat-brown);
            overflow: hidden;
            position: relative;

            /* 核心保留：強制讓毛茸茸黑色貓爪背景完美填滿整個螢幕 */
            background-image: url('https://images.unsplash.com/photo-1592194996308-7b43878e84a6?q=80&w=1974&auto=format&fit=crop');
            background-size: 100% 100%;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(30, 25, 25, 0.4) 0%, rgba(15, 15, 15, 0.35) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* 遊戲大外框 */
        .game-container {
            background-color: rgba(255, 255, 255, 0.94);
            padding: 35px;
            border-radius: 50px 40px 60px 45px; 
            text-align: center;
            backdrop-filter: blur(12px); 
            z-index: 5;
            position: relative;
            border: 5px solid var(--cat-pink);
            
            box-shadow: 
                0 0 0 4px rgba(255, 211, 226, 0.8),    
                0 0 15px 10px rgba(255, 255, 255, 0.95), 
                0 0 25px 16px rgba(255, 182, 193, 0.6),  
                0 0 40px 28px rgba(255, 240, 245, 0.95),  
                0 0 55px 45px rgba(255, 255, 255, 0.5),  
                0 25px 50px rgba(0, 0, 0, 0.45);       
        }

        /* 裝飾長毛貓耳 */
        .game-container::before {
            content: "";
            position: absolute;
            top: -26px; left: 50px;
            width: 0; height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-bottom: 28px solid var(--cat-pink);
            filter: drop-shadow(0 -5px 6px rgba(255, 182, 193, 0.7));
        }
        .game-container::after {
            content: "";
            position: absolute;
            top: -26px; right: 50px;
            width: 0; height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-bottom: 28px solid var(--cat-pink);
            filter: drop-shadow(0 -5px 6px rgba(255, 182, 193, 0.7));
        }

        h1 {
            margin-top: 5px;
            color: #c2185b;
            font-size: 2.3rem;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.9);
            letter-spacing: 2px;
        }

        .score-board {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: var(--cat-cream);
            color: var(--cat-brown);
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 2px dashed var(--cat-orange);
        }

        #score {
            color: #ff1744;
            font-size: 1.7rem;
        }

        /* 貓咪棋盤 */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 62px);
            grid-template-rows: repeat(8, 62px);
            gap: 6px;
            background-color: #f5ebe0;
            padding: 15px;
            border-radius: 26px;
            margin: 0 auto;
            border: 3px solid #dfcfb7;
            box-shadow: 
                inset 0 6px 15px rgba(0,0,0,0.12),
                0 0 0 6px #f5ebe0,
                0 0 15px rgba(245, 235, 224, 0.9);
        }

        /* 方塊樣式：全面套用本機指定相片 */
        .candy {
            width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            border-radius: 18px; 
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 0 4px rgba(255,255,255,0.6);
            
            /* 讓本機相片完美填滿方塊 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            will-change: transform, opacity;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.2s, opacity 0.15s;
        }

        /* 套用您提供的 6 張本機相片路徑，並搭配粉嫩背景底色襯托 */
        .user-pic1 { background-image: url("image_4dbe0d1b.png"); background-color: #ffe0b2 !important; }
        .user-pic2 { background-image: url("image_4346f6a0.png"); background-color: #ffffff !important; }
        .user-pic3 { background-image: url("image_a3f654f0.png"); background-color: #ffebee !important; }
        .user-pic4 { background-image: url("下載 (1).jpg");       background-color: #f5f5f5 !important; }
        .user-pic5 { background-image: url("下載.jpg");           background-color: #f8bbd0 !important; }
        .user-pic6 { background-image: url("image_a22ccc5a.png"); background-color: #fff9c4 !important; }

        /* Q彈下落動態 */
        .candy.falling {
            animation: catFall 0.25s cubic-bezier(0.25, 1, 0.5, 1.2);
        }

        @keyframes catFall {
            0% { transform: translateY(-40px) scaleY(1.1); opacity: 0.5; }
            70% { transform: translateY(2px) scaleY(0.95); opacity: 1; }
            100% { transform: translateY(0) scaleY(1); }
        }

        /* 絲滑漸隱 */
        .candy.fade-out {
            transform: scale(0);
            opacity: 0;
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }

        .candy:hover {
            transform: scale(1.1) rotate(2deg);
            filter: brightness(1.03);
            box-shadow: 0 0 12px 6px rgba(255,255,255,1), 0 6px 14px rgba(93,64,55,0.18);
            z-index: 2;
        }

        /* 選中炸毛特效 */
        .candy.selected {
            border: 2.5px solid #ff4081;
            box-shadow: 
                0 0 0 5px rgba(255, 64, 129, 0.3),
                0 0 20px 10px rgba(255, 255, 255, 1),
                0 0 25px 12px rgba(255, 64, 129, 0.6);
            animation: catPulse 0.4s infinite alternate ease-in-out;
            z-index: 10;
        }

        @keyframes catPulse {
            from { transform: scale(0.96); }
            to { transform: scale(1.1); }
        }

        /* 稱讚視窗 */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(20, 15, 15, 0.75); 
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--cat-cream);
            padding: 35px;
            border-radius: 40px 45px 38px 48px;
            text-align: center;
            max-width: 420px;
            animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid var(--cat-pink);
            box-shadow: 0 0 0 6px rgba(255, 211, 226, 0.7), 0 0 25px 12px rgba(255, 255, 255, 0.9), 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal h2 { color: #c2185b; margin-top: 0; font-size: 1.9rem; }
        .modal p { font-size: 1.15rem; color: var(--cat-brown); font-weight: bold; }
        
        /* 保留設定：過關特寫照 */
        .modal img { 
            width: 100%; 
            max-width: 290px; 
            height: auto; 
            border-radius: 30px; 
            margin: 15px 0; 
            border: 6px solid white; 
        }

        .close-btn {
            background-color: #ff4081; color: white; border: none; padding: 12px 35px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; transition: background 0.2s, transform 0.1s; font-weight: bold; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.5);
        }
        .close-btn:hover { background-color: #f50057; transform: scale(1.05); }

        @keyframes scaleUp { from { transform: scale(0.8); } to { transform: scale(1); } }
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="game-container">
        <h1>🐾 專屬相片・黑爪消消樂 🐾</h1>
        <div class="score-board">
            喵喵得分: <span id="score">0</span> 分
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="modal-title">喵不可言！突破大關！ 😻</h2>
            <p id="modal-desc">滿版黑爪賜予你力量！專屬相片大集合！</p>
            
            <img src="image_608515e1.png" alt="玩家稱讚特寫照片">
            
            <br>
            <button class="close-btn" onclick="closeModal()">繼續擼貓去 🐾</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('grid');
            const scoreDisplay = document.getElementById('score');
            const width = 8;
            const squares = [];
            let score = 0;
            let lastMilestone = 0; 
            let isAnimating = false;

            // 對應你的 6 張本機照片類別
            const catTypes = [
                { class: 'user-pic1' }, 
                { class: 'user-pic2' },  
                { class: 'user-pic3' },   
                { class: 'user-pic4' },  
                { class: 'user-pic5' },   
                { class: 'user-pic6' }   
            ];

            function createBoard() {
                for (let i = 0; i < width * width; i++) {
                    const square = document.createElement('div');
                    square.classList.add('candy');
                    square.setAttribute('id', i);
                    
                    let randomType = catTypes[Math.floor(Math.random() * catTypes.length)];
                    square.classList.add(randomType.class);
                    
                    grid.appendChild(square);
                    squares.push(square);
                    square.addEventListener('click', candyClick);
                }
                
                while (checkMatchesForMarking()) {
                    clearMarkedMatches(true);
                    dropAndRefill(true);
                }
                score = 0;
                scoreDisplay.innerText = score;
            }

            let firstSelectedId = null;

            function candyClick() {
                if (isAnimating) return;
                const clickedId = parseInt(this.id);

                if (firstSelectedId === null) {
                    firstSelectedId = clickedId;
                    squares[firstSelectedId].classList.add('selected');
                } else {
                    squares[firstSelectedId].classList.remove('selected');

                    if (firstSelectedId === clickedId) {
                        firstSelectedId = null;
                        return;
                    }

                    const isAdjacent = [
                        firstSelectedId - 1,          
                        firstSelectedId + 1,          
                        firstSelectedId - width,      
                        firstSelectedId + width       
                    ].includes(clickedId);

                    const isLeftEdge = (firstSelectedId % width === 0 && clickedId === firstSelectedId - 1);
                    const isRightEdge = (firstSelectedId % width === width - 1 && clickedId === firstSelectedId + 1);

                    if (isAdjacent && !isLeftEdge && !isRightEdge) {
                        swapCandies(firstSelectedId, clickedId);
                    }
                    firstSelectedId = null;
                }
            }

            function swapCandies(id1, id2) {
                isAnimating = true;
                executeSwapStyles(id1, id2);

                const hasMatch = checkMatchesForMarking();

                if (hasMatch) {
                    setTimeout(() => { gameLoop(); }, 150);
                } else {
                    setTimeout(() => {
                        executeSwapStyles(id1, id2);
                        isAnimating = false;
                    }, 200);
                }
            }

            function executeSwapStyles(id1, id2) {
                let type1Class = getCatClass(squares[id1]);
                let type2Class = getCatClass(squares[id2]);
                
                if(type1Class) squares[id1].classList.remove(type1Class);
                if(type2Class) squares[id2].classList.remove(type2Class);
                if(type1Class) squares[id2].classList.add(type1Class);
                if(type2Class) squares[id1].classList.add(type2Class);
            }

            function getCatClass(el) {
                return catTypes.find(t => el.classList.contains(t.class))?.class || null;
            }

            function checkMatchesForMarking() {
                let hasMatch = false;

                for (let i = 0; i < 64; i++) {
                    let col = i % width;
                    if (col < width - 2) {
                        let matchIdx = [i, i + 1, i + 2];
                        let cClass = getCatClass(squares[i]);
                        if (cClass && matchIdx.every(idx => getCatClass(squares[idx]) === cClass)) {
                            matchIdx.forEach(idx => squares[idx].setAttribute('data-to-match', 'true'));
                            hasMatch = true;
                        }
                    }
                }

                for (let i = 0; i < 64; i++) {
                    let row = Math.floor(i / width);
                    if (row < width - 2) {
                        let matchIdx = [i, i + width, i + width * 2];
                        let cClass = getCatClass(squares[i]);
                        if (cClass && matchIdx.every(idx => getCatClass(squares[idx]) === cClass)) {
                            matchIdx.forEach(idx => squares[idx].setAttribute('data-to-match', 'true'));
                            hasMatch = true;
                        }
                    }
                }
                return hasMatch;
            }

            function clearMarkedMatches(silent = false) {
                squares.forEach(square => {
                    if (square.getAttribute('data-to-match') === 'true') {
                        if (!silent) square.classList.add('fade-out'); 
                        square.removeAttribute('data-to-match');
                        catTypes.forEach(t => square.classList.remove(t.class));
                        if (!silent) score += 10;
                    }
                });
                scoreDisplay.innerText = score;

                if (!silent && score > 0 && Math.floor(score / 1000) > Math.floor(lastMilestone / 1000)) {
                    lastMilestone = score; 
                    triggerMilestoneCelebration(Math.floor(score / 1000) * 1000);
                }
            }

            function dropAndRefill(silent = false) {
                for (let c = 0; c < width; c++) {
                    for (let r = width - 1; r >= 0; r--) {
                        let currentIdx = r * width + c;
                        if (getCatClass(squares[currentIdx]) === null) {
                            for (let k = r - 1; k >= 0; k--) {
                                let upperIdx = k * width + c;
                                let upperClass = getCatClass(squares[upperIdx]);
                                if (upperClass !== null) {
                                    squares[upperIdx].classList.remove(upperClass);
                                    squares[currentIdx].classList.add(upperClass);
                                    
                                    if (!silent) {
                                        squares[currentIdx].classList.remove('fade-out');
                                        squares[currentIdx].classList.add('falling'); 
                                    }
                                    break;
                                }
                            }
                        }
                    }
                }

                for (let i = 0; i < 64; i++) {
                    if (getCatClass(squares[i]) === null) {
                        let randomType = catTypes[Math.floor(Math.random() * catTypes.length)];
                        squares[i].classList.add(randomType.class);
                        if (!silent) {
                            squares[i].classList.remove('fade-out');
                            squares[i].classList.add('falling');
                        }
                    }
                }
            }

            function clearAllAnimationClasses() {
                squares.forEach(s => {
                    s.classList.remove('falling');
                    s.classList.remove('fade-out');
                });
            }

            function gameLoop() {
                if (checkMatchesForMarking()) {
                    clearMarkedMatches(false);
                    setTimeout(() => {
                        clearAllAnimationClasses();
                        dropAndRefill(false);
                        setTimeout(gameLoop, 200); 
                    }, 120);
                } else {
                    setTimeout(() => {
                        clearAllAnimationClasses();
                        isAnimating = false;
                    }, 200);
                }
            }

            function triggerMilestoneCelebration(currentMilestone) {
                document.getElementById('modal-title').innerText = `喵不可言！突破 ${currentMilestone} 分！ 🏆`;
                document.getElementById('modal-desc').innerText = `滿版黑爪賜予你力量！當前總得分：${score} 分！`;
                showWinModal();
                startConfetti();
            }

            createBoard();
        });

        function showWinModal() { document.getElementById('winModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('winModal').style.display = 'none'; stopConfetti(); }

        /* 肉墊與小貓爪動態紙屑特效 */
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiArray = [];
        let animationFrameId = null;
        let isConfettiActive = false;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height; 
                this.size = Math.random() * 12 + 14; 
                
                this.type = Math.floor(Math.random() * 2);
                this.emoji = ['🐾', '🐱', '🐈‍⬛'][Math.floor(Math.random() * 3)];
                
                const catColors = ['#ff80ab', '#ffb74d', '#ffd3e2', '#b3e5fc', '#ffffff'];
                this.color = catColors[Math.floor(Math.random() * catColors.length)];
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 4 + 4; 
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 6 - 3;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.rotation += this.rotationSpeed;
                if (this.y > canvas.height && isConfettiActive) {
                    this.y = -20; this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save(); 
                ctx.translate(this.x, this.y); 
                ctx.rotate((this.rotation * Math.PI) / 180); 
                
                if (this.type === 0) {
                    ctx.font = `${this.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.emoji, 0, 0);
                } else {
                    ctx.fillStyle = this.color; 
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size / 1.2, this.size * 1.2); 
                }
                ctx.restore();
            }
        }

        function startConfetti() {
            isConfettiActive = true; confettiArray = [];
            for (let i = 0; i < 120; i++) confettiArray.push(new Confetti());
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettiArray.forEach(p => { p.update(); p.draw(); });
            if (!isConfettiActive && confettiArray.every(p => p.y > canvas.height)) {
                ctx.clearRect(0, 0, canvas.width, canvas.height); cancelAnimationFrame(animationFrameId);
            } else {
                animationFrameId = requestAnimationFrame(animateConfetti);
            }
        }
        function stopConfetti() { isConfettiActive = false; }
    </script>
</body>
</html>
