<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 心動模擬器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--rose:#c9748a;--rose-dark:#8b4a5c;--cream:#fdf6f0;--text:#3a2a2e;--muted:#8a6a72;--card:rgba(255,255,255,0.88)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif TC',serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}
.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.petal{position:absolute;top:-20px;opacity:0;animation:fall linear infinite}
@keyframes fall{0%{opacity:0;transform:translateY(0) rotate(0deg)}10%{opacity:.7}90%{opacity:.4}100%{opacity:0;transform:translateY(110vh) rotate(400deg)}}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* SETUP */
#setup{background:linear-gradient(155deg,#fdf0f3,#fdf6f0,#f0eef8);justify-content:center;padding:2rem 1rem}
.setup-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid rgba(201,116,138,.22);border-radius:26px;padding:2.5rem 2rem;max-width:460px;width:100%;box-shadow:0 10px 50px rgba(201,116,138,.13)}
.s-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--rose-dark);text-align:center;margin-bottom:.2rem}
.s-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:2rem;letter-spacing:.06em}
.fg{margin-bottom:1.15rem}
.fg label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:.35rem;letter-spacing:.09em}
.fg input,.fg textarea{width:100%;padding:.62rem 1rem;border:1px solid rgba(201,116,138,.28);border-radius:10px;background:rgba(253,240,243,.45);font-family:'Noto Serif TC',serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(201,116,138,.11)}
.fg textarea{resize:vertical;min-height:68px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.start-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;border:none;border-radius:13px;font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:.12em;transition:transform .15s,box-shadow .2s;margin-top:.4rem}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(201,116,138,.42)}
.start-btn:active{transform:translateY(0)}

/* GAME */
#game{background:var(--cream);padding-bottom:3rem}
.top-bar{width:100%;max-width:620px;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1rem .7rem}
.s-info{font-size:.8rem;color:var(--muted)}
.s-info span{font-weight:600;color:var(--rose)}
.bpm-bar{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--rose);font-weight:600}
.hico{font-size:1.1rem;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.32)}}

.scene-box{max-width:620px;width:100%;padding:0 1rem;margin-bottom:1rem}
.scene-ill{background:linear-gradient(135deg,#fce8ed,#f5e8f8);border-radius:22px;padding:1.4rem 1.6rem;text-align:center;position:relative;overflow:hidden;border:1px solid rgba(201,116,138,.18)}
.scene-ill::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(201,116,138,.07),transparent 60%),radial-gradient(circle at 80% 20%,rgba(160,120,200,.07),transparent 60%)}
.s-emoji{font-size:3.2rem;margin-bottom:.4rem;position:relative}
.s-stitle{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--rose-dark);position:relative}
.s-sdesc{font-size:.8rem;color:var(--muted);margin-top:.25rem;position:relative;font-style:italic}

.aff-area{max-width:620px;width:100%;padding:0 1rem;margin-bottom:.9rem}
.aff-label{display:flex;justify-content:space-between;font-size:.73rem;color:var(--muted);margin-bottom:.35rem}
.aff-label span:last-child{color:var(--rose);font-weight:600}
.aff-track{background:rgba(201,116,138,.11);border-radius:999px;height:7px;overflow:hidden}
.aff-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f4a7bb,var(--rose),var(--rose-dark));transition:width .65s cubic-bezier(.34,1.56,.64,1)}

.dlg-area{max-width:620px;width:100%;padding:0 1rem;margin-bottom:1rem}
.dlg-box{background:var(--card);border:1px solid rgba(201,116,138,.18);border-radius:20px;padding:1.2rem 1.5rem;box-shadow:0 4px 22px rgba(201,116,138,.08);min-height:88px}
.spk{font-size:.75rem;font-weight:600;color:var(--rose);letter-spacing:.1em;margin-bottom:.45rem}
.dlg-txt{font-size:.93rem;line-height:1.9;color:var(--text);min-height:2.5rem;white-space:pre-wrap}
.cur{display:inline-block;width:2px;height:1em;background:var(--rose);vertical-align:text-bottom;animation:blink .8s step-end infinite;margin-left:1px}
@keyframes blink{50%{opacity:0}}

.ch-area{max-width:620px;width:100%;padding:0 1rem;display:flex;flex-direction:column;gap:.6rem}
.ch-btn{background:var(--card);border:1.5px solid rgba(201,116,138,.22);border-radius:15px;padding:.82rem 1.2rem;font-family:'Noto Serif TC',serif;font-size:.87rem;color:var(--text);cursor:pointer;text-align:left;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.03);position:relative;overflow:hidden}
.ch-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,116,138,.07),transparent);opacity:0;transition:opacity .2s}
.ch-btn:hover{border-color:var(--rose);transform:translateX(5px)}
.ch-btn:hover::before{opacity:1}
.ch-btn:active{transform:translateX(2px) scale(.99)}
.ctag{font-size:.68rem;padding:2px 8px;border-radius:999px;margin-right:7px;font-weight:600}
.t-sweet{background:rgba(201,116,138,.14);color:var(--rose)}
.t-bold{background:rgba(139,74,92,.14);color:var(--rose-dark)}
.t-gentle{background:rgba(201,169,110,.18);color:#7a5c2a}

.nav-bar{max-width:620px;width:100%;padding:.5rem 1rem;display:flex;gap:.75rem;margin-top:.4rem}
.n-btn{flex:1;padding:.72rem;border-radius:13px;font-family:'Noto Serif TC',serif;font-size:.84rem;cursor:pointer;transition:all .2s;border:1.5px solid rgba(201,116,138,.28);background:transparent;color:var(--muted)}
.n-btn:hover{border-color:var(--rose);color:var(--rose)}
.n-btn.pri{background:linear-gradient(135deg,var(--rose),var(--rose-dark));border-color:transparent;color:#fff;font-weight:600}
.n-btn.pri:hover{box-shadow:0 5px 18px rgba(201,116,138,.42);transform:translateY(-1px)}

/* ENDING */
#ending{background:linear-gradient(155deg,#fce8ed,#fdf6f0,#f0eef8);justify-content:center;text-align:center;padding:2rem 1rem}
.end-card{max-width:420px;background:var(--card);border-radius:28px;padding:2.5rem 2rem;border:1px solid rgba(201,116,138,.22);box-shadow:0 14px 55px rgba(201,116,138,.16)}
.end-emo{font-size:4rem;margin-bottom:1rem}
.end-title{font-family:'Playfair Display',serif;font-size:1.65rem;color:var(--rose-dark);margin-bottom:.8rem}
.end-score{font-size:2rem;font-weight:600;color:var(--rose);margin-bottom:1.2rem}
.end-txt{font-size:.88rem;color:var(--muted);line-height:2;margin-bottom:1.6rem;white-space:pre-wrap}
.r-btn{padding:.82rem 2.2rem;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;border:none;border-radius:13px;font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:600;cursor:pointer;letter-spacing:.08em;transition:all .2s}
.r-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(201,116,138,.42)}

.hburst{position:fixed;pointer-events:none;z-index:999;font-size:1.5rem;animation:burst 1s ease-out forwards}
@keyframes burst{0%{opacity:1;transform:scale(.5) translateY(0)}100%{opacity:0;transform:scale(1.6) translateY(-65px)}}

@media(max-width:480px){.setup-card{padding:2rem 1.4rem}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="petals" id="petalsC"></div>

<!-- SETUP -->
<div class="screen active" id="setup">
  <div class="setup-card">
    <h1 class="s-title">💌 心動模擬器</h1>
    <p class="s-sub">為你打造專屬的浪漫故事</p>
    <div class="row2">
      <div class="fg"><label>你的名字</label><input id="pName" placeholder="例：小明" maxlength="10"></div>
      <div class="fg"><label>對象的名字</label><input id="tName" placeholder="例：佳嫻" maxlength="10"></div>
    </div>
    <div class="fg"><label>對象的稱呼／關係</label><input id="tRole" placeholder="例：嫂子、學姊、鄰居姊姊…" maxlength="15"></div>
    <div class="fg"><label>對象的個性</label><textarea id="tPersonality" placeholder="例：溫柔體貼、喜歡烘焙、說話輕輕的…"></textarea></div>
    <div class="row2">
      <div class="fg"><label>故事地點</label><input id="sLoc" placeholder="例：家裡廚房" maxlength="20"></div>
      <div class="fg"><label>故事時間</label><input id="sTime" placeholder="例：週末午後" maxlength="20"></div>
    </div>
    <button class="start-btn" onclick="startGame()">開始故事 ✦</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="top-bar">
    <div class="s-info"><span id="iLoc">—</span> · <span id="iTime">—</span></div>
    <div class="bpm-bar"><span class="hico">💗</span><span id="bpmD">72</span> BPM</div>
  </div>
  <div class="scene-box">
    <div class="scene-ill">
      <div class="s-emoji" id="sEmoji">🏠</div>
      <div class="s-stitle" id="sTitle"></div>
      <div class="s-sdesc" id="sDesc"></div>
    </div>
  </div>
  <div class="aff-area">
    <div class="aff-label"><span>💞 好感度</span><span id="affPct">0%</span></div>
    <div class="aff-track"><div class="aff-fill" id="affFill" style="width:0%"></div></div>
  </div>
  <div class="dlg-area">
    <div class="dlg-box">
      <div class="spk" id="spkName">———</div>
      <div class="dlg-txt" id="dlgTxt"></div>
    </div>
  </div>
  <div class="ch-area" id="chArea"></div>
  <div class="nav-bar">
    <button class="n-btn" onclick="goSetup()">⚙ 重新設定</button>
    <button class="n-btn pri" id="nxtBtn" onclick="nextStep()" style="display:none">繼續 →</button>
  </div>
</div>

<!-- ENDING -->
<div class="screen" id="ending">
  <div class="end-card">
    <div class="end-emo" id="eEmoji">💖</div>
    <h2 class="end-title" id="eTitle"></h2>
    <div class="end-score" id="eScore"></div>
    <p class="end-txt" id="eTxt"></p>
    <button class="r-btn" onclick="goSetup()">重新開始 ✦</button>
  </div>
</div>

<script>
let cfg={}, aff=0, bpm=72, si=0, waitChoice=false, tyTimer=null;

// ── 地點關鍵字→場景資訊 ──
function detectScene(loc){
  const l=loc.toLowerCase();
  if(/廚房|烘焙|烹飪|料理|餐廳|茶水間/.test(l)) return{emoji:'🍳',key:'kitchen'};
  if(/咖啡|café|cafe|下午茶|甜點/.test(l)) return{emoji:'☕',key:'cafe'};
  if(/書房|圖書館|書店|閱讀|讀書/.test(l)) return{emoji:'📚',key:'library'};
  if(/公園|花園|草地|河邊|湖邊|散步/.test(l)) return{emoji:'🌿',key:'park'};
  if(/海邊|海灘|沙灘|港口|碼頭/.test(l)) return{emoji:'🌊',key:'beach'};
  if(/醫院|診所|宿舍|病房/.test(l)) return{emoji:'🏥',key:'hospital'};
  if(/電影|戲院|影院/.test(l)) return{emoji:'🎬',key:'cinema'};
  if(/便利商店|超市|超商|夜市|市場/.test(l)) return{emoji:'🏪',key:'store'};
  if(/屋頂|天台|頂樓|陽台/.test(l)) return{emoji:'🌃',key:'rooftop'};
  if(/車|捷運|公車|火車|通勤/.test(l)) return{emoji:'🚃',key:'transit'};
  if(/辦公|公司|職場|工作/.test(l)) return{emoji:'🏢',key:'office'};
  if(/臥室|房間|床|寢室/.test(l)) return{emoji:'🛏',key:'bedroom'};
  if(/客廳|沙發|起居室/.test(l)) return{emoji:'🛋',key:'living'};
  return{emoji:'🏠',key:'home'};
}

function sceneDesc(key,loc,time,t){
  const d={
    kitchen:`${time}的${loc}裡瀰漫著食物的香氣，${t}的圍裙還繫著，側臉映著爐火的光。`,
    cafe:`${loc}的角落，${time}的陽光把一切都染得微微金黃，${t}端著杯子坐在你對面。`,
    library:`${loc}裡安靜得只聽得見翻書聲，${t}低著頭，睫毛在書頁上投下淡淡的影。`,
    park:`${time}的${loc}，風把${t}的髮絲輕輕吹亂，草地上灑著細碎的光點。`,
    beach:`${loc}的浪聲一陣一陣，${t}脫了鞋走在濕沙上，${time}的光把他的影子拉很長。`,
    hospital:`${loc}的走廊安靜而漫長，${time}${t}推門進來，手裡端著東西，眼神裡全是擔心。`,
    cinema:`燈光暗下來的瞬間，${loc}裡只剩下彼此的呼吸，${t}靠在你旁邊的座位上。`,
    store:`${time}的${loc}幾乎沒什麼人，${t}拿著手上的東西走過來，問你要不要一起。`,
    rooftop:`${loc}的風很大，城市的燈火在遠處閃爍，${t}靠著欄杆，${time}的夜色把他包裹起來。`,
    transit:`${loc}搖搖晃晃，${t}就站在你旁邊，${time}的人潮把你們推得更近一點。`,
    office:`${time}的${loc}漸漸安靜下來，${t}還坐在位子上，抬頭時恰好對上你的視線。`,
    bedroom:`${time}${t}輕手輕腳地推開門，燈光很昏黃，空氣裡有說不清楚的溫柔。`,
    living:`${time}的${loc}，電視聲開著但沒人在看，${t}坐在沙發另一端，不知何時側過臉來。`,
    home:`${time}的${loc}，陽光把地板照得暖洋洋，${t}從房間走出來，正好和你相遇。`,
  };
  return d[key]||d.home;
}

// ── 依地點生成故事段落 ──
function buildStory(){
  const p=cfg.player, t=cfg.target, loc=cfg.location, time=cfg.time;
  const scene=detectScene(loc);
  const key=scene.key;

  const pools={
    kitchen:[
      {type:'narrate',text:`${time}，你走進${loc}，${t}正在揉麵糰，背對著你，肩膀隨著動作輕輕起伏。`},
      {type:'dialogue',speaker:t,text:`「你來了？剛好，幫我把那邊的麵粉遞過來。」`,sub:`他頭也沒回，但嘴角微微上揚。`},
      {type:'choice',choices:[
        {tag:'gentle',label:`「好，在哪裡？」靠過去幫忙找`,reply:`${t}轉過身時，沒料到你站得這麼近，輕輕「啊」了一聲，麵粉罐差點打翻。「你……走路沒有聲音喔。」`,gain:18},
        {tag:'sweet',label:`「${t}，你做的東西一定很好吃。」`,reply:`他停下動作，回頭看你一眼，「你是來討好我的？」但手邊的麵糰卻揉得更起勁了。`,gain:25},
        {tag:'bold',label:`悄悄走到他身後說：「需要幫忙嗎？」`,reply:`${t}整個人僵了一秒，慢慢轉身，「你……從什麼時候進來的？」臉上飄著一層薄薄的紅。`,gain:32},
      ]},
      {type:'narrate',text:`香氣漸漸充滿整個${loc}，${t}把成品放在你面前，等你試吃。`},
      {type:'dialogue',speaker:t,text:`「你覺得怎麼樣？老實說。」`,sub:`他靠著流理台，雙臂交叉，眼神卻有點緊張。`},
      {type:'choice',choices:[
        {tag:'gentle',label:`「很好吃，比上次還好。」`,reply:`${t}長長地呼了口氣，「那就好。」然後把圍裙解下來，默默靠到你旁邊說，「多吃點。」`,gain:20},
        {tag:'sweet',label:`「比任何地方吃到的都好吃，因為是${t}做的。」`,reply:`他愣了一下，低頭看著桌上的東西，「……你說話越來越肉麻了。」但又偷偷多拿了一塊給你。`,gain:30},
        {tag:'bold',label:`「${t}本人比東西更好。」`,reply:`${t}的臉瞬間紅透，用抹布輕輕打你一下，「你有完沒完。」但嘴角根本壓不住。`,gain:40},
      ]},
      {type:'narrate',text:`你們就這樣並排坐在${loc}裡，什麼都不用說，光是這樣就覺得很足夠。`},
      {type:'dialogue',speaker:t,text:`「……以後，有空就多來。」`,sub:`他說得很輕，像是說給空氣聽，卻是認真的。`},
      {type:'choice',choices:[
        {tag:'gentle',label:`「嗯，我會的。」`,reply:`${t}點點頭，沒再說話，但那個微笑一直在。`,gain:18},
        {tag:'sweet',label:`「每天都來可以嗎？」`,reply:`「……隨便你。」他說，但明明是在笑。`,gain:30},
        {tag:'bold',label:`「我是說，我每天都想見到你。」`,reply:`${t}深吸一口氣，看了你很久，輕輕說，「……我也是。」`,gain:45},
      ]},
    ],
    cafe:[
      {type:'narrate',text:`你推開${loc}的門，${t}已經在了，坐在角落那桌，面前一杯還冒著熱氣，另一杯是替你點的。`},
      {type:'dialogue',speaker:t,text:`「來了。我猜你還是要一樣的——拿鐵，少糖。」`,sub:`他說得理所當然，但其實記得你的習慣。`},
      {type:'choice',choices:[
        {tag:'gentle',label:`「你還記得？」`,reply:`${t}微微一怔，「記什麼？這很難記嗎？」但眼神避開了你一秒。`,gain:20},
        {tag:'sweet',label:`「${t}最懂我了。」`,reply:`他把杯子推過來，「少說好聽的，坐下。」臉上卻是忍著的笑。`,gain:28},
        {tag:'bold',label:`「每次來都被你照顧，有點不捨得走。」`,reply:`${t}手指輕輕敲了一下桌面，「那就待久一點啊。」說完似乎才發現自己說了什麼，低頭喝了一口咖啡。`,gain:38},
      ]},
      {type:'narrate',text:`窗外有人走過，陽光一格格移動，${loc}裡的音樂很輕，你們說著說著忘了時間。`},
      {type:'dialogue',speaker:t,text:`「你有沒有覺得……有些地方，一個人來和兩個人來，感覺完全不同？」`,sub:`他望著窗外，聲音比平時慢了一點。`},
      {type:'choice',choices:[
        {tag:'gentle',label:`「有，兩個人比較不孤單。」`,reply:`「……嗯。」${t}應了一聲，轉過來看你，「今天謝謝你陪我來。」`,gain:22},
        {tag:'sweet',label:`「和${t}一起，哪裡都不一樣。」`,reply:`他停頓了一下，「……你說話總是這樣。」但沒有否認，反而往你這邊靠了一點。`,gain:33},
        {tag:'bold',label:`「因為我只想和你一起來這裡。」`,reply:`${t}長長地看著你，最後輕輕笑了，「……那下次也來。」`,gain:45},
      ]},
      {type:'dialogue',speaker:t,text:`「杯子涼了。」`,sub:`他起身幫你換了一杯熱的，放在你手邊，動作很自然，卻讓你心跳了一拍。`},
      {type:'choice',choices:[

  document.getElementById('sEmoji').textContent=sc.emoji;
  document.getElementById('sTitle').textContent=`${cfg.time}・${cfg.location}`;
  document.getElementById('sDesc').textContent=sceneDesc(sc.key,cfg.location,cfg.time,cfg.target);
}

// ── 打字機 ──
function typeText(el,text,cb){
  if(tyTimer)clearInterval(tyTimer);
  el.innerHTML='';let i=0;
  const cur=document.createElement('span');cur.className='cur';el.appendChild(cur);
  tyTimer=setInterval(()=>{
    if(i<text.length){cur.insertAdjacentText('beforebegin',text[i]);i++;}
    else{clearInterval(tyTimer);cur.remove();if(cb)cb();}
  },36);
}

// ── 愛心爆炸 ──
function spawnHeart(x,y){
  const el=document.createElement('div');el.className='hburst';
  el.textContent=['💗','💖','💕','💞','❤️'][Math.floor(Math.random()*5)];
  el.style.left=(x-12)+'px';el.style.top=(y-12)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}

// ── BPM ──
function setBPM(v){
  bpm=Math.min(145,Math.max(60,v));
  document.getElementById('bpmD').textContent=bpm;
  document.querySelector('.hico').style.animationDuration=(60/bpm).toFixed(2)+'s';
}
function gainAff(n){
  aff=Math.min(100,aff+n);
  document.getElementById('affFill').style.width=aff+'%';
  document.getElementById('affPct').textContent=aff+'%';
  setBPM(62+Math.round(aff*.82));
}

// ── 步驟渲染 ──
let story=[];
function renderStep(){
  const step=story[si];
  if(!step){showEnding();return;}
  const nb=document.getElementById('nxtBtn'),ca=document.getElementById('chArea');
  ca.innerHTML='';nb.style.display='none';waitChoice=false;

  if(step.type==='narrate'){
    document.getElementById('spkName').textContent='旁　白';
    typeText(document.getElementById('dlgTxt'),step.text,()=>{nb.style.display='block';});
  } else if(step.type==='dialogue'){
    document.getElementById('spkName').textContent=step.speaker==='旁白'?'旁　白':step.speaker;
    typeText(document.getElementById('dlgTxt'),step.text+(step.sub?'\n'+step.sub:''),()=>{nb.style.display='block';});
  } else if(step.type==='choice'){
    document.getElementById('spkName').textContent='你的選擇';
    document.getElementById('dlgTxt').innerHTML='<em style="color:var(--muted);font-size:.84rem">你會怎麼做？</em>';
    waitChoice=true;
    step.choices.forEach(c=>{
      const b=document.createElement('button');b.className='ch-btn';
      b.innerHTML=`<span class="ctag t-${c.tag}">${{sweet:'甜蜜',bold:'大膽',gentle:'溫柔'}[c.tag]}</span>${c.label}`;
      b.onclick=e=>{
        spawnHeart(e.clientX,e.clientY);gainAff(c.gain);
        ca.innerHTML='';
        document.getElementById('spkName').textContent=cfg.target;
        typeText(document.getElementById('dlgTxt'),c.reply,()=>{si++;setTimeout(renderStep,750);});
      };
      ca.appendChild(b);
    });
  }
}
function tagLabel(t){return{sweet:'甜蜜',bold:'大膽',gentle:'溫柔'}[t]||'';}
function nextStep(){if(waitChoice)return;si++;renderStep();}

// ── 開始遊戲 ──
function startGame(){
  cfg={
    player:document.getElementById('pName').value.trim()||'你',
    target:document.getElementById('tName').value.trim()||'他',
    role:document.getElementById('tRole').value.trim()||'嫂子',
    location:document.getElementById('sLoc').value.trim()||'家裡',
    time:document.getElementById('sTime').value.trim()||'午後',
  };
  aff=0;si=0;gainAff(0);
  document.getElementById('iLoc').textContent=cfg.location;
  document.getElementById('iTime').textContent=cfg.time;
  renderScene();
  story=buildStory();
  showScreen('game');
  setTimeout(renderStep,400);
}

// ── 結局 ──
function showEnding(){
  const t=cfg.target,loc=cfg.location,time=cfg.time;
  let emo,title,txt;
  if(aff>=85){
    emo='💖';title='心意相通';
    txt=`${time}的${loc}，那道說不清楚的距離，在今天悄悄消失了。\n${t}說的那句話，你會記很久很久。\n也許有些感情，根本不需要多說什麼，\n只要繼續靠近，就夠了。`;
  } else if(aff>=60){
    emo='🌸';title='悸動萌芽';
    txt=`${t}心裡，已經有一個地方是留給你的。\n${loc}的${time}，你們都感覺到了，\n只是還差那麼一步——\n而你們都知道，那一步不會太遠。`;
  } else if(aff>=35){
    emo='☁️';title='微微心動';
    txt=`有些情感，像${time}的光，\n溫暖，但還沒到灼熱。\n${t}記得今天，你也記得。\n也許下一次，可以更勇敢一點。`;
  } else {
    emo='🍃';title='平靜的一天';
    txt=`${loc}的${time}，好像和平常沒什麼不同。\n但你知道，心裡某個地方，\n已經悄悄不一樣了。`;
  }
  document.getElementById('eEmoji').textContent=emo;
  document.getElementById('eTitle').textContent=title;
  document.getElementById('eScore').textContent=`好感度 ${aff} / 100`;
  document.getElementById('eTxt').textContent=txt;
  showScreen('ending');
}

// ── 畫面切換 ──
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goSetup(){showScreen('setup');}

// ── 花瓣 ──
(()=>{
  const c=document.getElementById('petalsC');
  ['🌸','🌷','💮','✿','🌺'].forEach((s,i)=>{
    for(let j=0;j<3;j++){
      const p=document.createElement('div');p.className='petal';p.textContent=s;
      p.style.left=Math.random()*100+'%';p.style.fontSize=(13+Math.random()*9)+'px';
      const d=9+Math.random()*11;p.style.animationDuration=d+'s';p.style.animationDelay=-(Math.random()*d)+'s';
      c.appendChild(p);
    }
  });
})();
</script>
</body>
