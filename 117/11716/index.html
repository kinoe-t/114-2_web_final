<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜動漫角色</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a28;
    --border: #2a2a45;
    --accent: #e040fb;
    --accent2: #00e5ff;
    --accent3: #ff6b6b;
    --text: #f0f0ff;
    --muted: #7a7a9a;
    --correct: #00e676;
    --wrong: #ff1744;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: blobPulse 8s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 300px; height: 300px; background: var(--accent2); bottom: -50px; right: -50px; animation-delay: 3s; }
  .blob3 { width: 200px; height: 200px; background: var(--accent3); top: 50%; left: 50%; animation-delay: 6s; }

  @keyframes blobPulse {
    0%, 100% { transform: scale(1); opacity: 0.15; }
    50% { transform: scale(1.2); opacity: 0.25; }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 24px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Header */
  header {
    text-align: center;
    padding-top: 8px;
  }

  .logo {
    font-family: 'Zen Dots', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    width: 100%;
    justify-content: center;
  }

  .stat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }

  .stat-label { color: var(--muted); }
  .stat-value {
    font-family: 'Zen Dots', cursive;
    font-size: 1rem;
  }
  .stat-value.correct-color { color: var(--correct); }
  .stat-value.wrong-color { color: var(--accent3); }
  .stat-value.streak-color { color: var(--accent2); }

  /* Game card */
  .game-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 40px rgba(224, 64, 251, 0.08);
    transition: box-shadow 0.3s;
  }

  .game-card.correct-flash { box-shadow: 0 0 60px rgba(0, 230, 118, 0.3); }
  .game-card.wrong-flash { box-shadow: 0 0 60px rgba(255, 23, 68, 0.3); }

  /* Image area */
  .image-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .char-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    transition: filter 0.4s ease;
  }

  .char-image.blurred { filter: blur(28px) brightness(0.6); }

  /* Placeholder state */
  .image-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 40px;
    text-align: center;
  }

  .placeholder-icon {
    font-size: 3rem;
    opacity: 0.4;
  }

  /* Question number badge */
  .q-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(10, 10, 15, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Zen Dots', cursive;
    font-size: 0.75rem;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  /* Difficulty badge */
  .diff-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .diff-easy { background: rgba(0, 230, 118, 0.2); color: var(--correct); border: 1px solid var(--correct); }
  .diff-medium { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid #ffc107; }
  .diff-hard { background: rgba(255, 23, 68, 0.2); color: var(--wrong); border: 1px solid var(--wrong); }

  /* Hint strip */
  .hint-strip {
    background: rgba(0, 229, 255, 0.05);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }

  .hint-icon { color: var(--accent2); }
  .hint-text { color: var(--muted); }
  .hint-val { color: var(--text); font-weight: 700; }

  /* Input section */
  .input-section {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .question-text {
    font-size: 1rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .answer-row {
    display: flex;
    gap: 10px;
  }

  .answer-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .answer-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(224, 64, 251, 0.15);
  }

  .answer-input::placeholder { color: var(--muted); }

  .submit-btn {
    background: linear-gradient(135deg, var(--accent), #9c27b0);
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(224, 64, 251, 0.4); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Result banner */
  .result-banner {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-banner.show { display: flex; }
  .result-banner.correct { background: rgba(0, 230, 118, 0.15); border: 1px solid var(--correct); color: var(--correct); }
  .result-banner.wrong { background: rgba(255, 23, 68, 0.12); border: 1px solid var(--wrong); color: var(--wrong); }

  .result-icon { font-size: 1.4rem; }
  .result-text { flex: 1; }
  .result-answer { color: var(--text); }

  /* Action row */
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1;
    min-width: 120px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .btn-reveal {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-reveal:hover { border-color: var(--accent2); color: var(--accent2); }

  .btn-next {
    background: var(--surface);
    border: 1px solid var(--accent2);
    color: var(--accent2);
  }
  .btn-next:hover { background: rgba(0, 229, 255, 0.1); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-skip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-skip:hover { border-color: var(--accent3); color: var(--accent3); }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
    min-width: 4px;
  }

  /* Scoreboard */
  .scoreboard {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .scoreboard-title {
    font-family: 'Zen Dots', cursive;
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: var(--surface); border-radius: 2px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 8px;
    animation: slideIn 0.3s ease;
  }

  .history-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .history-dot.c { background: var(--correct); }
  .history-dot.w { background: var(--wrong); }
  .history-dot.s { background: var(--muted); }

  .history-name { flex: 1; }
  .history-answer { color: var(--muted); font-size: 0.78rem; }

  .empty-history {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    padding: 16px;
  }

  /* Instructions */
  .instructions {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
  }

  .instructions-title {
    font-family: 'Zen Dots', cursive;
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .tip-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .tip-icon { flex-shrink: 0; font-size: 1rem; }

  /* Shake animation */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* Bounce animation for correct */
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    40% { transform: scale(1.06); }
    70% { transform: scale(0.97); }
  }
  .bounce { animation: bounce 0.4s ease; }

  /* Footer */
  footer {
    position: relative;
    z-index: 1;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-align: center;
    padding-bottom: 24px;
    margin-top: -12px;
  }
</style>
</head>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">

  <header>
    <div class="logo">Anime Quiz</div>
    <div class="subtitle">猜猜這是誰？</div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-label">✅ 答對</span>
      <span class="stat-value correct-color" id="scoreCorrect">0</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">❌ 答錯</span>
      <span class="stat-value wrong-color" id="scoreWrong">0</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">🔥 連勝</span>
      <span class="stat-value streak-color" id="scoreStreak">0</span>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap" style="width:100%">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <!-- Game Card -->
  <div class="game-card" id="gameCard">

    <!-- Image -->
    <div class="image-wrapper">
      <img class="char-image" id="charImage" src="" alt="動漫角色" style="display:none"/>
      <div class="image-placeholder" id="imgPlaceholder">
        <div class="placeholder-icon">🖼️</div>
        <div>圖片待補充</div>
        <div style="font-size:0.75rem;opacity:0.6;margin-top:4px">請先在下方試著猜看看！</div>
      </div>
      <div class="q-badge" id="qBadge">Q 1 / 10</div>
      <div class="diff-badge" id="diffBadge">—</div>
    </div>

    <!-- Hint -->
    <div class="hint-strip" id="hintStrip">
      <span class="hint-icon">💡</span>
      <span class="hint-text">作品：</span>
      <span class="hint-val" id="hintSeries">—</span>
      <span class="hint-text" style="margin-left:16px">首字：</span>
      <span class="hint-val" id="hintFirst">—</span>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="question-text">這位動漫角色是誰？請輸入他的名字</div>

      <div class="answer-row">
        <input
          class="answer-input"
          id="answerInput"
          type="text"
          placeholder="輸入角色名稱…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">確認</button>
      </div>

      <!-- Result banner -->
      <div class="result-banner" id="resultBanner">
        <span class="result-icon" id="resultIcon"></span>
        <span class="result-text" id="resultText"></span>
      </div>

      <!-- Action buttons -->
      <div class="action-row" id="actionRow">
        <button class="action-btn btn-reveal" id="revealBtn" onclick="revealAnswer()">👁 顯示答案</button>
        <button class="action-btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>下一題 →</button>
        <button class="action-btn btn-skip" onclick="skipQuestion()">跳過 ↷</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="scoreboard">
    <div class="scoreboard-title">📋 作答紀錄</div>
    <div class="history-list" id="historyList">
      <div class="empty-history">還沒有紀錄，快開始猜吧！</div>
    </div>
  </div>

  <!-- Instructions -->
  <div class="instructions">
    <div class="instructions-title">📖 玩法說明</div>
    <div class="tip-list">
      <div class="tip-item"><span class="tip-icon">🖼️</span><span>看圖猜動漫角色，輸入角色名字（中文或日文皆可）</span></div>
      <div class="tip-item"><span class="tip-icon">💡</span><span>畫面上會顯示作品名稱和角色名字首字作為提示</span></div>
      <div class="tip-item"><span class="tip-icon">👁️</span><span>不知道答案可以點「顯示答案」，但不會加分喔</span></div>
      <div class="tip-item"><span class="tip-icon">🎨</span><span>圖片區塊待補充，你可以先用文字題目練習</span></div>
      <div class="tip-item"><span class="tip-icon">🔥</span><span>連續答對會累積連勝數，挑戰最高紀錄！</span></div>
    </div>
  </div>

</div>

<footer>ANIME QUIZ · 動漫角色猜謎</footer>

// ========================================
// Game State
// ========================================
let state = {
  questions: [],
  current: 0,
  correct: 0,
  wrong: 0,
  streak: 0,
  answered: false,
  revealed: false,
  history: []
};

function init() {
  // Shuffle questions
  state.questions = [...characters].sort(() => Math.random() - 0.5);
  state.current = 0;
  loadQuestion();
}

function loadQuestion() {
  const q = state.questions[state.current];
  if (!q) return;

  state.answered = false;
  state.revealed = false;

  // Update badge
  document.getElementById('qBadge').textContent = `Q ${state.current + 1} / ${state.questions.length}`;

  // Difficulty
  const diffBadge = document.getElementById('diffBadge');
  const diffMap = { easy: ['簡單', 'diff-easy'], medium: ['普通', 'diff-medium'], hard: ['困難', 'diff-hard'] };
  const [label, cls] = diffMap[q.difficulty] || ['—', ''];
  diffBadge.textContent = label;
  diffBadge.className = 'diff-badge ' + cls;

  // Hints
  document.getElementById('hintSeries').textContent = q.series;
  document.getElementById('hintFirst').textContent = q.hint || q.name[0];

  // Image
  const img = document.getElementById('charImage');
  const placeholder = document.getElementById('imgPlaceholder');
  if (q.image) {
    img.src = q.image;
    img.style.display = 'block';
    // img.classList.add('blurred');
    placeholder.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
  }

  // Reset UI
  const input = document.getElementById('answerInput');
  input.value = '';
  input.disabled = false;
  input.focus();

  document.getElementById('submitBtn').disabled = false;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('resultBanner').className = 'result-banner';
  document.getElementById('gameCard').className = 'game-card';

  // Progress
  const pct = (state.current / state.questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function checkAnswer() {
  if (state.answered) return;

  const input = document.getElementById('answerInput');
  const raw = input.value.trim();
  if (!raw) {
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 400);
    return;
  }

  const q = state.questions[state.current];
  const userAnswer = raw.toLowerCase().replace(/\s/g, '');
  const correctName = q.name.toLowerCase().replace(/\s/g, '');
  const aliases = (q.aliases || []).map(a => a.toLowerCase().replace(/\s/g, ''));
  const allAnswers = [correctName, ...aliases];

  const isCorrect = allAnswers.some(a => userAnswer === a || a.includes(userAnswer) && userAnswer.length >= 2);

  markAnswered(isCorrect, raw, q);
}

function markAnswered(isCorrect, userInput, q, skipped = false) {
  state.answered = true;

  const card = document.getElementById('gameCard');
  const banner = document.getElementById('resultBanner');
  const icon = document.getElementById('resultIcon');
  const text = document.getElementById('resultText');

  if (skipped) {
    banner.className = 'result-banner show wrong';
    icon.textContent = '↷';
    text.innerHTML = `跳過！正確答案是 <span class="result-answer">${q.name}</span>`;
    card.classList.add('wrong-flash');
    addHistory('s', q.name, '跳過');
  } else if (isCorrect) {
    state.correct++;
    state.streak++;
    banner.className = 'result-banner show correct';
    icon.textContent = '✅';
    text.innerHTML = `答對了！是 <span class="result-answer">${q.name}</span> 🎉`;
    card.classList.add('correct-flash');
    card.classList.add('bounce');
    addHistory('c', q.name, userInput);
  } else {
    state.wrong++;
    state.streak = 0;
    banner.className = 'result-banner show wrong';
    icon.textContent = '❌';
    text.innerHTML = `答錯了！正確答案是 <span class="result-answer">${q.name}</span>`;
    card.classList.add('wrong-flash');
    document.getElementById('answerInput').classList.add('shake');
    setTimeout(() => document.getElementById('answerInput').classList.remove('shake'), 400);
    addHistory('w', q.name, userInput);
  }

  // Reveal image
  const img = document.getElementById('charImage');
  if (img.src && img.src !== window.location.href) {
    // img.classList.remove('blurred');
  }

  // Update stats
  document.getElementById('scoreCorrect').textContent = state.correct;
  document.getElementById('scoreWrong').textContent = state.wrong;
  document.getElementById('scoreStreak').textContent = state.streak;

  // Enable next, disable input
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('answerInput').disabled = true;
  if (state.current < state.questions.length - 1) {
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').textContent = '下一題 →';
  } else {
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').textContent = '🏆 查看結果';
  }
}

function revealAnswer() {
  if (state.revealed || state.answered) return;
  state.revealed = true;
  const q = state.questions[state.current];

  // Show image unblurred
  const img = document.getElementById('charImage');
  img.classList.remove('blurred');

  // Show banner
  const banner = document.getElementById('resultBanner');
  const icon = document.getElementById('resultIcon');
  const text = document.getElementById('resultText');
  banner.className = 'result-banner show wrong';
  icon.textContent = '👁';
  text.innerHTML = `答案是 <span class="result-answer">${q.name}</span>（未計分）`;

  state.answered = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('answerInput').disabled = true;
  document.getElementById('nextBtn').disabled = false;

  addHistory('s', q.name, '查看答案');
  document.getElementById('scoreStreak').textContent = '0';
  state.streak = 0;
}

function skipQuestion() {
  if (state.answered) { nextQuestion(); return; }
  const q = state.questions[state.current];
  markAnswered(false, '', q, true);
}

function nextQuestion() {
  if (state.current >= state.questions.length - 1) {
    showFinal();
    return;
  }
  state.current++;
  loadQuestion();
}

function showFinal() {
  const total = state.correct + state.wrong;
  const pct = total > 0 ? Math.round((state.correct / state.questions.length) * 100) : 0;
  const card = document.getElementById('gameCard');
  card.innerHTML = `
    <div style="padding:48px 32px;text-align:center;display:flex;flex-direction:column;gap:20px;align-items:center;">
      <div style="font-size:3rem">🏆</div>
      <div style="font-family:'Zen Dots',cursive;font-size:1.8rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">GAME OVER</div>
      <div style="font-size:3rem;font-family:'Zen Dots',cursive;color:var(--accent2)">${pct}%</div>
      <div style="color:var(--muted);font-size:0.9rem">答對 ${state.correct} / ${state.questions.length} 題</div>
      <div style="color:var(--muted);font-size:0.85rem">最高連勝：${state.streak} 連勝</div>
      <button class="submit-btn" onclick="restartGame()" style="margin-top:8px;padding:14px 40px;border-radius:12px">🔄 再玩一次</button>
    </div>
  `;
  document.getElementById('progressFill').style.width = '100%';
}

function restartGame() {
  state = { questions: [], current: 0, correct: 0, wrong: 0, streak: 0, answered: false, revealed: false, history: [] };
  document.getElementById('scoreCorrect').textContent = '0';
  document.getElementById('scoreWrong').textContent = '0';
  document.getElementById('scoreStreak').textContent = '0';
  document.getElementById('historyList').innerHTML = '<div class="empty-history">還沒有紀錄，快開始猜吧！</div>';

  // Restore card HTML
  document.getElementById('gameCard').innerHTML = `
    <div class="image-wrapper">
      <img class="char-image" id="charImage" src="" alt="動漫角色" style="display:none"/>
      <div class="image-placeholder" id="imgPlaceholder">
        <div class="placeholder-icon">🖼️</div>
        <div>圖片待補充</div>
        <div style="font-size:0.75rem;opacity:0.6;margin-top:4px">請先在下方試著猜看看！</div>
      </div>
      <div class="q-badge" id="qBadge">Q 1 / 10</div>
      <div class="diff-badge" id="diffBadge">—</div>
    </div>
    <div class="hint-strip" id="hintStrip">
      <span class="hint-icon">💡</span>
      <span class="hint-text">作品：</span>
      <span class="hint-val" id="hintSeries">—</span>
      <span class="hint-text" style="margin-left:16px">首字：</span>
      <span class="hint-val" id="hintFirst">—</span>
    </div>
    <div class="input-section">
      <div class="question-text">這位動漫角色是誰？請輸入他的名字</div>
      <div class="answer-row">
        <input class="answer-input" id="answerInput" type="text" placeholder="輸入角色名稱…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">確認</button>
      </div>
      <div class="result-banner" id="resultBanner">
        <span class="result-icon" id="resultIcon"></span>
        <span class="result-text" id="resultText"></span>
      </div>
      <div class="action-row" id="actionRow">
        <button class="action-btn btn-reveal" id="revealBtn" onclick="revealAnswer()">👁 顯示答案</button>
        <button class="action-btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>下一題 →</button>
        <button class="action-btn btn-skip" onclick="skipQuestion()">跳過 ↷</button>
      </div>
    </div>
  `;

  init();
}

function addHistory(type, name, userAnswer) {
  const list = document.getElementById('historyList');
  const empty = list.querySelector('.empty-history');
  if (empty) empty.remove();

  const labels = { c: '答對', w: '答錯', s: '跳過/查看' };
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-dot ${type}"></div>
    <span class="history-name">${name}</span>
    <span class="history-answer">${labels[type]}${userAnswer && type !== 's' ? '：' + userAnswer : ''}</span>
  `;
  list.insertBefore(item, list.firstChild);

  state.history.push({ type, name, userAnswer });
}

// Enter key to submit
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (!state.answered) checkAnswer();
    else if (!document.getElementById('nextBtn')?.disabled) nextQuestion();
  }
});

// Start
init();
</script>
</body>
</html>
