<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烏薩奇採草莓大冒險 - 邊界解禁版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 藍天 */
        #sky {
            background: linear-gradient(to bottom, #87CEEB, #B0E2FF);
            height: 25%;
            position: relative;
        }

        .tree {
            position: absolute;
            bottom: 0;
            width: 80px;
            height: 110px;
            background: #2E8B57;
            border-radius: 50% 50% 0 0;
        }
        .tree::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 33px;
            width: 14px;
            height: 20px;
            background: #8B4513;
        }
        #tree1 { left: 4%; }
        #tree2 { left: 15%; }
        #tree3 { right: 6%; }

        /* 咖啡色農田 */
        #field {
            background-color: #5C4033; 
            background-image: radial-gradient(#4a3329 15%, transparent 15%),
                              radial-gradient(#4a3329 15%, transparent 15%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            height: 75%;
            position: relative;
            /* 允許烏薩奇部分身體超出，這樣才能摸到絕對邊界 */
            overflow: hidden; 
        }

        /* UI 看板 */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            border: 3px solid #5C4033;
        }
        #ui-layer div { margin-bottom: 5px; }

        /* 彈窗樣式 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .menu-box {
            background: #fff;
            color: #333;
            padding: 35px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        .menu-box h1 { margin-bottom: 15px; color: #d9534f; font-size: 2.2rem; }
        .menu-box p { margin-bottom: 20px; font-size: 1.15rem; line-height: 1.7; text-align: left; }
        .menu-box button {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .menu-box button:hover { background: #4cae4c; }

        /* 烏薩奇 (4.png) - 放大 20 倍 */
        #usagi {
            position: absolute;
            width: 400px;  
            height: auto;
            z-index: 5;
            transition: left 0.04s linear, top 0.04s linear; 
        }

        /* 番茄 - 放大 7 倍 */
        .tomato {
            position: absolute;
            width: 84px;
            height: auto;
            animation: fadeIn 0.2s ease-out;
        }

        /* 草莓 - 放大 12 倍 */
        .strawberry {
            position: absolute;
            width: 144px;
            height: auto;
            animation: fadeIn 0.2s ease-out;
        }

        #end-usagi-img {
            width: 220px;
            height: auto;
            margin-top: 15px;
            border-radius: 10px;
        }

        .speech-bubble {
            position: relative;
            background: #fff;
            border: 4px solid #333;
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            color: #000;
            font-weight: bold;
            font-size: 1.3rem;
            max-width: 100%;
            display: inline-block;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
            line-height: 1.5;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 16px 16px;
            border-style: solid;
            border-color: #333 transparent;
            display: block;
            width: 0;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 14px 14px;
            border-style: solid;
            border-color: #fff transparent;
            display: block;
            width: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="sky">
            <div class="tree" id="tree1"></div>
            <div class="tree" id="tree2"></div>
            <div class="tree" id="tree3"></div>
        </div>

        <div id="field">
            <img id="usagi" src="4.png" alt="烏薩奇">
        </div>

        <div id="ui-layer">
            <div id="score-display">目前分數: 0 分</div>
            <div id="timer-display">剩餘時間: 60 秒</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="menu-box">
                <h1>🍓 烏薩奇採草莓遊戲 (邊界解禁版) 🍓</h1>
                <p>
                    <strong>【遊戲規則說明】</strong><br><br>
                    • <b>上下左右移動</b>：使用鍵盤的方向鍵控制巨型烏薩奇。<br>
                    • <b>用 enter 採草莓</b>：烏薩奇必須和水果接觸時，按下 Enter 鍵才有效！<br>
                    • <b>本次更新</b>：解除了解除牆壁封印！烏薩奇現在可以<b>一路走到最左、最右、最上、最下的極端邊緣</b>，採收那些長在邊邊的水果囉！<br>
                    • <b>得分計算</b>：草莓 <b>+1 分</b>，番茄 <b>-2 分</b>。<br>
                    • 遊戲時長一分鐘，點擊下方按鈕開始！
                </p>
                <button onclick="startGame()">開始遊戲</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display: none;">
            <div class="menu-box">
                <h1>遊戲結束！</h1>
                <p id="final-score" style="text-align:center; font-size: 1.6rem; font-weight: bold; color: #d9534f; margin-top:10px;"></p>
                <div id="usagi-talk" class="speech-bubble"></div>
                <br>
                <img id="end-usagi-img" src="" alt="結果狀態">
                <br><br>
                <button onclick="location.reload()">再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        const field = document.getElementById('field');
        const usagi = document.getElementById('usagi');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const finalScoreText = document.getElementById('final-score');
        const usagiTalk = document.getElementById('usagi-talk');
        const endUsagiImg = document.getElementById('end-usagi-img');

        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let spawnInterval;
        let gameActive = false;

        let usagiX = 0;
        let usagiY = 0;
        const speed = 45; 

        let activeFruits = [];

        function initUsagi() {
            const fieldRect = field.getBoundingClientRect();
            // 初始置中
            usagiX = (fieldRect.width / 2) - 200;
            usagiY = (fieldRect.height / 2) - 200;
            usagi.style.left = usagiX + 'px';
            usagi.style.top = usagiY + 'px';
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameActive = true;
            initUsagi();

            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `剩餘時間: ${timeLeft} 秒`;
                if (timeLeft <= 0) endGame();
            }, 1000);

            spawnInterval = setInterval(() => {
                if (gameActive) spawnFruit();
            }, 850);
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            const fieldRect = field.getBoundingClientRect();
            // 核心調整：允許烏薩奇的中心點碰到邊界，意即圖片可以有一半(200px)探到田地外
            const minX = -200;
            const minY = -200;
            const maxX = fieldRect.width - 200;
            const maxY = fieldRect.height - 200;

            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === 'ArrowUp') usagiY -= speed;
            else if (e.key === 'ArrowDown') usagiY += speed;
            else if (e.key === 'ArrowLeft') {
                usagiX -= speed;
                usagi.style.transform = 'scaleX(1)';
            } else if (e.key === 'ArrowRight') {
                usagiX += speed;
                usagi.style.transform = 'scaleX(-1)';
            }

            // 更新後的新邊界保護邏輯
            if (usagiX < minX) usagiX = minX;
            if (usagiY < minY) usagiY = minY;
            if (usagiX > maxX) usagiX = maxX;
            if (usagiY > maxY) usagiY = maxY;

            usagi.style.left = usagiX + 'px';
            usagi.style.top = usagiY + 'px';

            if (e.key === 'Enter') {
                checkPickUp();
            }
        });

        function spawnFruit() {
            const isStrawberry = Math.random() < 0.5; 
            const fruitImg = document.createElement('img');
            let fruitWidth = 0;
            let fruitHeight = 0;
            let vanishDuration = 0;
            let typeStr = '';

            if (isStrawberry) {
                fruitImg.src = '2.png';
                fruitImg.classList.add('strawberry');
                fruitWidth = 144;
                fruitHeight = 144;
                vanishDuration = 10000;
                typeStr = 'strawberry';
            } else {
                fruitImg.src = '3.png';
                fruitImg.classList.add('tomato');
                fruitWidth = 84;
                fruitHeight = 84;
                vanishDuration = 12000;
                typeStr = 'tomato';
            }

            const fieldRect = field.getBoundingClientRect();
            
            // 讓水果可以完全貼緊 0 到 100% 的田地極端邊緣
            const maxX = fieldRect.width - fruitWidth;
            const maxY = fieldRect.height - fruitHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            fruitImg.style.left = randomX + 'px';
            fruitImg.style.top = randomY + 'px';

            field.appendChild(fruitImg);

            activeFruits.push({
                element: fruitImg,
                type: typeStr
            });

            setTimeout(() => {
                if (field.contains(fruitImg)) {
                    fruitImg.remove();
                    activeFruits = activeFruits.filter(f => f.element !== fruitImg);
                }
            }, vanishDuration);
        }

        function checkPickUp() {
            const usagiRect = usagi.getBoundingClientRect();
            
            // 精準計算烏薩奇的中心點
            const usagiCenterX = usagiRect.left + usagiRect.width / 2;
            const usagiCenterY = usagiRect.top + usagiRect.height / 2;

            let candidateFruits = [];

            for (let i = 0; i < activeFruits.length; i++) {
                const fruit = activeFruits[i];
                const fruitRect = fruit.element.getBoundingClientRect();

                // 碰撞判定
                const isIntersecting = !(
                    usagiRect.right < fruitRect.left ||
                    usagiRect.left > fruitRect.right ||
                    usagiRect.bottom < fruitRect.top ||
                    usagiRect.top > fruitRect.bottom
                );

                if (isIntersecting) {
                    const fruitCenterX = fruitRect.left + fruitRect.width / 2;
                    const fruitCenterY = fruitRect.top + fruitRect.height / 2;
                    
                    const distanceSq = Math.pow(usagiCenterX - fruitCenterX, 2) + Math.pow(usagiCenterY - fruitCenterY, 2);
                    
                    candidateFruits.push({
                        index: i,
                        fruit: fruit,
                        distance: distanceSq
                    });
                }
            }

            // 選擇中心點距離最近的那顆水果
            if (candidateFruits.length > 0) {
                candidateFruits.sort((a, b) => a.distance - b.distance);
                
                const target = candidateFruits[0].fruit;
                const targetIndex = candidateFruits[0].index;

                if (target.type === 'strawberry') {
                    score += 1;
                } else {
                    score -= 2;
                }

                scoreDisplay.innerText = `目前分數: ${score} 分`;

                target.element.remove();
                activeFruits.splice(targetIndex, 1);
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            activeFruits.forEach(f => f.element.remove());
            activeFruits = [];

            finalScoreText.innerText = `最終得分: ${score} 分`;

            if (score >= 10) {
                usagiTalk.innerText = '「挖~你好棒，烏薩奇今年不愁吃穿了」';
                endUsagiImg.src = '5.png';
            } else {
                usagiTalk.innerText = '「我沒草莓吃了 嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚 挖 挖烏挖」';
                endUsagiImg.src = '6.png';
            }

            endScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
