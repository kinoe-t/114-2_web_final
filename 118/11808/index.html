<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #08090d;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(69,243,255,0.04) 0%, transparent 60%),

  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 30px 16px;
}

#game-container {
  width: 100%;
  max-width: 660px;
  padding: 32px 28px;
  background: #121620;
  border: 1.5px solid #45f3ff44;
  border-radius: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

#game-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #ff007f, #45f3ff, #ff007f);
  background-size: 200% 100%;
  animation: scanline 3s linear infinite;
}

@keyframes scanline {
  0% { background-position: 0% 0; }
  100% { background-position: 200% 0; }
}

#title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 4px;
  color: #45f3ff;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(69,243,255,0.5);
}

#subtitle {
  font-size: 13px;
  color: #c5a059;
  margin-bottom: 24px;
  font-weight: 700;
  letter-spacing: 1px;
}

#status-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  background: #0b0c10;
  padding: 10px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #fff;
  border: 1px solid #45f3ff22;
  flex-wrap: wrap;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.status-label { color: #8899aa; }

#day-badge {
  font-size: 12px;
  background: #ff007f22;
  color: #ff6eb3;
  border: 1px solid #ff007f44;
  border-radius: 20px;
  padding: 2px 12px;
  margin-bottom: 18px;
  display: inline-block;
  letter-spacing: 1px;
}

#story {
  font-size: 16px;
  margin-bottom: 24px;
  line-height: 1.9;
  color: #e8eef5;
  text-align: left;
  background: rgba(8, 9, 13, 0.7);
  padding: 20px 22px;
  border-radius: 10px;
  border-left: 4px solid #ff007f;
  min-height: 130px;
  transition: opacity 0.2s;
}

#choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  display: block;
  width: 100%;
  padding: 13px 20px;
  background: transparent;
  color: #66fcf1;
  border: 1.5px solid #66fcf144;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  transition: all 0.18s ease;
  text-align: left;
  line-height: 1.5;
}

.btn:hover {
  background: #66fcf112;
  border-color: #66fcf1;
  box-shadow: 0 0 12px rgba(102,252,241,0.2);
  transform: translateX(3px);
}

.btn-fail { border-color: #ff4d4d55; color: #ff8080; }
.btn-fail:hover { background: #ff4d4d15; border-color: #ff4d4d; box-shadow: 0 0 12px rgba(255,77,77,0.2); }

.btn-success { border-color: #39ff1455; color: #80ff60; }
.btn-success:hover { background: #39ff1415; border-color: #39ff14; box-shadow: 0 0 12px rgba(57,255,20,0.2); }

.btn-neutral { border-color: #c5a05955; color: #c5a059; }
.btn-neutral:hover { background: #c5a05915; border-color: #c5a059; box-shadow: 0 0 12px rgba(197,160,89,0.2); }

  display: none;
  font-size: 11px;
  letter-spacing: 2px;
  font-weight: 900;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 14px;
}

.tag-perfect { background: #39ff1420; color: #39ff14; border: 1px solid #39ff1444; display: inline-block !important; }
.tag-good { background: #45f3ff20; color: #45f3ff; border: 1px solid #45f3ff44; display: inline-block !important; }
.tag-fail { background: #ff4d4d20; color: #ff6060; border: 1px solid #ff4d4d44; display: inline-block !important; }

#history-bar {
  font-size: 11px;
  color: #445566;
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid #45f3ff11;
  text-align: left;
  line-height: 1.7;
}

.history-entry { color: #334455; }
.history-entry::before { content: '› '; color: #45f3ff44; }

function updateStatusBar() {
  document.getElementById("prop-notebook").innerText = hasNotebook ? "✅ 已獲得" : "❌ 無";
  document.getElementById("prop-drink").innerText = hasDrink ? "✅ 已獲得" : "❌ 無";
  document.getElementById("prop-location").innerText = locationName[studyLocation] || "— 未定";
}

function renderScene(nodeId) {
  const node = scriptData[nodeId];
  if (!node) { console.error("找不到節點", nodeId); return; }

  if (node.isCondition) {
    handleConditionRoute();
    return;
  }

  if (nodeId === 0) {
    hasNotebook = false;
    hasDrink = false;
    studyLocation = "none";
    forceFail = false;
    history = [];
    updateStatusBar();
    document.getElementById("history-list").innerHTML = "";
  }

  if (node.getProp === "notebook" && !hasNotebook) hasNotebook = true;
  if (node.getProp === "drink" && !hasDrink) hasDrink = true;
  if (node.setLocation) studyLocation = node.setLocation;
  if (node.setForceFail === true) forceFail = true;

  updateStatusBar();

  const endingTag = document.getElementById("ending-tag");
  if (node.endingTag) {
    endingTag.textContent = node.endingTag;
    endingTag.className = "ending-tag " + node.tagClass;
    endingTag.style.display = "inline-block";
  } else {
    endingTag.style.display = "none";
  }

  document.getElementById("story").innerHTML = node.text;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  node.choices.forEach(choice => {
    const button = document.createElement("button");
    button.innerHTML = choice.text;
    button.className = "btn";
    if (node.isFail) button.classList.add("btn-fail");
    if (node.isSuccess) button.classList.add("btn-success");
    if (node.endingTag) button.classList.add("btn-neutral");
    button.onclick = () => {
      history.push(choice.text.replace(/<[^>]*>/g, ''));
      const histList = document.getElementById("history-list");
      histList.innerHTML = history.slice(-5).map(h =>
        `<div class="history-entry">${h}</div>`
      ).join('');
      renderScene(choice.next);
    };
    choicesDiv.appendChild(button);
  });
}

function handleConditionRoute() {
  if (forceFail || studyLocation === "abandon") {
    renderScene(25);
    return;
  }
  if (hasNotebook && hasDrink) {
    renderScene(studyLocation === "fastfood" ? 23 : 12);
    return;
  }
  if (hasNotebook) { renderScene(13); return; }
  if (hasDrink) { renderScene(24); return; }
  renderScene(14);
}

renderScene(0);
</script>
