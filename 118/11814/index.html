<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 音樂時光機 Music Time Machine</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Microsoft JhengHei",sans-serif;
}

body{
    background:linear-gradient(135deg,#141e30,#243b55);
    min-height:100vh;
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    color:#ddd;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.selector{
    text-align:center;
    margin-bottom:30px;
}

select{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.info-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
}

.info-card h2{
    margin-bottom:10px;
    color:#ffd166;
}

.genre{
    display:inline-block;
    background:#ff006e;
    padding:8px 15px;
    border-radius:20px;
    margin:5px;
}

.song-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.song-card{
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
}

.song-card:hover{
    transform:translateY(-5px);
}

.song-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.song-content{
    padding:15px;
}

.song-content h3{
    margin-bottom:5px;
}

.song-content p{
    color:#ccc;
    margin-bottom:10px;
}

.spotify-btn{
    display:inline-block;
    text-decoration:none;
    background:#1DB954;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#aaa;
}

@media(max-width:768px){
    header h1{
        font-size:2rem;
    }
}
</style>
</head>

<body>

<header>
    <h1>🎵 音樂時光機</h1>
    <p>探索每個年代最流行的音樂風格與經典歌曲</p>
</header>

<div class="container">

    <div class="selector">
        <select id="decadeSelect">
            <option value="1950s">1950年代</option>
            <option value="1960s">1960年代</option>
            <option value="1970s">1970年代</option>
            <option value="1980s">1980年代</option>
            <option value="1990s">1990年代</option>
            <option value="2000s">2000年代</option>
            <option value="2010s">2010年代</option>
            <option value="2020s">2020年代</option>

    <div id="decadeInfo"></div>

</div>

<footer>
    Music Time Machine © 2026
</footer>

function renderDecade(decade){

const data = musicData[decade];

let html = `
<div class="info-card">
    <h2>${data.title}</h2>
    <p>${data.description}</p>
    <br>
    ${data.genres.map(g=>`<span class="genre">${g}</span>`).join("")}
</div>

<div class="song-grid">
`;

data.songs.forEach(song=>{
html += `
<div class="song-card">
    <img src="${song.cover}" alt="${song.title}">
    <div class="song-content">
        <h3>${song.title}</h3>
        <p>${song.artist}</p>
        <a class="spotify-btn" href="${song.spotify}" target="_blank">
            🎧 Spotify
        </a>
    </div>
</div>
`;
});

html += `</div>`;

document.getElementById("decadeInfo").innerHTML = html;
}

document
.getElementById("decadeSelect")
.addEventListener("change",(e)=>{
    renderDecade(e.target.value);
});

renderDecade("1950s");

</script>
